<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seat API Tester</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', monospace; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .card-header { background: #1e293b; border-bottom: 1px solid #334155; }
    .badge-available  { background: #166534; color: #bbf7d0; }
    .badge-booked     { background: #7f1d1d; color: #fecaca; }
    .badge-hold       { background: #713f12; color: #fef08a; }
    pre { background: #0f172a; color: #7dd3fc; border-radius: 8px; font-size: .78rem; max-height: 400px; overflow-y: auto; }
    .seat-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; }
    .seat-box {
      width: 80px; height: 80px; border-radius: 12px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; border: 2px solid;
      cursor: default; transition: all .2s;
    }
    .seat-available { background: #1e3a2f; border-color: #4ade80; color: #4ade80; }
    .seat-booked    { background: #3f1f1f; border-color: #f87171; color: #f87171; }
    .seat-hold      { background: #3f2d10; border-color: #fbbf24; color: #fbbf24; }
    .seat-num       { font-size: 1.1rem; }
    .seat-label     { font-size: .6rem; opacity: .8; margin-top: 2px; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-line { font-size: .72rem; padding: 2px 0; border-bottom: 1px solid #1e293b; }
    .log-line.update { color: #34d399; }
    .log-line.error  { color: #f87171; }
    .log-line.info   { color: #93c5fd; }
    input.form-control { background: #0f172a; border-color: #334155; color: #e2e8f0; }
    input.form-control:focus { background: #0f172a; border-color: #6366f1; color: #e2e8f0; box-shadow: none; }
    .kv-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e293b; font-size: .8rem; }
    .kv-key { color: #94a3b8; }
    .kv-val { color: #e2e8f0; font-weight: 600; }
  </style>
</head>
<body class="p-3">

<div class="d-flex align-items-center gap-3 mb-3">
  <h5 class="mb-0 fw-bold"><i class="bi bi-bug me-2" style="color:#6366f1"></i>Seat API Tester</h5>
  <span id="statusDot" class="badge pulse" style="background:#374151;color:#9ca3af">● ไม่ได้เชื่อมต่อ</span>
  <span id="pollCount" class="text-muted small ms-auto">poll: 0 ครั้ง</span>
</div>

<!-- Controls -->
<div class="card mb-3">
  <div class="card-body p-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">Round ID</label>
        <input type="number" id="inRoundId" class="form-control form-control-sm" value="267" placeholder="267">
      </div>
      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">Poll interval (ms)</label>
        <input type="number" id="inInterval" class="form-control form-control-sm" value="2000" step="500">
      </div>
      <div class="col-md-2">
        <label class="form-label small text-muted mb-1">API Base</label>
        <input type="text" id="inBase" class="form-control form-control-sm" value="http://localhost:5000/api">
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-primary" onclick="startPoll()"><i class="bi bi-play-fill me-1"></i>Start</button>
        <button class="btn btn-sm btn-outline-danger ms-1" onclick="stopPoll()"><i class="bi bi-stop-fill me-1"></i>Stop</button>
        <button class="btn btn-sm btn-outline-secondary ms-1" onclick="fetchOnce()"><i class="bi bi-arrow-clockwise me-1"></i>ดึงครั้งเดียว</button>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">

  <!-- Left: Seat Grid -->
  <div class="col-lg-4">
    <div class="card h-100">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <span class="fw-bold small"><i class="bi bi-grid-3x3-gap me-1"></i>Seat Map</span>
        <span id="occupancyBadge" class="badge bg-secondary small">0/0</span>
      </div>
      <div class="card-body p-3">
        <div class="text-muted small mb-3">
          <span class="me-3"><span class="badge badge-available">■</span> available</span>
          <span class="me-3"><span class="badge badge-booked">■</span> booked</span>
          <span><span class="badge badge-hold">■</span> hold</span>
        </div>
        <!-- Driver/Staff row -->
        <div class="d-flex gap-2 mb-3 pb-3" style="border-bottom:1px dashed #334155">
          <div class="seat-box" style="background:#1e293b;border-color:#475569;color:#64748b;width:80px;height:50px">
            <span style="font-size:.65rem">STAFF</span>
          </div>
          <div class="seat-box" style="background:#1e293b;border-color:#475569;color:#64748b;width:80px;height:50px">
            <span style="font-size:.65rem">DRIVER</span>
          </div>
        </div>
        <div class="seat-grid" id="seatGrid">
          <div class="text-muted small">กำลังโหลด...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Middle: Stats + KV -->
  <div class="col-lg-4">
    <div class="card mb-3">
      <div class="card-header py-2"><span class="fw-bold small"><i class="bi bi-bar-chart me-1"></i>สถิติ</span></div>
      <div class="card-body p-3" id="statsPanel">
        <div class="text-muted small">รอข้อมูล...</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header py-2"><span class="fw-bold small"><i class="bi bi-table me-1"></i>Seat Detail Table</span></div>
      <div class="card-body p-2" style="max-height:280px;overflow-y:auto">
        <table class="table table-sm mb-0" style="font-size:.72rem;color:#e2e8f0">
          <thead style="color:#94a3b8">
            <tr><th>#</th><th>Status</th><th>Gender</th><th>Booking</th><th>Temp</th></tr>
          </thead>
          <tbody id="seatTableBody">
            <tr><td colspan="5" class="text-muted text-center">รอข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Right: Raw JSON + Logs -->
  <div class="col-lg-4">
    <div class="card mb-3">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <span class="fw-bold small"><i class="bi bi-braces me-1"></i>Raw JSON</span>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.7rem" onclick="copyJson()">copy</button>
      </div>
      <div class="card-body p-2">
        <pre id="rawJson">รอข้อมูล...</pre>
      </div>
    </div>
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <span class="fw-bold small"><i class="bi bi-terminal me-1"></i>Poll Log</span>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.7rem" onclick="clearLogs()">clear</button>
      </div>
      <div class="card-body p-2" style="max-height:200px;overflow-y:auto" id="logPanel">
        <div class="text-muted small">รอ poll...</div>
      </div>
    </div>
  </div>

</div>

<script>
  let pollTimer = null
  let pollCount = 0
  let lastRawData = null

  async function fetchOnce() {
    const base = document.getElementById('inBase').value.trim()
    const roundId = document.getElementById('inRoundId').value.trim()
    if (!roundId) return log('ใส่ Round ID ก่อน', 'error')

    const url = `${base}/seat-bookings/round/${roundId}`
    log(`GET ${url}`, 'info')
    const t0 = Date.now()
    try {
      const res = await fetch(url)
      const data = await res.json()
      const ms = Date.now() - t0

      if (!res.ok) {
        log(`HTTP ${res.status}: ${data.message || 'error'} (${ms}ms)`, 'error')
        setStatus('error')
        return
      }

      lastRawData = data
      pollCount++
      document.getElementById('pollCount').textContent = `poll: ${pollCount} ครั้ง`
      log(`✓ ${ms}ms — seats: ${Object.keys(data.seats||{}).length} รายการ`, 'update')
      setStatus('ok')
      render(data)
    } catch (e) {
      log(`fetch error: ${e.message}`, 'error')
      setStatus('error')
    }
  }

  function startPoll() {
    stopPoll()
    fetchOnce()
    const ms = parseInt(document.getElementById('inInterval').value) || 2000
    pollTimer = setInterval(fetchOnce, ms)
    log(`เริ่ม auto-poll ทุก ${ms}ms`, 'info')
  }

  function stopPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; log('หยุด poll', 'info') }
  }

  function render(data) {
    const seats = data.seats || {}
    const total = Math.max(1, (data.passengerSeats ?? data.totalSeats ?? 10) - 1)
    const seatNums = Array.from({ length: total }, (_, i) => i + 2)

    let booked = 0, hold = 0, avail = 0

    // Seat grid
    document.getElementById('seatGrid').innerHTML = seatNums.map(n => {
      const s = seats[n]
      if (!s) { avail++; return seatBox(n, 'available', '—', '') }
      if (s.status === 'BOOKED') {
        booked++
        const g = s.gender === 'MALE' ? '♂' : s.gender === 'FEMALE' ? '♀' : '●'
        return seatBox(n, 'booked', g, s.passengerName || s.nickname || '')
      }
      if (s.isTemporary) { hold++; return seatBox(n, 'hold', '⏱', 'HOLD') }
      avail++
      return seatBox(n, 'available', '○', '')
    }).join('')

    document.getElementById('occupancyBadge').textContent = `${booked}/${total}`

    // Stats
    document.getElementById('statsPanel').innerHTML = `
      <div class="kv-row"><span class="kv-key">roundId</span><span class="kv-val">${data.roundId}</span></div>
      <div class="kv-row"><span class="kv-key">totalSeats (raw)</span><span class="kv-val">${data.totalSeats}</span></div>
      <div class="kv-row"><span class="kv-key">passengerSeats</span><span class="kv-val">${data.passengerSeats}</span></div>
      <div class="kv-row"><span class="kv-key">seats in response</span><span class="kv-val">${Object.keys(seats).length}</span></div>
      <div class="kv-row"><span class="kv-key"><span style="color:#4ade80">● available</span></span><span class="kv-val">${avail}</span></div>
      <div class="kv-row"><span class="kv-key"><span style="color:#f87171">● booked</span></span><span class="kv-val">${booked}</span></div>
      <div class="kv-row"><span class="kv-key"><span style="color:#fbbf24">● hold</span></span><span class="kv-val">${hold}</span></div>
    `

    // Table
    const rows = Object.entries(seats).map(([n, s]) => `
      <tr>
        <td>${n}</td>
        <td><span class="badge badge-${s.status?.toLowerCase() || 'hold'}" style="font-size:.65rem">${s.status || 'HOLD'}</span></td>
        <td>${s.gender || '—'}</td>
        <td>${s.bookingId != null ? s.bookingId : '<span class="text-muted">null</span>'}</td>
        <td>${s.isTemporary ? '⏱ yes' : '—'}</td>
      </tr>`).join('')
    document.getElementById('seatTableBody').innerHTML = rows ||
      '<tr><td colspan="5" class="text-center" style="color:#4ade80">✓ ว่างทั้งหมด (seats: {})</td></tr>'

    // Raw JSON
    document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2)
  }

  function seatBox(n, state, icon, label) {
    return `<div class="seat-box seat-${state}">
      <span class="seat-num">${icon}</span>
      <span class="seat-num" style="font-size:.9rem">${n}</span>
      <span class="seat-label">${label}</span>
    </div>`
  }

  function setStatus(s) {
    const el = document.getElementById('statusDot')
    if (s === 'ok')    { el.style.background='#166534'; el.style.color='#4ade80'; el.textContent='● เชื่อมต่อ'; el.classList.remove('pulse') }
    if (s === 'error') { el.style.background='#7f1d1d'; el.style.color='#f87171'; el.textContent='● error'; el.classList.add('pulse') }
  }

  function log(msg, type = 'info') {
    const panel = document.getElementById('logPanel')
    const time = new Date().toLocaleTimeString('th-TH')
    const div = document.createElement('div')
    div.className = `log-line ${type}`
    div.textContent = `[${time}] ${msg}`
    panel.prepend(div)
    // keep max 80 lines
    while (panel.children.length > 80) panel.removeChild(panel.lastChild)
  }

  function clearLogs() { document.getElementById('logPanel').innerHTML = '' }

  function copyJson() {
    if (!lastRawData) return
    navigator.clipboard.writeText(JSON.stringify(lastRawData, null, 2))
      .then(() => log('copied JSON', 'info'))
  }

  // Auto-start
  window.addEventListener('load', startPoll)
</script>

</body>
</html>
