<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKSGUGA — ค้นหาทริป</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #00d9b4;
      --primary-dim: rgba(0, 217, 180, .12);
      --dark: #0f1419;
      --dark-card: #1a2232;
      --dark-card2: #141b26;
      --gray: #a0aec0;
      --border: rgba(255, 255, 255, .07);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Sarabun', sans-serif;
      color: #fff;
    }

    /* ── Background ── */
    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, .68) 0%, rgba(5, 22, 16, .78) 60%, rgba(0, 0, 0, .82) 100%),
        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1400&q=80') center/cover no-repeat;
    }

    /* ── Main 2-column layout ── */
    .main-layout {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
    }

    /* ════════════════════════════
       LEFT PANEL
    ════════════════════════════ */
    .lp {
      width: 420px;
      min-width: 300px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, .48);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255, 255, 255, .07);
    }

    .lp-header {
      padding: .9rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      flex-shrink: 0;
    }

    .lp-logo {
      display: flex;
      align-items: center;
      gap: .55rem;
      text-decoration: none;
    }

    .lp-logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), #00c4a0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #000;
    }

    .lp-logo-text {
      font-family: 'Kanit', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
    }

    .lp-nav {
      display: flex;
      gap: .8rem;
    }

    .lp-nav a {
      color: rgba(255, 255, 255, .55);
      font-size: .78rem;
      text-decoration: none;
      transition: color .2s;
    }

    .lp-nav a:hover {
      color: var(--primary);
    }

    .lp-controls {
      padding: .9rem 1.4rem .6rem;
      flex-shrink: 0;
    }

    .ctrl-row {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .4rem .85rem;
      margin-bottom: .5rem;
    }

    .ctrl-row button {
      background: none;
      border: none;
      color: #fff;
      font-size: .85rem;
      padding: .12rem .38rem;
      border-radius: 6px;
      transition: background .2s;
      cursor: pointer;
    }

    .ctrl-row button:hover {
      background: rgba(255, 255, 255, .15);
    }

    .ctrl-label {
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: .88rem;
      color: #fff;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .3rem;
    }

    .ctrl-select {
      background: transparent;
      border: none;
      color: #fff;
      font-family: 'Kanit', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    .ctrl-select option {
      background: #1e2837;
    }

    .search-row {
      display: flex;
      gap: .45rem;
    }

    .search-input {
      flex: 1;
      background: rgba(255, 255, 255, .09);
      border: 1px solid rgba(255, 255, 255, .14);
      color: #fff;
      border-radius: 10px;
      padding: .5rem .85rem;
      font-family: 'Sarabun', sans-serif;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, .4);
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--primary), #00c4a0);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: .5rem .95rem;
      font-family: 'Kanit', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(0, 217, 180, .35);
    }

    .lp-list-header {
      padding: .4rem 1.4rem .2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .lp-list-label {
      font-size: .7rem;
      color: rgba(255, 255, 255, .3);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .lp-list-count {
      font-size: .72rem;
      color: var(--primary);
      font-weight: 600;
    }

    .lp-list {
      flex: 1;
      overflow-y: auto;
      padding: .3rem 1rem 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, .12) transparent;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .lp-list::-webkit-scrollbar {
      width: 3px;
    }

    .lp-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .12);
      border-radius: 2px;
    }

    .list-divider {
      font-size: .67rem;
      color: rgba(255, 255, 255, .28);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: .7rem .4rem .25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .list-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, .1);
    }

    /* Round row — wider flat detail card */
    .round-row {
      display: grid;
      grid-template-columns: 8px 1fr auto;
      align-items: center;
      gap: .6rem;
      padding: .75rem .9rem;
      border-radius: 12px;
      margin-bottom: .45rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      border: 1px solid rgba(255, 255, 255, .07);
      background: rgba(255, 255, 255, .03);
    }

    .round-row:hover:not(.is-full) {
      background: rgba(255, 255, 255, .08);
      border-color: rgba(255, 255, 255, .13);
    }

    .round-row.selected {
      background: rgba(0, 217, 180, .09);
      border-color: rgba(0, 217, 180, .35);
    }

    .round-row.is-full {
      opacity: .45;
      cursor: not-allowed;
    }

    .round-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .round-info {
      min-width: 0;
    }

    .round-row-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .round-row-bot {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-top: .3rem;
    }

    .r-time-tag {
      font-size: .76rem;
      font-weight: 700;
      color: #dbe7ff;
      background: rgba(15, 33, 60, .9);
      border-radius: 8px;
      padding: .18rem .5rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .r-trip-tag {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .r-route-tag {
      font-size: .75rem;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .r-dur-tag {
      font-size: .8rem;
      color: rgba(255, 255, 255, .45);
      white-space: nowrap;
    }

    .r-seats-tag {
      font-size: .86rem;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
      margin-left: auto;
    }

    .r-seats-tag.is-full {
      color: #ff6b6b;
    }

    .dot-ok {
      background: var(--primary);
      box-shadow: 0 0 5px rgba(0, 217, 180, .6);
    }

    .dot-low {
      background: #ff9f43;
      box-shadow: 0 0 5px rgba(255, 159, 67, .5);
    }

    .dot-full {
      background: #ff4757;
    }

    .round-info {
      flex: 1;
      min-width: 0;
    }

    .round-title {
      font-size: .86rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .round-sub {
      font-size: .7rem;
      color: var(--gray);
      margin-top: .08rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }

    .round-badge {
      font-size: .7rem;
      border-radius: 20px;
      padding: .12rem .55rem;
      flex-shrink: 0;
      font-weight: 700;
      font-family: 'Kanit', sans-serif;
    }

    .badge-price {
      background: rgba(0, 217, 180, .15);
      color: var(--primary);
      border: 1px solid rgba(0, 217, 180, .3);
    }

    .badge-full {
      background: rgba(255, 71, 87, .15);
      color: #ff4757;
      border: 1px solid rgba(255, 71, 87, .3);
    }

    .badge-low {
      background: rgba(255, 159, 67, .15);
      color: #ff9f43;
      border: 1px solid rgba(255, 159, 67, .3);
    }

    .round-badge-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .22rem;
      flex-shrink: 0;
    }

    .round-badge-wrap .r-seats-tag {
      margin-left: 0;
    }

    /* Skeleton */
    .skel-row {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .58rem .7rem;
      border-radius: 11px;
      margin-bottom: .25rem;
    }

    .skel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .1);
      flex-shrink: 0;
    }

    .skel-line {
      border-radius: 4px;
      background: linear-gradient(90deg, rgba(255, 255, 255, .07) 25%, rgba(255, 255, 255, .11) 50%, rgba(255, 255, 255, .07) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .list-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--gray);
    }

    .list-empty i {
      font-size: 2.2rem;
      display: block;
      margin-bottom: .6rem;
      opacity: .35;
    }

    .list-empty p {
      font-size: .83rem;
    }

    /* ════════════════════════════
       RIGHT PANEL (desktop only)
    ════════════════════════════ */
    .rp {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 2.5rem;
    }

    /* White booking card */
    .bk-card {
      width: 100%;
      max-width: 320px;
      max-height: calc(100vh - 3rem);
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(255, 255, 255, .12);
      overflow-y: auto;
      overflow-x: hidden;
      color: #1a2232;
      font-family: 'Sarabun', sans-serif;
      display: flex;
      flex-direction: column;
      scrollbar-width: none;
    }

    .bk-card::-webkit-scrollbar {
      display: none;
    }

    .bk-empty {
      padding: 3rem 2rem;
      text-align: center;
    }

    .bk-empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(0, 217, 180, .12), rgba(0, 217, 180, .06));
      border: 1px solid rgba(0, 217, 180, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--primary);
      margin: 0 auto .9rem;
    }

    .bk-empty h3 {
      font-family: 'Kanit', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      color: #1a2232;
      margin-bottom: .4rem;
    }

    .bk-empty p {
      font-size: .78rem;
      color: #64748b;
      line-height: 1.6;
    }

    .bk-empty-hint {
      margin-top: 1.2rem;
      font-size: .72rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .3rem;
    }

    .bk-header {
      background: #fff;
      padding: .9rem 1.2rem .7rem;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: flex-start;
      gap: .7rem;
    }

    .bk-back {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f1f5f9;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: .8rem;
      flex-shrink: 0;
      transition: background .2s;
      margin-top: 2px;
    }

    .bk-back:hover {
      background: #e2e8f0;
    }

    .bk-header-text {
      flex: 1;
    }

    .bk-header-title {
      font-family: 'Kanit', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      color: #1a2232;
    }

    .bk-header-sub {
      font-size: .68rem;
      color: #64748b;
      margin-top: .1rem;
    }

    .bk-price-bar {
      padding: .55rem 1.2rem;
      background: #fafcff;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bk-price-left {
      font-size: .7rem;
      color: #64748b;
    }

    .bk-price-main {
      font-family: 'Kanit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: #00d9b4;
    }

    .bk-price-dep {
      font-size: .66rem;
      color: #94a3b8;
    }

    /* Static seat grid (visual preview — not interactive seatchart) */
    .bk-seat-area {
      padding: .8rem 1rem;
    }

    .seat-staff-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: .6rem;
      gap: .4rem;
    }

    .seat-staff-box,
    .seat-driver-box {
      flex: 1;
      border-radius: 12px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .1rem;
      padding: .5rem .3rem;
      font-size: .62rem;
      color: #94a3b8;
      font-weight: 600;
    }

    .seat-staff-box i,
    .seat-driver-box i {
      font-size: 1.3rem;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .45rem;
    }

    .seat-box {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      padding: .35rem .2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .08rem;
      font-size: .6rem;
      color: #94a3b8;
      font-weight: 600;
      aspect-ratio: 1;
    }

    .seat-box i {
      font-size: 1rem;
    }

    .seat-box.s-avail {
      background: #fff;
      border-color: #e2e8f0;
      color: #94a3b8;
    }

    .seat-box.s-fem {
      background: #fff0f3;
      border-color: #fca5a5;
      color: #ef4444;
    }

    .seat-box.s-mal {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #3b82f6;
    }

    .seat-box.s-more {
      background: #f8fafc;
      border-color: #e2e8f0;
      color: #94a3b8;
      font-size: .75rem;
    }

    .seat-box.s-sel-m {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #3b82f6;
      cursor: pointer;
    }

    .seat-box.s-sel-f {
      background: #fff0f3;
      border-color: #fca5a5;
      color: #ec4899;
      cursor: pointer;
    }

    .seat-box.m-pick {
      cursor: pointer;
      transition: transform .12s, border-color .12s;
    }

    .seat-box.m-pick:hover {
      transform: scale(1.05);
      border-color: #00d9b4;
    }

    /* Legend */
    .seat-legend {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem .7rem;
      padding: .4rem 1rem .5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: .28rem;
      font-size: .65rem;
      color: #64748b;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 3px;
    }

    .ld-avail {
      background: #e2e8f0;
    }

    .ld-fem {
      background: #fca5a5;
    }

    .ld-mal {
      background: #93c5fd;
    }

    /* Card footer */
    .bk-footer {
      padding: .8rem 1.2rem;
      background: #fff;
      border-top: 1px solid #f1f5f9;
    }

    .bk-footer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .55rem;
    }

    .bk-meta-date {
      font-size: .75rem;
      color: #64748b;
    }

    .bk-meta-seats {
      font-size: .78rem;
      font-weight: 700;
    }

    .bk-meta-seats.ok {
      color: #00d9b4;
    }

    .bk-meta-seats.low {
      color: #f59e0b;
    }

    .bk-meta-seats.full {
      color: #ef4444;
    }

    .bk-bar {
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: .7rem;
    }

    .bk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .5s;
    }

    .bk-bar-fill.ok {
      background: #00d9b4;
    }

    .bk-bar-fill.low {
      background: #f59e0b;
    }

    .bk-bar-fill.full {
      background: #ef4444;
    }

    .bk-btn-book {
      width: 100%;
      padding: .7rem;
      border-radius: 13px;
      border: none;
      background: linear-gradient(135deg, #00d9b4, #00c4a0);
      color: #000;
      font-family: 'Kanit', sans-serif;
      font-weight: 800;
      font-size: .92rem;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
    }

    .bk-btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 217, 180, .4);
    }

    .bk-btn-book:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ════════════════════════════
       MOBILE: Full-screen Overlay
       (คลิก round row → slide up)
    ════════════════════════════ */
    .m-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(.22, .61, .36, 1);
      overscroll-behavior: contain;
    }

    .m-overlay.open {
      transform: translateY(0);
    }

    /* Step bar — แสดง flow ทั้งหมดของ booking */
    .m-step-bar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      flex-shrink: 0;
    }

    .m-step {
      flex: 1;
      text-align: center;
      padding: .5rem .2rem;
      font-size: .68rem;
      color: #94a3b8;
      border-bottom: 3px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
    }

    .m-step.act {
      color: #0d6efd;
      border-color: #0d6efd;
      font-weight: 700;
    }

    .m-step.done {
      color: #00d9b4;
      border-color: #00d9b4;
    }

    .m-step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-weight: 700;
      background: #f1f5f9;
      color: #94a3b8;
    }

    .m-step.act .m-step-num {
      background: #0d6efd;
      color: #fff;
    }

    .m-step.done .m-step-num {
      background: #00d9b4;
      color: #fff;
    }

    /* Top nav bar in overlay */
    .m-nav-bar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: .7rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }

    .m-back-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f1f5f9;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      color: #334155;
      cursor: pointer;
      flex-shrink: 0;
    }

    .m-nav-title {
      font-weight: 700;
      font-size: .9rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #1a2232;
    }

    /* Body area: จำกัดความสูงให้ #mCard เลื่อนภายใน ไม่ให้การ์ดยืดเต็มจอตามเนื้อหา */
    .m-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem .75rem calc(1.25rem + env(safe-area-inset-bottom, 0px));
      position: relative;
    }

    .m-body::-webkit-scrollbar {
      width: 4px;
    }

    .m-body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, .1);
      border-radius: 10px;
    }

    /* The white card inside overlay — สูงสุดเท่าพื้นที่ว่างใต้ nav + step bar, เลื่อนเนื้อหาในการ์ด */
    .m-card {
      width: 100%;
      max-width: 360px;
      max-height: calc(100dvh - 11.5rem - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
      min-height: 0;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .12);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    /* Mobile gender bottom sheet */
    .m-gs {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1400;
      background: rgba(0, 0, 0, .45);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .m-gs.open {
      display: flex;
    }

    .m-gs-body {
      background: #fff;
      width: 92%;
      max-width: 400px;
      border-radius: 28px;
      padding: 28px 20px 32px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, .2);
      animation: mGsFade .25s ease-out;
    }

    @keyframes mGsFade {
      from {
        opacity: 0;
        transform: scale(.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .m-gs-card {
      flex: 1;
      max-width: 160px;
      border: 2px solid #f1f5f9;
      border-radius: 20px;
      padding: 1.5rem .5rem;
      cursor: pointer;
      text-align: center;
      transition: all .25s;
      background: #f8fafc;
    }

    .m-gs-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
    }

    .m-gs-card.sel-m {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .m-gs-card.sel-f {
      border-color: #ec4899;
      background: #fdf2f8;
      color: #be185d;
    }

    /* Premium Trip Card Enhancements */
    .bk-header-main {
      padding: 1.5rem 1.2rem 1rem;
      background: linear-gradient(to bottom, #fff, #f8fafc);
      border-bottom: 1px solid #f1f5f9;
      position: relative;
    }

    .bk-route-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .75rem;
      background: #f0fdf4;
      border: 1px solid #d1fae5;
      border-radius: 100px;
      font-size: .65rem;
      font-weight: 700;
      color: #047857;
      margin-bottom: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .bk-trip-name {
      font-family: 'Kanit', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: #1e293b;
      line-height: 1.3;
      margin-bottom: .3rem;
    }

    .bk-bus-info {
      font-size: .75rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .bk-info-grid {
      display: flex;
      flex-direction: column;
      padding: .4rem 1.2rem .75rem;
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
    }

    .bk-info-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .42rem 0;
      border-bottom: 1px solid #f8fafc;
    }

    .bk-info-item:last-child {
      border-bottom: none;
    }

    .bk-info-label {
      font-size: .72rem;
      font-weight: 600;
      color: #94a3b8;
    }

    .bk-info-value {
      font-size: .83rem;
      font-weight: 700;
      color: #334155;
      text-align: right;
    }

    .bk-pickup-mini {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .2rem 0;
    }

    .bk-pickup-dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .bk-pickup-txt {
      font-size: .85rem;
      color: #334155;
      font-weight: 600;
      flex: 1;
    }

    .bk-pickup-tm {
      font-size: .75rem;
      color: #94a3b8;
      font-weight: 700;
    }

    .bk-pricing-section {
      margin: 0 1.2rem 1rem;
      padding: 1.2rem;
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    .bk-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .2rem;
    }

    .bk-price-label {
      font-size: .75rem;
      font-weight: 600;
      color: #64748b;
    }

    .bk-price-main-val {
      font-family: 'Kanit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #00d9b4;
    }

    .bk-deposit-sub {
      font-size: .65rem;
      color: #94a3b8;
      text-align: right;
      font-weight: 500;
    }

    .bk-actions-row {
      margin: 0 1.2rem 0.75rem;
      display: flex;
      justify-content: center;
    }

    .bk-btn-details {
      width: 100%;
      padding: 0.65rem 1rem;
      font-family: 'Kanit', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: #1e40af;
      background: #fff;
      border: 2px solid #93c5fd;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .bk-btn-details:hover {
      background: #eff6ff;
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.15);
    }

    .bk-btn-details.bk-btn-details--toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
    }

    .bk-btn-details-chevron {
      font-size: 0.85rem;
      transition: transform 0.2s ease;
    }

    .bk-btn-details.is-open .bk-btn-details-chevron {
      transform: rotate(180deg);
    }

    .bk-trip-details-wrap {
      margin: 0 1.2rem 0.75rem;
    }

    .bk-trip-details-wrap--prefooter {
      margin-top: 0.25rem;
      margin-bottom: 0.5rem;
      padding-top: 0.65rem;
      border-top: 1px solid #f1f5f9;
    }

    .bk-trip-details-panel {
      margin-top: 0.65rem;
      padding: 0.75rem 0.85rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
    }

    .bk-trip-details-panel[hidden] {
      display: none !important;
    }

    .bk-trip-details-stack {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .bk-trip-details-stack .bk-desc-block {
      margin: 0;
    }

    .bk-trip-details-loading,
    .bk-trip-details-error {
      font-size: 0.85rem;
      text-align: center;
      padding: 0.5rem 0.25rem;
      color: #64748b;
      margin: 0;
    }

    .bk-trip-details-error {
      color: #b91c1c;
    }

    /* ── Trip Description Section ── */
    .bk-desc-section {
      margin: 0 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }

    .bk-desc-block {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 1rem 1.1rem;
    }

    .bk-desc-title {
      font-size: .62rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: flex;
      align-items: center;
      gap: .35rem;
      margin-bottom: .6rem;
    }

    .bk-desc-title i {
      color: #00d9b4;
    }

    .bk-desc-body {
      font-size: .83rem;
      color: #475569;
      line-height: 1.7;
      margin: 0;
      white-space: pre-line;
    }

    .bk-pickup-list {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .bk-pickup-item {
      display: flex;
      align-items: center;
      gap: .55rem;
    }

    .bk-pickup-num {
      width: 1.35rem;
      height: 1.35rem;
      border-radius: 50%;
      background: #f0fdf4;
      border: 1px solid #d1fae5;
      color: #047857;
      font-size: .62rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .bk-pickup-name {
      font-size: .82rem;
      color: #334155;
      font-weight: 500;
      flex: 1;
    }

    .bk-pickup-time {
      font-size: .72rem;
      color: #94a3b8;
      font-weight: 600;
      white-space: nowrap;
    }

    .bk-contact-block {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      color: #64748b;
      padding: .75rem 1rem;
    }

    .bk-contact-block i {
      color: #94a3b8;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .bk-seat-section {
      padding-bottom: 1rem;
    }

    .bk-seat-header {
      padding: .5rem 1.2rem .75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bk-seat-title {
      font-family: 'Kanit', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      color: #1e293b;
    }

    .bk-footer-premium {
      padding: 1.2rem;
      background: #fff;
      border-top: 1px solid #f1f5f9;
      box-shadow: 0 -4px 12px rgba(0, 0, 0, .03);
    }

    .bk-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .8rem;
    }

    .bk-status-pill {
      padding: .25rem .75rem;
      border-radius: 100px;
      font-size: .72rem;
      font-weight: 700;
    }

    .bk-status-pill.ok {
      background: #ecfdf5;
      color: #10b981;
    }

    .bk-status-pill.low {
      background: #fffbeb;
      color: #f59e0b;
    }

    .bk-status-pill.full {
      background: #fef2f2;
      color: #ef4444;
    }

    .bk-btn-booking {
      width: 100%;
      padding: .9rem;
      margin: 1rem 0;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #fff;
      font-family: 'Kanit', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: all .25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
    }

    .bk-btn-booking:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.3);
      background: linear-gradient(135deg, #334155, #1e293b);
    }

    .bk-btn-booking:active {
      transform: translateY(0);
    }

    .bk-btn-booking:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ─ Responsive ─ */
    @media (max-width: 767px) {

      html,
      body {
        overflow: hidden;
        height: 100dvh;
        position: relative;
      }

      .main-layout {
        flex-direction: column;
        height: 100dvh;
      }

      .lp {
        width: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      .rp {
        display: none;
      }

      /* Gender sheet mobile: bottom position */
      .m-gs {
        align-items: flex-end;
      }

      .m-gs-body {
        width: 100%;
        max-width: 100%;
        border-radius: 32px 32px 0 0;
        padding-bottom: 48px;
        transform: translateY(0);
        animation: mGsSlide .3s cubic-bezier(.16, 1, .3, 1);
      }

      @keyframes mGsSlide {
        from {
          transform: translateY(100%);
        }

        to {
          transform: translateY(0);
        }
      }
    }

    @media (min-width: 768px) {
      .m-overlay {
        display: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="page-bg"></div>

  <div class="main-layout">

    <!-- ══════════ LEFT PANEL ══════════ -->
    <div class="lp">
      <div class="lp-header">
        <a href="/" class="lp-logo">
          <div class="lp-logo-icon"><i class="bi bi-compass-fill"></i></div>
          <span class="lp-logo-text">BOOKSGUGA</span>
        </a>
        <div class="lp-nav">
          <a href="/contents"><i class="bi bi-newspaper me-1"></i>บทความ</a>
          <a href="/"><i class="bi bi-house me-1"></i>หน้าแรก</a>
        </div>
      </div>

      <div class="lp-controls">
        <div class="ctrl-row">
          <button onclick="changeYear(-1)"><i class="bi bi-chevron-left"></i></button>
          <span class="ctrl-label" id="yearDisplay">2026</span>
          <button onclick="changeYear(1)"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="ctrl-row">
          <button onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
          <span class="ctrl-label">
            <select id="monthSelect" class="ctrl-select" onchange="onMonthChange()"></select>
            <i class="bi bi-chevron-down" style="font-size:.65rem;opacity:.55"></i>
          </span>
          <button onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="search-row">
          <input id="searchInput" class="search-input" type="text" placeholder="ค้นหาทริป หรือ อย่างอื่น...">
          <button class="search-btn" onclick="doSearch()">ค้นหา</button>
        </div>
      </div>

      <div class="lp-list-header">
        <span class="lp-list-label" id="listLabel">รอบออกเดินทาง</span>
        <span class="lp-list-count" id="listCount"></span>
      </div>
      <div class="lp-list" id="roundList"></div>
    </div>

    <!-- ══════════ RIGHT PANEL (desktop) ══════════ -->
    <div class="rp">
      <div class="bk-card" id="bkCard">
        <div class="bk-empty">
          <div class="bk-empty-icon"><i class="bi bi-compass-fill"></i></div>
          <h3>เลือกทริปที่คุณสนใจ</h3>
          <p>เลือกรอบออกเดินทางจากรายการด้านซ้าย<br>เพื่อดูข้อมูลและจองที่นั่ง</p>
          <div class="bk-empty-hint"><i class="bi bi-arrow-left"></i> คลิกเลือกรอบจากรายการ</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════
     MOBILE FULL-SCREEN OVERLAY
     Flow: เลือกรอบ (ที่นี่) → เลือกที่นั่ง → กรอกข้อมูล → ชำระเงิน
══════════════════════════════════════════════════ -->
  <div id="mOverlay" class="m-overlay">

    <!-- [FLOW STEP 0] Back navigation -->
    <div class="m-nav-bar">
      <button class="m-back-btn" onclick="closeMobileOverlay()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div class="m-nav-title" id="mNavTitle">รายละเอียดทริป</div>
    </div>

    <!-- [FLOW INDICATOR] แสดงว่าอยู่ step ไหนของ booking flow -->
    <div class="m-step-bar">
      <!-- Step 1: เลือกรอบ (current — active) -->
      <div class="m-step act">
        <div class="m-step-num">1</div>
        <span>เลือกรอบ</span>
      </div>
      <!-- Step 2: เลือกที่นั่ง (จะทำใน /booking/seats) -->
      <div class="m-step">
        <div class="m-step-num">2</div>
        <span>เลือกที่นั่ง</span>
      </div>
      <!-- Step 3: กรอกข้อมูล (จะทำใน /booking/form) -->
      <div class="m-step">
        <div class="m-step-num">3</div>
        <span>กรอกข้อมูล</span>
      </div>
      <!-- Step 4: ชำระเงิน (จะทำใน /booking/payment) -->
      <div class="m-step">
        <div class="m-step-num">4</div>
        <span>ชำระเงิน</span>
      </div>
    </div>

    <!-- [FLOW STEP 0 CONTENT] ข้อมูลรอบ + seat preview -->
    <div class="m-body">
      <!-- White card — same visual as desktop right panel -->
      <div class="m-card" id="mCard">
        <div class="bk-empty" style="padding:2rem">
          <div class="bk-empty-icon"><i class="bi bi-compass-fill"></i></div>
          <p style="font-size:.82rem;color:#64748b">กำลังโหลด...</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Gender bottom sheet for mobile interactive seat selection -->
  <div id="mGs" class="m-gs" onclick="mCancelGender(event)">
    <div class="m-gs-body" onclick="event.stopPropagation()">
      <p style="font-family:'Kanit',sans-serif;font-weight:700;font-size:.92rem;color:#1a2232;margin:0 0 3px">เลือกเพศ —
        <span id="mGsLabel" style="color:#0d6efd;"></span>
      </p>
      <p style="font-size:.75rem;color:#64748b;margin:0 0 12px">ระบุเพศเพื่อจัดที่นั่งให้เหมาะสม</p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <div id="mGsMale" class="m-gs-card" onclick="mPickGender('MALE')">
          <i class="bi bi-gender-male" style="font-size:2rem;color:#3b82f6;display:block"></i>
          <div style="font-weight:700;font-size:.88rem;margin-top:8px">ผู้ชาย</div>
        </div>
        <div id="mGsFemale" class="m-gs-card" onclick="mPickGender('FEMALE')">
          <i class="bi bi-gender-female" style="font-size:2rem;color:#ec4899;display:block"></i>
          <div style="font-weight:700;font-size:.88rem;margin-top:8px">ผู้หญิง</div>
        </div>
      </div>
      <div
        style="display:flex;gap:10px;margin-top:20px;justify-content:center;max-width:360px;margin-left:auto;margin-right:auto;">
        <button onclick="mCancelGender()"
          style="flex:1;padding:10px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;font-family:'Sarabun',sans-serif;font-size:.88rem;font-weight:600;color:#64748b;cursor:pointer;">ยกเลิก</button>
        <button id="mGsOk" onclick="mConfirmGender()" disabled
          style="flex:1;padding:10px;border:none;border-radius:12px;background:#0d6efd;color:#fff;font-family:'Kanit',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;opacity:.45;transition:all .2s;box-shadow:0 4px 12px rgba(13,110,253,.2);">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { apiFetch } from '/src/api/config.js'
    import { getSettings } from '/src/api/settings.js'

    // ════════════════════════════════════════════════════════════
    // BOOKING FLOW:
    //   [STEP 0] /trips        — เลือกรอบออกเดินทาง (หน้านี้)
    //   [STEP 1] /booking/seats — เลือกที่นั่ง + เพศ (seatchart.js)
    //   [STEP 2] /booking/form  — กรอกข้อมูลผู้โดยสาร
    //   [STEP 3] /booking/payment — ชำระเงิน
    //   [DONE]  /booking/ticket — ตั๋วยืนยัน
    // ════════════════════════════════════════════════════════════

    const MONTHS_TH = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม']
    const ROWS_LABEL = 'ABCDEFGHIJKLMNOP'.split('')

    /** ที่นั่งผู้โดยสาร (ไม่นับที่นั่ง 1 — staff/driver block ในแผนที่) */
    function passengerSeatCap(totalSeats) {
      return Math.max(0, (Number(totalSeats) || 0) - 1)
    }

    function escapeTripHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
    }

    function buildTripDetailsHtml(t) {
      const blocks = []
      if (t.description && String(t.description).trim()) {
        blocks.push(`<div class="bk-desc-block"><div class="bk-desc-title"><i class="bi bi-journal-text"></i> รายละเอียด</div><p class="bk-desc-body">${escapeTripHtml(t.description)}</p></div>`)
      }
      const posts = (t.contents || []).filter((c) => c.type === 'TRIP_POST' && c.isActive !== false)
      for (const c of posts) {
        blocks.push(`<div class="bk-desc-block"><div class="bk-desc-title"><i class="bi bi-file-text"></i> ${escapeTripHtml(c.title)}</div>${c.body ? `<p class="bk-desc-body">${escapeTripHtml(c.body)}</p>` : ''}</div>`)
      }
      if (t.country) {
        blocks.push(`<div class="bk-desc-block"><p class="bk-desc-body"><strong>ประเทศ/พื้นที่</strong> ${escapeTripHtml(t.country)}</p></div>`)
      }
      if (!blocks.length) {
        blocks.push('<div class="bk-desc-block"><p class="bk-desc-body">ยังไม่มีรายละเอียดเพิ่มเติมสำหรับทริปนี้</p></div>')
      }
      return `<div class="bk-trip-details-stack">${blocks.join('')}</div>`
    }

    /** คลิกแล้วขยาย/ย่อรายละเอียดใน card เดียวกัน (ไม่ใช้ popup) */
    window.toggleTripDetailsPanel = async function (tripId, btn) {
      const tid = Number(tripId) > 0 ? Number(tripId) : (selTrip?.id || 0)
      if (!tid || !btn) return
      const wrap = btn.closest('.bk-trip-details-wrap')
      if (!wrap) return
      const panel = wrap.querySelector('.bk-trip-details-panel')
      const label = btn.querySelector('.bk-btn-details-label')
      if (!panel) return

      const opening = panel.hidden
      if (!opening) {
        panel.hidden = true
        btn.classList.remove('is-open')
        btn.setAttribute('aria-expanded', 'false')
        if (label) label.textContent = 'รายละเอียดทริป'
        return
      }

      panel.hidden = false
      btn.classList.add('is-open')
      btn.setAttribute('aria-expanded', 'true')
      if (label) label.textContent = 'ซ่อนรายละเอียด'

      if (wrap.dataset.loaded === '1') return

      panel.innerHTML = '<p class="bk-trip-details-loading">กำลังโหลด...</p>'
      try {
        const t = await apiFetch(`/trips/${tid}`)
        if (!wrap.isConnected) return
        panel.innerHTML = buildTripDetailsHtml(t)
        wrap.dataset.loaded = '1'
      } catch (e) {
        if (!wrap.isConnected) return
        panel.innerHTML = `<p class="bk-trip-details-error">${escapeTripHtml(e?.message || String(e))}</p>`
      }
    }

    // ── state ─────────────────────────────────────────────────
    const now = new Date()
    let curYear = now.getFullYear()
    let curMonth = now.getMonth()
    let allRounds = []
    let tripCache = new Map()
    let selectedRound = null

    // ── Unified interactive seat selection (desktop + mobile) ────
    let selSeats = {}    // { seatNum: 'MALE'|'FEMALE' }
    let gsPending = null  // { num, label } awaiting gender confirm
    let gsPicked = null  // gender picked in sheet (pre-confirm)
    let selApiData = null  // { totalSeats, apiSeats }
    let selRound = null  // current round object
    let selTrip = null  // current trip object
    let selTarget = null  // 'mobile' | 'desktop'

    // ── month select ──────────────────────────────────────────
    const monthSel = document.getElementById('monthSelect')
    MONTHS_TH.forEach((m, i) => {
      const o = document.createElement('option')
      o.value = i; o.textContent = m; monthSel.appendChild(o)
    })

    function updateDisplay() {
      document.getElementById('yearDisplay').textContent = curYear
      monthSel.value = curMonth
    }

    window.changeYear = d => { curYear += d; updateDisplay(); loadData() }
    window.changeMonth = d => {
      curMonth += d
      if (curMonth < 0) { curMonth = 11; curYear-- }
      if (curMonth > 11) { curMonth = 0; curYear++ }
      updateDisplay(); loadData()
    }
    window.onMonthChange = () => { curMonth = +monthSel.value; updateDisplay(); loadData() }
    updateDisplay()

    async function syncBrandNameFromHome() {
      try {
        const s = await getSettings()
        if (!s?.site_name) return
        const logoTextEl = document.querySelector('.lp-logo-text')
        if (logoTextEl) logoTextEl.textContent = s.site_name
      } catch (_) { }
    }

    // ════════════════════════════════════════════════════════════
    // [STEP 0] LOAD ROUNDS — แสดงรายการรอบออกเดินทางในเดือนนั้น
    // ════════════════════════════════════════════════════════════
    async function loadData(search = '') {
      showSkeletons()
      selectedRound = null
      resetBookingCard()

      try {
        let rounds, trips

        if (search) {
          // ── search mode: ค้นหาจากชื่อทริป ──
          trips = await apiFetch(`/trips?search=${encodeURIComponent(search)}&active=true`)
          const tripIds = trips.map(t => t.id)
          if (!tripIds.length) { allRounds = []; renderList([]); return }
          rounds = await apiFetch(`/bus-rounds?month=${curMonth}&year=${curYear}`)
          rounds = rounds.filter(r => tripIds.includes(r.tripId))
          for (const t of trips) tripCache.set(t.id, t)
          document.getElementById('listLabel').textContent = `ผลการค้นหา "${search}"`
        } else {
          // ── normal mode: โหลดรอบทั้งหมดของเดือน ──
          ;[rounds, trips] = await Promise.all([
            apiFetch(`/bus-rounds?month=${curMonth}&year=${curYear}`),
            apiFetch('/trips?active=true'),
          ])
          for (const t of trips) tripCache.set(t.id, t)
          document.getElementById('listLabel').textContent =
            `รอบออกเดินทาง ${MONTHS_TH[curMonth]} ${curYear}`
        }

        // เรียงตามวันออกเดินทาง
        rounds.sort((a, b) => new Date(a.departDate) - new Date(b.departDate))
        allRounds = rounds
        renderList(rounds)
      } catch (e) {
        document.getElementById('roundList').innerHTML =
          '<div class="list-empty"><i class="bi bi-exclamation-circle"></i><p>โหลดข้อมูลไม่ได้</p></div>'
      }
    }

    // ── render round list ─────────────────────────────────────
    function renderList(rounds) {
      const el = document.getElementById('roundList')
      document.getElementById('listCount').textContent = rounds.length ? `${rounds.length} รอบ` : ''

      if (!rounds.length) {
        el.innerHTML = `<div class="list-empty">
      <i class="bi bi-calendar-x"></i>
      <p>ไม่มีรอบออกเดินทาง<br>ในเดือน${MONTHS_TH[curMonth]} ${curYear}</p>
    </div>`
        return
      }

      // จัดกลุ่มตามทริป
      const grouped = new Map()
      for (const r of rounds) {
        if (!grouped.has(r.tripId)) grouped.set(r.tripId, { trip: tripCache.get(r.tripId), rounds: [] })
        grouped.get(r.tripId).rounds.push(r)
      }

      let html = ''
      for (const [tripId, { trip, rounds: tRounds }] of grouped) {
        const tripTitle = trip?.title || `ทริป #${tripId}`

        for (const r of tRounds) {
          const passengerCap = passengerSeatCap(r.totalSeats)
          const passengerLeft = Math.max(0, passengerCap - (r.bookedSeats || 0))
          const pct = passengerCap > 0 ? Math.round((r.bookedSeats || 0) / passengerCap * 100) : 0
          const full = passengerLeft <= 0 || !r.isOpen
          const isLow = !full && pct >= 60
          const dotCls = full ? 'dot-full' : isLow ? 'dot-low' : 'dot-ok'
          const dept = new Date(r.departDate)
          const dateStr = dept.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' })
          const roundName = r.roundname || r.roudeStack?.roundname || dateStr

          const badgeHtml = `<div class="round-badge-wrap">
                   <span class="round-badge ${passengerLeft <= 0 ? 'badge-full' : 'badge-price'}">
                     ${passengerLeft <= 0 ? 'เต็ม' : `ที่ว่าง ${passengerLeft}/${passengerCap}`}
                   </span>
                 </div>`

          html += `
        <div class="round-row${full ? ' is-full' : ''}" id="rr-${r.id}"
             onclick="${full ? '' : `selectRound(${r.id})`}" data-round-id="${r.id}">
          <div class="round-dot ${dotCls}"></div>
          <div class="round-info">
            <div class="round-row-top">
              <span class="r-time-tag">${roundName}</span>
              <span class="r-trip-tag">${tripTitle}</span>
            </div>
          </div>
          ${badgeHtml}
        </div>`
        }
      }

      el.innerHTML = html
    }

    function showSkeletons() {
      document.getElementById('roundList').innerHTML = Array.from({ length: 8 }, () => `
    <div class="skel-row">
      <div class="skel-dot"></div>
      <div style="flex:1">
        <div class="skel-line mb-1" style="height:11px;width:${40 + Math.random() * 40}%"></div>
        <div class="skel-line"      style="height:9px; width:${30 + Math.random() * 30}%"></div>
      </div>
      <div class="skel-line" style="height:20px;width:55px;border-radius:20px"></div>
    </div>`).join('')
      document.getElementById('listCount').textContent = ''
    }

    // ════════════════════════════════════════════════════════════
    // [STEP 0 → STEP 1] SELECT ROUND
    // desktop  → อัปเดต right panel (white card)
    // mobile   → เปิด full-screen overlay
    // ════════════════════════════════════════════════════════════
    window.selectRound = function (roundId) {
      document.querySelectorAll('.round-row').forEach(el => el.classList.remove('selected'))
      document.getElementById(`rr-${roundId}`)?.classList.add('selected')

      const round = allRounds.find(r => r.id === roundId)
      if (!round) return
      selectedRound = round
      selSeats = {}
      selRound = round
      selTrip = tripCache.get(round.tripId)

      // Render immediately with estimated seat data — no API wait
      const estApiSeats = buildEstApiSeats(round.bookedSeats, round.totalSeats)
      selApiData = { totalSeats: round.totalSeats, apiSeats: estApiSeats }

      if (window.innerWidth < 768) {
        selTarget = 'mobile'
        renderSelCard(round, selTrip, round.totalSeats, estApiSeats)
        openMobileOverlay(round, selTrip)
      } else {
        selTarget = 'desktop'
        renderSelCard(round, selTrip, round.totalSeats, estApiSeats)
      }

      // Upgrade with real seat data in background
      apiFetch(`/seat-bookings/round/${round.id}`)
        .then(data => {
          if (selectedRound?.id !== roundId) return
          const apiSeats = data.seats || {}
          const totalSeats = data.totalSeats || round.totalSeats
          selApiData = { totalSeats, apiSeats }
          renderSelCard(round, selTrip, totalSeats, apiSeats)
        })
        .catch(() => { })
    }

    // ════════════════════════════════════════════════════════════
    // BUILD BOOKING CARD CONTENT
    // ใช้ได้ทั้ง desktop (bkCard) และ mobile overlay (mCard)
    // ════════════════════════════════════════════════════════════
    function buildCardHTML(round, trip) {
      const dept = new Date(round.departDate)
      const dateStr = dept.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
      const timeStr = dept.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
      const passengerCap = passengerSeatCap(round.totalSeats)
      const passengerLeft = Math.max(0, passengerCap - (round.bookedSeats || 0))
      const pct = passengerCap > 0 ? Math.round((round.bookedSeats || 0) / passengerCap * 100) : 0
      const full = passengerLeft <= 0 || !round.isOpen
      const barCls = pct >= 90 ? 'full' : pct >= 60 ? 'low' : 'ok'
      const price = trip ? Number(trip.price + (round.extraPrice || 0)) : 0
      const deposit = trip?.deposit || 0

      // [VISUAL] Static seat grid — preview เท่านั้น ไม่ interactive
      // การเลือกที่นั่งจริงจะทำใน /booking/seats (STEP 1)
      const seatHtml = buildSeatGrid(round.totalSeats, round.bookedSeats)

      return `
    <!-- Header -->
    <div class="bk-header">
      <button class="bk-back" onclick="deselectRound()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div class="bk-header-text">
        <div class="bk-header-title">เลือกที่นั่ง</div>
        <div class="bk-header-sub">${trip?.title || ''} · รถคันที่ ${round.busNumber || 1}</div>
      </div>
    </div>

    <!-- Price info -->
    <div class="bk-price-bar">
      <div class="bk-price-left">ราคาต่อที่นั่ง</div>
      <div style="text-align:right">
        <div class="bk-price-main">฿${price.toLocaleString()}</div>
        ${deposit ? `<div class="bk-price-dep">มัดจำ ฿${Number(deposit).toLocaleString()}/ที่นั่ง</div>` : ''}
      </div>
    </div>

    <!-- [VISUAL PREVIEW] Static seat layout — not interactive
         Seat selection happens on /booking/seats page (STEP 1) -->
    <div class="bk-seat-area">
      <div class="seat-staff-row">
        <div class="seat-staff-box"><i class="bi bi-person-badge-fill"></i>STAFF</div>
        <div style="flex:1"></div>
        <div class="seat-driver-box"><i class="bi bi-person-workspace"></i>DRIVER</div>
      </div>
      <div class="seat-grid">${seatHtml}</div>
    </div>

    <!-- Legend -->
    <div class="seat-legend">
      <div class="legend-item"><div class="legend-dot ld-avail"></div>ว่าง</div>
      <div class="legend-item"><div class="legend-dot ld-fem"></div>♀ จองแล้ว</div>
      <div class="legend-item"><div class="legend-dot ld-mal"></div>♂ จองแล้ว</div>
    </div>

    <!-- Footer -->
    <div class="bk-footer">
      <div class="bk-footer-meta">
        <div class="bk-meta-date"><i class="bi bi-calendar3 me-1"></i>${dateStr} · ${timeStr}</div>
        <div class="bk-meta-seats ${barCls}">เหลือ ${passengerLeft}/${passengerCap}</div>
      </div>
      <div class="bk-bar"><div class="bk-bar-fill ${barCls}" style="width:${pct}%"></div></div>

      <!-- [ACTION] คลิก → ไป STEP 1 (/booking/seats) เพื่อเลือกที่นั่งจริง -->
      <button class="bk-btn-book" ${full ? 'disabled' : ''}
              onclick="goToSeatSelection(${round.id})">
        ${full
          ? 'ที่นั่งเต็มแล้ว'
          : '<i class="bi bi-ticket-perforated"></i>จองทริปนี้เลย'}
      </button>
    </div>`
    }

    function updateBookingCard(round, trip, targetId) {
      document.getElementById(targetId).innerHTML = buildCardHTML(round, trip)
    }

    // ── static seat grid (visual preview only) ────────────────
    function buildSeatGrid(total, booked) {
      const maxShow = 18
      const showCount = Math.min(total, maxShow)
      const seats = []

      for (let i = 0; i < showCount; i++) {
        const row = ROWS_LABEL[Math.floor(i / 3)]
        const col = (i % 3) + 1
        const label = `${row}${col}`

        if (i < booked) {
          // สลับสีหญิง/ชาย เพื่อ visual เท่านั้น
          const cls = i % 2 === 0 ? 's-fem' : 's-mal'
          seats.push(`<div class="seat-box ${cls}"><i class="bi bi-person-fill"></i><span>${label}</span></div>`)
        } else {
          seats.push(`<div class="seat-box s-avail"><i class="bi bi-person" style="opacity:.3"></i><span>${label}</span></div>`)
        }
      }

      if (total > maxShow) {
        const more = total - maxShow
        seats.push(`<div class="seat-box s-more" style="grid-column:span 3;aspect-ratio:auto;padding:.4rem;font-size:.72rem">+${more} ที่นั่ง</div>`)
      }

      return seats.join('')
    }

    function resetBookingCard() {
      document.getElementById('bkCard').innerHTML = `
    <div class="bk-empty">
      <div class="bk-empty-icon"><i class="bi bi-compass-fill"></i></div>
      <h3>เลือกทริปที่คุณสนใจ</h3>
      <p>เลือกรอบออกเดินทางจากรายการด้านซ้าย<br>เพื่อดูข้อมูลและจองที่นั่ง</p>
      <div class="bk-empty-hint"><i class="bi bi-arrow-left"></i> คลิกเลือกรอบจากรายการ</div>
    </div>`
    }

    window.deselectRound = function () {
      selectedRound = null
      document.querySelectorAll('.round-row').forEach(el => el.classList.remove('selected'))
      resetBookingCard()
      closeMobileOverlay()
    }

    // ════════════════════════════════════════════════════════════
    // [FLOW ACTION] ไป STEP 1: /booking/seats
    // seats.html จะ:
    //   • แสดง seatchart.js ที่นั่งจริง
    //   • สร้าง booking session
    //   • navigate ไป /booking/form?token=xxx (STEP 2)
    // ════════════════════════════════════════════════════════════
    window.goToSeatSelection = function (roundId) {
      // → STEP 1: เลือกที่นั่ง
      window.location.href = `/booking/seats?roundId=${roundId}`
    }

    // ════════════════════════════════════════════════════════════
    // MOBILE OVERLAY — full-screen slide-up
    // แสดง: step bar + ข้อมูลรอบ + seat preview + ปุ่มจอง
    // ════════════════════════════════════════════════════════════
    function openMobileOverlay(round, trip) {
      document.getElementById('mNavTitle').textContent = trip?.title || 'รายละเอียดทริป'
      document.getElementById('mOverlay').classList.add('open')
      document.body.style.overflow = 'hidden'
    }

    window.closeMobileOverlay = function () {
      document.getElementById('mOverlay').classList.remove('open')
      document.body.style.overflow = ''
    }

    // swipe down to close mobile overlay
    const mOverlay = document.getElementById('mOverlay')
    let _sy = 0
    mOverlay.addEventListener('touchstart', e => { _sy = e.touches[0].clientY }, { passive: true })
    mOverlay.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - _sy > 80) closeMobileOverlay()
    })

    // ════════════════════════════════════════════════════════════
    // INTERACTIVE SEAT SELECTION — desktop + mobile unified
    // ════════════════════════════════════════════════════════════

    // Build estimated seat data for immediate render (no API wait)
    function buildEstApiSeats(bookedCount, totalSeats) {
      const cap = passengerSeatCap(totalSeats)
      const n = Math.min(Number(bookedCount) || 0, cap)
      const apiSeats = {}
      for (let i = 0; i < n; i++) {
        apiSeats[i + 2] = { status: 'BOOKED', gender: i % 2 === 0 ? 'FEMALE' : 'MALE' }
      }
      return apiSeats
    }

    function buildSelGrid(totalSeats, apiSeats) {
      const maxShow = 18
      const showCount = Math.min(totalSeats, maxShow)
      const seats = []

      for (let i = 0; i < showCount; i++) {
        const seatNum = i + 2
        const label = String(seatNum)
        const api = apiSeats[seatNum]
        const mySel = selSeats[seatNum]

        if (api && api.status === 'BOOKED') {
          const cls = api.gender === 'FEMALE' ? 's-fem' : 's-mal'
          seats.push(`<div class="seat-box ${cls}"><i class="bi bi-person-fill"></i><span>${label}</span></div>`)
        } else if (mySel) {
          const cls = mySel === 'FEMALE' ? 's-sel-f' : 's-sel-m'
          const gIcon = mySel === 'FEMALE' ? '♀' : '♂'
          seats.push(`<div class="seat-box ${cls}" onclick="seatToggle(${seatNum})"><span style="font-size:.85rem;line-height:1">${gIcon}</span><span>${label}</span></div>`)
        } else {
          seats.push(`<div class="seat-box s-avail m-pick" onclick="seatClick(${seatNum},'${label}')"><i class="bi bi-person" style="opacity:.3"></i><span>${label}</span></div>`)
        }
      }

      if (totalSeats > maxShow) {
        seats.push(`<div class="seat-box s-more" style="grid-column:span 3;aspect-ratio:auto;padding:.4rem;font-size:.72rem">+${totalSeats - maxShow} ที่นั่ง</div>`)
      }
      return seats.join('')
    }

    function renderSelCard(round, trip, totalSeats, apiSeats) {
      const targetId = selTarget === 'mobile' ? 'mCard' : 'bkCard'
      const dept = new Date(round.departDate)
      const dateStr = dept.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
      const timeStr = dept.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
      const passengerCap = passengerSeatCap(totalSeats)
      const booked = Object.values(apiSeats).filter(s => s.status === 'BOOKED').length
      const left = Math.max(0, passengerCap - booked)
      const full = left <= 0 || !round.isOpen
      const price = trip ? Number(trip.price + (round.extraPrice || 0)) : 0
      const deposit = trip?.deposit || 0

      document.getElementById(targetId).innerHTML = `
    <!-- Formal Header -->
    <div class="bk-header-main">
      <button class="bk-back" style="position:absolute; left:1rem; top:1.2rem;" onclick="deselectRound()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div style="padding-left: 2.2rem;">
        <div class="bk-trip-name">${trip?.title || 'ไม่มีชื่อทริป'}</div>
        <div class="bk-bus-info">
          <i class="bi bi-truck-front"></i> รถตู้คันที่ ${round.busNumber || 1}
        </div>
      </div>
    </div>

    <!-- Brief Info Grid -->
    <div class="bk-info-grid">
      <div class="bk-info-item">
        <div class="bk-info-label">ชื่อรอบ</div>
        <div class="bk-info-value">${round.roudeStack?.roundname || '—'}</div>
      </div>
      <div class="bk-info-item">
        <div class="bk-info-label">ระยะเวลา</div>
        <div class="bk-info-value">${round.duration || '—'}</div>
      </div>
      <div class="bk-info-item">
        <div class="bk-info-label">เหลือ</div>
        <div class="bk-info-value">${left} / ${passengerCap}</div>
      </div>
    </div>

    <!-- Pricing Summary -->
    <div class="bk-pricing-section">
      <div class="bk-price-row">
        <div class="bk-price-label">ค่าบริการต่อท่าน</div>
        <div class="bk-price-main-val">฿${price.toLocaleString()}</div>
      </div>
      ${deposit ? `
      <div class="bk-deposit-sub">
        ชำระมัดจำเพียง ฿${Number(deposit).toLocaleString()} ต่อที่นั่ง
      </div>` : ''}
    </div>

    <div id="selBar" style="display:none; padding:1rem 1.2rem; background:#f0fdf4; border-top:1px solid #d1fae5; justify-content:space-between; align-items:center;"></div>

    ${trip?.id ? `
    <div class="bk-trip-details-wrap bk-trip-details-wrap--prefooter">
      <button type="button" class="bk-btn-details bk-btn-details--toggle" aria-expanded="false"
              onclick="toggleTripDetailsPanel(${trip.id}, this)">
        <span class="bk-btn-details-label">รายละเอียดทริป</span>
        <i class="bi bi-chevron-down bk-btn-details-chevron" aria-hidden="true"></i>
      </button>
      <div class="bk-trip-details-panel" hidden></div>
    </div>` : ''}

      <div class="bk-footer-premium">
        <button class="bk-btn-booking" ${full ? 'disabled' : ''} onclick="seatProceed(${round.id})">
          ${full ? 'ที่นั่งเต็มแล้ว' : '<i class="bi bi-ticket-perforated-fill"></i> จองทริปนี้เลย'}
        </button>
      </div>`
    }

    function refreshSelGrid() {
      if (!selApiData) return
      const { totalSeats, apiSeats } = selApiData
      const grid = document.getElementById('selGrid')
      if (grid) grid.innerHTML = buildSelGrid(totalSeats, apiSeats)

      const cnt = Object.keys(selSeats).length
      const bar = document.getElementById('selBar')
      if (!bar) return

      if (cnt > 0) {
        const price = selTrip ? Number(selTrip.price + (selRound?.extraPrice || 0)) : 0
        bar.style.display = 'flex'
        bar.innerHTML = `
      <div style="display:flex; flex-direction:column;">
        <span style="font-size:.7rem; font-weight:700; color:#047857; text-transform:uppercase;">ที่นั่งที่เลือก</span>
        <span style="font-size:.9rem; font-weight:800; color:#047857;">${cnt} ที่นั่ง</span>
      </div>
      <div style="text-align:right;">
        <span style="font-size:.7rem; font-weight:700; color:#047857; text-transform:uppercase;">รวมเป็นเงิน</span>
        <div style="font-size:1.1rem; font-weight:800; color:#059669;">฿${(price * cnt).toLocaleString()}</div>
      </div>`
      } else {
        bar.style.display = 'none'
      }
    }

    // ── Gender sheet handlers ─────────────────────────────────────
    window.seatClick = function (num, label) {
      gsPending = { num, label }
      gsPicked = null
      document.getElementById('mGsLabel').textContent = `ที่นั่ง ${label}`
      document.getElementById('mGsMale').className = 'm-gs-card'
      document.getElementById('mGsFemale').className = 'm-gs-card'
      document.getElementById('mGsOk').disabled = true
      document.getElementById('mGsOk').style.opacity = '.45'
      document.getElementById('mGs').classList.add('open')
    }

    window.seatToggle = function (num) {
      delete selSeats[num]
      refreshSelGrid()
    }

    window.mPickGender = function (g) {
      gsPicked = g
      document.getElementById('mGsMale').className = 'm-gs-card' + (g === 'MALE' ? ' sel-m' : '')
      document.getElementById('mGsFemale').className = 'm-gs-card' + (g === 'FEMALE' ? ' sel-f' : '')
      document.getElementById('mGsOk').disabled = false
      document.getElementById('mGsOk').style.opacity = '1'
    }

    window.mConfirmGender = function () {
      if (!gsPending || !gsPicked) return
      selSeats[gsPending.num] = gsPicked
      gsPending = null
      gsPicked = null
      document.getElementById('mGs').classList.remove('open')
      refreshSelGrid()
    }

    window.mCancelGender = function (e) {
      if (e && e.target !== document.getElementById('mGs')) return
      gsPending = null
      gsPicked = null
      document.getElementById('mGs').classList.remove('open')
    }

    // ── Proceed: navigate to seats.html (with optional presel) ────
    window.seatProceed = function (roundId) {
      const cnt = Object.keys(selSeats).length
      if (!cnt) { window.location.href = `/booking/seats?roundId=${roundId}`; return }
      const presel = Object.entries(selSeats).map(([n, g]) => `${n}:${g}`).join(',')
      window.location.href = `/booking/seats?roundId=${roundId}&presel=${encodeURIComponent(presel)}`
    }

    // ── Search ────────────────────────────────────────────────
    let timer
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch() })
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(timer)
      timer = setTimeout(() => loadData(e.target.value.trim()), 400)
    })
    window.doSearch = () => loadData(document.getElementById('searchInput').value.trim())

    // ── Init ─────────────────────────────────────────────────
    const urlParams = new URLSearchParams(location.search)
    if (urlParams.get('tripId')) {
      loadData().then(() => {
        const r = allRounds.find(x => x.tripId === Number(urlParams.get('tripId')))
        if (r) selectRound(r.id)
      })
    } else {
      loadData()
    }
    syncBrandNameFromHome()
  </script>
</body>

</html>
