<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบสถานะการจอง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Sarabun',sans-serif; background:#f0f4f8; min-height:100vh; }
        .brand-bar { background:#fff; border-bottom:3px solid #0d6efd; padding:.75rem 1.5rem; display:flex; align-items:center; gap:.75rem; }
        .search-box { max-width:500px; margin:2rem auto; }
        .filter-bar { max-width:680px; margin:1.5rem auto 2rem; display:flex; gap:.75rem; flex-wrap: wrap; align-items:center; }
        .filter-btn { padding:.5rem .75rem; font-size:.85rem; border-radius:20px; border:1px solid #dee2e6; background:#fff; cursor:pointer; transition:all .2s; }
        .filter-btn:hover { border-color:#0d6efd; background:#f0f7ff; }
        .filter-btn.active { background:#0d6efd; color:#fff; border-color:#0d6efd; }
        .results-wrap { max-width:680px; margin:0 auto 4rem; }
        .booking-card { background:#fff; border-radius:.75rem; border:1px solid #dee2e6; margin-bottom:1.25rem; overflow:hidden; transition:all .2s; }
        .booking-card:hover { border-color:#0d6efd; box-shadow:0 4px 12px rgba(13,110,253,0.1); }
        .booking-card-header { padding:1rem 1.25rem; border-bottom:1px solid #f0f0f0; }
        .booking-card-body { padding:1.25rem; }
        /* Pipeline tracker */
        .pipeline { display:flex; align-items:flex-start; gap:0; position:relative; }
        .pipe-step { flex:1; text-align:center; position:relative; }
        .pipe-step::before {
            content:''; position:absolute; top:16px; left:50%; right:-50%;
            height:3px; background:#dee2e6; z-index:0;
        }
        .pipe-step:last-child::before { display:none; }
        .pipe-icon {
            width:34px; height:34px; border-radius:50%; border:3px solid #dee2e6;
            background:#fff; display:flex; align-items:center; justify-content:center;
            margin:0 auto 6px; position:relative; z-index:1; font-size:.9rem;
        }
        .pipe-step.done .pipe-icon    { background:#198754; border-color:#198754; color:#fff; }
        .pipe-step.active .pipe-icon  { background:#e9ecef; border-color:#adb5bd; color:#495057; }
        .pipe-step.pending .pipe-icon { background:#fff; border-color:#dee2e6; color:#adb5bd; }
        .pipe-step.done::before    { background:#198754; }
        .pipe-step.active::before  { background:linear-gradient(to right,#198754,#dee2e6); }
        .pipe-label { font-size:.72rem; color:#adb5bd; font-weight:500; line-height:1.2; }
        .pipe-step.done .pipe-label   { color:#198754; font-weight:600; }
        .pipe-step.active .pipe-label { color:#6c757d; font-weight:600; }
        .seat-chip { display:inline-flex; align-items:center; gap:.35rem; background:#f8f9fa; border:1px solid #dee2e6; border-radius:6px; padding:.25rem .5rem; font-size:.78rem; font-weight:600; }
        @media print { .no-print { display:none !important; } body { background:#fff; } }
    </style>
</head>
<body>

<!-- Brand bar -->
<div class="brand-bar no-print">
    <i class="bi bi-bus-front text-primary fs-4"></i>
    <span style="font-size:1.1rem;font-weight:700;color:#0d6efd">ตรวจสอบสถานะการจอง</span>
    <div class="ms-auto d-flex gap-2">
        <a href="/" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-house me-1"></i>หน้าหลัก
        </a>
        <a href="/trips" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-grid me-1"></i>ดูทริปทั้งหมด
        </a>
    </div>
</div>

<!-- Search -->
<div class="search-box px-3 no-print">
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="fw-bold mb-1"><i class="bi bi-search me-2 text-primary"></i>ค้นหาด้วยเบอร์โทรศัพท์</h5>
            <p class="text-muted small mb-3">กรอกเบอร์โทรที่ใช้ตอนจอง เพื่อดูสถานะการจองของคุณ</p>
            <div class="d-flex gap-2">
                <input type="tel" class="form-control" id="phoneInput"
                    placeholder="08x-xxx-xxxx" maxlength="10" inputmode="tel"
                    onkeydown="if(event.key==='Enter')doSearch()">
                <button class="btn btn-primary px-4" onclick="doSearch()" id="btnSearch">
                    <i class="bi bi-search me-1"></i>ค้นหา
                </button>
            </div>
            <div id="searchHint" class="form-text mt-1">
                <i class="bi bi-info-circle me-1"></i>เบอร์โทรที่ใช้ในขั้นตอน "ข้อมูลผู้จอง"
            </div>
        </div>
    </div>
</div>

<!-- Results -->
<div class="results-wrap px-3" id="results"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/src/assets/js/config.js"></script>
<script>
const SESSION_TOKEN_KEY = 'bk_session_token'

// ── Pre-fill: token (URL หรือ localStorage ล่าสุด) → โหลด session ก่อน; หรือ phone จาก URL ──
document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(location.search);
    const phoneFromUrl = params.get('phone');
    const tokenFromUrl = params.get('token');
    const storedToken = localStorage.getItem(SESSION_TOKEN_KEY);
    const token = tokenFromUrl || storedToken || null;

    if (phoneFromUrl) {
        document.getElementById('phoneInput').value = phoneFromUrl.replace(/[-\s]/g, '');
        await doSearch();
        return;
    }
    if (token) {
        if (tokenFromUrl) localStorage.setItem(SESSION_TOKEN_KEY, tokenFromUrl);
        await loadStatusByToken(token);
    }
});

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
    const phone = document.getElementById('phoneInput').value.trim().replace(/[-\s]/g,'');
    if (!phone || phone.length < 9) {
        showHint('กรุณากรอกเบอร์โทรให้ถูกต้อง (9-10 หลัก)', 'text-danger');
        return;
    }

    const btn = document.getElementById('btnSearch');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังค้นหา...';
    document.getElementById('results').innerHTML = '';
    showHint('');

    try {
        // ดึงข้อมูลรอบรถล่าสุดก่อนในลำดับคำขอ แล้วคู่กับ session (รันคู่ขนาน ลดเวลา stale)
        const settled = await Promise.allSettled([
            fetchJSON('/bus-rounds'),
            fetchJSON(`/booking-sessions/by-phone?phone=${encodeURIComponent(phone)}`)
        ]);
        const rounds = settled[0].status === 'fulfilled' ? settled[0].value : [];
        if (settled[1].status !== 'fulfilled') throw settled[1].reason;
        const sessions = settled[1].value;

        renderResults(sessions, rounds, phone);
    } catch (e) {
        document.getElementById('results').innerHTML =
            `<div class="alert alert-danger mt-3"><i class="bi bi-exclamation-triangle me-2"></i>${e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่'}</div>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search me-1"></i>ค้นหา';
    }
}

/** โหลดจาก token (ล่าสุดจาก URL หรือ localStorage): bus-rounds + session คู่ขนาน */
async function loadStatusByToken(token) {
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = `<div class="text-center py-4 text-muted"><span class="spinner-border spinner-border-sm me-2"></span>กำลังโหลดข้อมูลล่าสุด…</div>`;

    const settled = await Promise.allSettled([
        fetchJSON('/bus-rounds'),
        fetchJSON('/booking-sessions/' + encodeURIComponent(token))
    ]);
    const rounds = settled[0].status === 'fulfilled' ? settled[0].value : [];

    if (settled[1].status !== 'fulfilled') {
        const err = settled[1].reason;
        const st = err.status || 0;
        if (localStorage.getItem(SESSION_TOKEN_KEY) === token) localStorage.removeItem(SESSION_TOKEN_KEY);
        const msg = st === 410 ? 'ลิงก์จองหมดอายุแล้ว กรุณาค้นหาด้วยเบอร์โทร' : (st === 404 ? 'ไม่พบรายการจองจาก token นี้' : (err.message || 'โหลดไม่สำเร็จ'));
        resultsEl.innerHTML = `<div class="alert alert-warning mt-3"><i class="bi bi-info-circle me-2"></i>${msg}</div>`;
        return;
    }

    const session = settled[1].value;
    localStorage.setItem(SESSION_TOKEN_KEY, token);

    const phoneGuess = (session.customerData && session.customerData.mainPhone)
        || (Array.isArray(session.selectedSeats) && session.selectedSeats[0] && session.selectedSeats[0].phone)
        || '';
    if (phoneGuess) {
        document.getElementById('phoneInput').value = String(phoneGuess).replace(/[-\s]/g, '');
    }

    renderResults([session], rounds, phoneGuess || '—');
    showHint('<i class="bi bi-key me-1"></i>แสดงจาก token ล่าสุด — ค้นหาด้วยเบอร์เพื่อดูรายการทั้งหมด', 'text-muted');
}

function showHint(msg, cls = 'text-muted') {
    const el = document.getElementById('searchHint');
    el.className = `form-text mt-1 ${cls}`;
    el.innerHTML = msg || '<i class="bi bi-info-circle me-1"></i>เบอร์โทรที่ใช้ในขั้นตอน "ข้อมูลผู้จอง"';
}

// ── Render results ─────────────────────────────────────────────────────────────
function renderResults(sessions, rounds, phone) {
    const el = document.getElementById('results');

    if (!sessions.length) {
        el.innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-inbox text-muted" style="font-size:3rem"></i>
                <p class="text-muted mt-3">ไม่พบการจองสำหรับเบอร์ <strong>${phone}</strong></p>
                <p class="text-muted small">ตรวจสอบเบอร์โทรอีกครั้ง หรือ <a href="/trips">จองใหม่</a></p>
            </div>`;
        return;
    }

    el.innerHTML = `
        <div class="d-flex align-items-center justify-content-between my-3">
            <div class="fw-semibold">พบ ${sessions.length} รายการจอง</div>
            <button class="btn btn-sm btn-outline-secondary no-print" onclick="window.print()">
                <i class="bi bi-printer me-1"></i>พิมพ์
            </button>
        </div>` +
        sessions.map(s => renderBookingCard(s, rounds)).join('');
}

function renderBookingCard(session, rounds) {
    let cd = session.customerData || {};
    const seats = session.selectedSeats || [];
    
    // Fallback: if customerData is missing, use info from first passenger
    if (!cd.mainName && seats.length > 0) {
        cd = {
            mainName: seats[0].passengerName || [seats[0].firstName, seats[0].lastName].filter(Boolean).join(' '),
            mainPhone: seats[0].phone,
            mainLine: seats[0].line
        };
    }

    const round = rounds.find(r => r.id == session.busRoundId);
    const trip = round?.trip;

    // ── Determine pipeline step ───────────────────────────────────────────────
    // Steps: 1=เลือกที่นั่ง, 2=ข้อมูล, 3=ประกัน, 4=ชำระ, 5=ยืนยันแล้ว
    const currentStep = session.step || 1;
    const pipeline = [
        { label:'เลือกที่นั่ง',  icon:'bi-geo-alt',         step:1 },
        { label:'ข้อมูล',         icon:'bi-person-fill',     step:2 },
        { label:'ประกัน',         icon:'bi-shield-check',    step:3 },
        { label:'ชำระเงิน',       icon:'bi-credit-card',     step:4 },
        { label:'ยืนยันแล้ว',     icon:'bi-check-circle-fill',step:5 },
    ];

    const pipeHtml = pipeline.map(p => {
        let cls = 'pending';
        if (p.step < currentStep)  cls = 'done';
        if (p.step === currentStep) cls = 'active';
        return `
            <div class="pipe-step ${cls}">
                <div class="pipe-icon"><i class="bi ${p.icon}"></i></div>
                <div class="pipe-label">${p.label}</div>
            </div>`;
    }).join('');

    // ── Step label & color ────────────────────────────────────────────────────
    const STEP_LABEL = {
        1:'รอเลือกที่นั่ง',
        2:'กรอกข้อมูล',
        3:'บันทึกประกัน',
        4:'รอชำระเงิน',
        5:'ยืนยันแล้ว'
    };
    const STEP_HEADER_ICON = {
        1:'bi-geo-alt',
        2:'bi-person-lines-fill',
        3:'bi-shield-check',
        4:'bi-credit-card-2-front',
        5:'bi-check-circle-fill'
    };
    const stepLabel = STEP_LABEL[currentStep] || `ขั้นตอน ${currentStep}`;
    const headerBi = STEP_HEADER_ICON[currentStep] || 'bi-circle';
    const bookingComplete = currentStep >= 5;
    const statusBadgeClass = bookingComplete
        ? 'bg-success text-white'
        : 'bg-light text-secondary border border-secondary-subtle';
    const statusBadgeIcon = bookingComplete ? 'bi-check-circle-fill' : 'bi-hourglass-split';

    // ── Format depart date ───────────────────────────────────────────────────
    let departStr = '-';
    if (round?.departDate) {
        const d = new Date(round.departDate);
        departStr = d.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })
                  + ' · ' + d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' }) + ' น.';
    }

    // ── Seat list ─────────────────────────────────────────────────────────────
    const seatChips = seats.map(s => {
        const isMale = s.gender === 'MALE';
        const style = isMale ? 'background:#cfe2ff;color:#084298' : 'background:#f8d7f0;color:#892b5d';
        const name = [s.namePrefix, s.firstName, s.lastName].filter(Boolean).join(' ')
                   || s.passengerName || `ที่นั่ง ${s.seatNumber}`;
        const gIcon = isMale ? '<i class="bi bi-gender-male"></i>' : '<i class="bi bi-gender-female"></i>';
        return `<span class="seat-chip me-1 mb-1" style="${style}">
            ${gIcon} ${s.seatNumber} · ${name}
        </span>`;
    }).join('');

    // ── Resume link ───────────────────────────────────────────────────────────
    const resumePages = [
        null,
        `/booking/seats?roundId=${session.busRoundId}`,
        `/booking/form?token=${session.token}`,
        `/booking/insurance?token=${session.token}`,
        `/booking/ticket?token=${session.token}`,
        `/booking/ticket?token=${session.token}`,
    ];
    const resumeUrl = resumePages[currentStep] || resumePages[4];
    const isComplete = currentStep >= 4;

    return `
    <div class="booking-card">
        <div class="booking-card-header">
            <div class="d-flex align-items-start gap-2 flex-wrap justify-content-between">
                <div class="flex-grow-1">
                    <div class="fw-bold fs-5 mb-1 d-flex align-items-center gap-2">
                        <i class="bi ${headerBi} text-secondary" style="font-size:1.15rem"></i>
                        <span>${trip?.title || `รอบรถ #${session.busRoundId || '-'}`}</span>
                    </div>
                    ${round ? `<div class="text-muted small mb-1 d-flex align-items-start gap-2">
                        <i class="bi bi-signpost-2 flex-shrink-0 mt-1"></i>
                        <span>${round.startPoint} <i class="bi bi-arrow-right mx-1 small opacity-75"></i> ${round.endPoint} · รถคันที่ ${round.busNumber}</span>
                    </div>` : ''}
                    <div class="text-muted small"><i class="bi bi-calendar3 me-1"></i>${departStr}</div>
                </div>
                <div class="text-end">
                    <span class="badge ${statusBadgeClass} px-3 py-2" style="font-size:.85rem; white-space: nowrap;">
                        <i class="bi ${statusBadgeIcon} me-1"></i>${stepLabel}
                    </span>
                </div>
            </div>
        </div>
        <div class="booking-card-body">

            <!-- Pipeline -->
            <div class="pipeline mb-4">
                ${pipeHtml}
            </div>

            <!-- Payment Status Alert (if step 4) -->
            ${currentStep === 4 ? `
            <div class="alert alert-light border border-secondary-subtle text-secondary d-flex align-items-start gap-2 mb-4">
                <i class="bi bi-hourglass-split fs-5 flex-shrink-0 mt-1 text-secondary"></i>
                <div>
                    <strong class="text-dark">รอการชำระเงิน</strong>
                    <div class="small mt-1">กรุณาอัปโหลดสลิปการโอนเพื่อให้เราทำการยืนยันการจองของคุณ</div>
                </div>
            </div>` : ''}

            <!-- Seats -->
            ${seats.length ? `
            <div class="mb-3">
                <div class="small fw-semibold text-muted mb-2"><i class="bi bi-people me-1"></i>ผู้โดยสาร (${seats.length} ท่าน)</div>
                <div class="d-flex flex-wrap">${seatChips}</div>
            </div>` : ''}

            <!-- Contact -->
            <div class="row g-2 small mb-3 p-3 bg-light rounded-2">
                <div class="col-sm-6">
                    <div class="text-muted small"><i class="bi bi-person me-1"></i>ผู้จอง</div>
                    <div class="fw-semibold">${cd.mainName || '-'}</div>
                </div>
                <div class="col-sm-3">
                    <div class="text-muted small"><i class="bi bi-telephone me-1"></i>เบอร์โทร</div>
                    <div class="fw-semibold">${cd.mainPhone || '-'}</div>
                </div>
                ${cd.mainLine ? `<div class="col-sm-3"><div class="text-muted small"><i class="bi bi-chat-dots me-1"></i>LINE</div><div class="fw-semibold">${cd.mainLine}</div></div>` : ''}
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 flex-wrap no-print">
                ${!isComplete ? `
                <a href="${resumeUrl}" class="btn btn-primary btn-sm">
                    <i class="bi bi-arrow-right-circle me-1"></i>ดำเนินการต่อ
                </a>` : `
                <a href="${resumePages[4]}" class="btn btn-success btn-sm">
                    <i class="bi bi-ticket-perforated me-1"></i>ดูตั๋ว
                </a>`}
                <a href="${resumePages[4]}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-eye me-1"></i>ดูสรุปการจอง
                </a>
                <button class="btn btn-outline-secondary btn-sm" onclick="copyLink('${encodeURIComponent(resumePages[4])}')">
                    <i class="bi bi-copy me-1"></i>คัดลอกลิงก์
                </button>
            </div>

            <div class="text-muted mt-3 pt-2 border-top" style="font-size:.72rem">
                <i class="bi bi-clock me-1"></i>
                Token: <code style="font-size:.65rem">${session.token?.substring(0,12)}...</code>
                &nbsp;·&nbsp; หมดอายุ: ${session.expiresAt ? new Date(session.expiresAt).toLocaleDateString('th-TH') : '-'}
            </div>
        </div>
    </div>`;
}

function copyLink(encodedUrl) {
    const url = decodeURIComponent(encodedUrl);
    const full = window.location.origin + url;
    navigator.clipboard.writeText(full).then(() => showToast('คัดลอกลิงก์แล้ว')).catch(() => showToast('ไม่สามารถคัดลอกได้','danger'));
}

async function fetchJSON(path) {
    const r = await fetch(API_BASE_URL + path);
    let data = null;
    try { data = await r.json(); } catch (_) { data = {}; }
    if (!r.ok) {
        const err = new Error(data.message || `HTTP ${r.status}`);
        err.status = r.status;
        throw err;
    }
    return data;
}

function showToast(msg, type='success') {
    let c = document.getElementById('toastC');
    if (!c) { c=document.createElement('div'); c.id='toastC'; c.className='position-fixed bottom-0 end-0 p-3'; c.style.zIndex=9999; document.body.appendChild(c); }
    const id='t'+Date.now();
    c.insertAdjacentHTML('beforeend',`
        <div id="${id}" class="toast align-items-center text-bg-${type} border-0 show">
            <div class="d-flex"><div class="toast-body">${msg}</div>
            <button class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('${id}').remove()"></button>
            </div></div>`);
    setTimeout(()=>document.getElementById(id)?.remove(),3500);
}
</script>
    <script type="module" src="/src/pages/booking/booking-entry.js"></script>
</body>
</html>
