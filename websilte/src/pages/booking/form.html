<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลผู้โดยสาร - จองรถตู้</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ─── Premium Variables ────────────────────────────────────── */
        :root {
            --primary: #00d9b4;
            --primary-dark: #00b899;
            --secondary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* ─── Base ─────────────────────────────────────────────── */
        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            color: #334155;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, .fw-bold, .fw-semibold {
            font-family: 'Kanit', sans-serif;
        }

        /* ─── Step Bar ─────────────────────────────────────────── */
        .step-bar {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 1rem;
        }

        .step-item {
            flex: 1;
            text-align: center;
            padding: 1rem .25rem;
            font-size: .75rem;
            color: #94a3b8;
            border-bottom: 3px solid transparent;
            transition: all .3s;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .step-item i {
            font-size: 1.1rem;
        }

        .step-item.active {
            color: var(--secondary);
            border-color: var(--secondary);
            font-weight: 700;
        }

        .step-item.done {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ─── Premium Info Display ────────────────────────────── */
        .seat-badge-m {
            background: #3b82f6;
            color: #fff;
            border-radius: 8px;
            padding: .3rem .75rem;
            font-weight: 700;
            font-size: .8rem;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .seat-badge-f {
            background: #ec4899;
            color: #fff;
            border-radius: 8px;
            padding: .3rem .75rem;
            font-weight: 700;
            font-size: .8rem;
            box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.2);
        }

        .passenger-card {
            border: 1px solid #f1f5f9;
            border-radius: 20px !important;
            box-shadow: var(--card-shadow);
            background: #fff;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .passenger-card .card-header {
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            padding: 1rem 1.25rem;
        }

        /* ─── Form Controls (Modern) ────────────────────────── */
        .form-label {
            font-family: 'Kanit', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.4rem;
        }

        .form-control, .form-select {
            height: 48px !important;
            border-radius: 12px;
            border: 1.5px solid #f1f5f9;
            background-color: #f8fafc;
            font-size: .92rem !important;
            font-weight: 500;
            padding: 0 1rem;
            transition: all .2s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        /* ─── Thai 3-Dropdown Date Picker ── */
        .thai-date-picker-container select {
            height: 48px !important;
            border-radius: 12px;
            border: 1.5px solid #f1f5f9;
            background-color: #f8fafc;
        }

        /* ─── Summary Card ── */
        .summary-card {
            background: #1e293b;
            color: #fff;
            border-radius: 24px !important;
            padding: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .summary-card .card-header {
            background: transparent !important;
            color: #94a3b8 !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 0 0 1rem 0 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: .75rem;
        }

        /* ─── Bottom Action Bar ─────────────────────────────── */
        .action-bar-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, .05);
            padding: 1.25rem 1.5rem 1.5rem;
        }

        .btn-next-premium {
            background: linear-gradient(135deg, var(--secondary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 16px;
            font-weight: 700;
            padding: 1rem 2rem;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="navbar navbar-light bg-white border-bottom px-3 py-3 sticky-top shadow-sm">
        <div class="d-flex align-items-center gap-2 w-100 container" style="max-width: 800px;">
            <button class="btn btn-sm btn-light rounded-circle shadow-sm" onclick="goBack()" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-chevron-left"></i>
            </button>
            <div class="flex-grow-1 ms-2">
                <div class="fw-bold text-dark lh-1" id="hdrTitle" style="font-size: 1.05rem;">ข้อมูลผู้โดยสาร</div>
                <div class="text-muted mt-1" style="font-size:.72rem" id="hdrSub"></div>
            </div>
        </div>
    </nav>

    <!-- 4-Step bar -->
    <div class="step-bar">
        <div class="step-item done"><i class="bi bi-grid-3x3-gap"></i>เลือกที่นั่ง</div>
        <div class="step-item active"><i class="bi bi-person-lines-fill"></i>กรอกข้อมูล</div>
        <div class="step-item"><i class="bi bi-shield-check"></i>ระบบประกัน</div>
        <div class="step-item"><i class="bi bi-credit-card"></i>ชำระเงิน</div>
    </div>

    <div class="container py-4 pb-5 mb-5" style="max-width:800px;margin:0 auto">
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
            <div class="mt-3 text-muted fw-semibold">กำลังโหลดข้อมูลเซสชัน...</div>
        </div>

        <div id="mainContent" class="d-none">

            <form id="passengerForm" novalidate>

                <!-- Per-seat passenger forms -->
                <div id="seatForms"></div>

                <!-- Booking summary -->
                <div class="summary-card mb-4">
                    <div class="card-header fw-bold"><i class="bi bi-receipt-cutoff me-2"></i>สรุปรายการจองของคุณ</div>
                    <div class="card-body px-0 pb-0" id="bookingSummary"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom action -->
    <div class="position-fixed bottom-0 start-0 end-0 action-bar-glass" style="z-index:200">
        <div class="container" style="max-width:800px;margin:0 auto">
            <div class="d-flex gap-3">
                <button class="btn btn-light rounded-4 px-4 py-2 border-0 fw-bold text-muted" onclick="goBack()" style="font-size: .9rem;">
                    ย้อนกลับ
                </button>
                <button class="btn btn-next-premium flex-grow-1 text-white d-flex align-items-center justify-content-center gap-2" onclick="goNext()" id="btnNext" style="font-size: 1rem;">
                    <i class="bi bi-shield-check fs-5"></i>
                    <span>บันทึกและไปต่อ</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/assets/js/config.js"></script>
    <script src="/src/assets/js/features/thai-calendar.js"></script>
    <script src="/src/assets/js/features/thai-dropdown.js"></script>
    <script>
        let sessionToken = null;
        let sessionData = null;
        let roundData = null;

        // ── Init ─────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            sessionToken = new URLSearchParams(location.search).get('token');
            if (!sessionToken) { showError('ไม่พบ session — กรุณาเริ่มจองใหม่'); return; }

            try {
                sessionData = await fetchJSON('/booking-sessions/' + sessionToken);
                if (!sessionData) { showError('Session หมดอายุ'); return; }

                const rounds = await fetchJSON('/bus-rounds');
                roundData = rounds.find(r => r.id == sessionData.busRoundId);
                if (!roundData) { showError('ไม่พบข้อมูลรอบรถ'); return; }

                // Render forms
                renderForms();

                // Initialize Thai calendar for birthdate inputs
                initializeThaiCalendar();

                // Add pickup change listeners
                document.querySelectorAll('.passenger-pickup').forEach(select => {
                    select.addEventListener('change', updateSummary);
                });

                document.getElementById('loadingState').classList.add('d-none');
                document.getElementById('mainContent').classList.remove('d-none');
            } catch (e) {
                showError(e.message);
            }
        });

        // ── Shared: parse pickupPoints from round (handles string, array, null) ──
        function getPickupPoints() {
            let points = roundData?.pickupPoints || [];
            if (typeof points === 'string') {
                try { points = JSON.parse(points || '[]'); } catch (e) { points = []; }
            }
            // Fallback: if still empty, use startPoint as the sole free option
            if (!points || points.length === 0) {
                const sp = roundData?.startPoint;
                if (sp) points = [{ name: sp, price: 0 }];
            }
            return Array.isArray(points) ? points : [];
        }

        //  Render pickup options
        function renderPickupOptions(selectedValue = '') {
            const points = getPickupPoints();
            if (points.length > 0 && typeof points[0] === 'object') {
                return points.map(p => `<option value="${p.name}" ${p.name === selectedValue ? 'selected' : ''}>${p.name}${p.price > 0 ? ` (+${Number(p.price).toLocaleString()} บาท)` : ''}</option>`).join('');
            }
            // Fallback for old plain-string array
            return points.map(p => `<option value="${p}" ${p === selectedValue ? 'selected' : ''}>${p}</option>`).join('');
        }

        //  Render dropoff options 
        function renderDropoffOptions() {
            const endPoint = roundData?.endPoint || '';
            return `<option value="${endPoint}">${endPoint}</option>`;
        }

        // ── Render per-seat forms ────────────────────────────────────────────────────
        function renderForms() {
            // deduplicate ตาม seatNumber (ป้องกัน session มี seat ซ้ำ)
            const seen = new Set();
            const seats = (sessionData.selectedSeats || []).filter(s => {
                if (seen.has(s.seatNumber)) return false;
                seen.add(s.seatNumber); return true;
            });
            const container = document.getElementById('seatForms');
            container.innerHTML = seats.map((s, i) => {
                const isMale = s.gender === 'MALE';
                const badgeCls = isMale ? 'seat-badge-m' : 'seat-badge-f';
                const genderLabel = isMale ? '♂ ผู้ชาย' : '♀ ผู้หญิง';
                const sn = s.seatNumber;
                return `
        <div class="card mb-3 passenger-card">
            <div class="card-header d-flex align-items-center gap-2 py-2">
                <span class="${badgeCls}">ที่นั่ง ${sn}</span>
                <span class="small text-muted">${genderLabel}</span>
                <span class="ms-auto badge bg-light text-muted border">ผู้โดยสาร ${i + 1}</span>
            </div>
            <div class="card-body">
                <div class="row gx-3 gy-3">
                    <!-- Row 1: prefix + first + last + nickname (Responsive) -->
                    <div class="col-4 col-md-2">
                        <label class="form-label small">คำนำหน้า <span class="text-danger">*</span></label>
                        <select class="form-select passenger-prefix" data-seat="${sn}" required>
                            <option value="">-</option>
                            <option value="นาย" ${s.namePrefix === 'นาย' ? 'selected' : ''}>นาย</option>
                            <option value="นาง" ${s.namePrefix === 'นาง' ? 'selected' : ''}>นาง</option>
                            <option value="นางสาว" ${s.namePrefix === 'นางสาว' ? 'selected' : ''}>นางสาว</option>
                            <option value="เด็กชาย" ${s.namePrefix === 'เด็กชาย' ? 'selected' : ''}>เด็กชาย</option>
                            <option value="เด็กหญิง" ${s.namePrefix === 'เด็กหญิง' ? 'selected' : ''}>เด็กหญิง</option>
                        </select>
                    </div>
                    <div class="col-8 col-md-4">
                        <label class="form-label small">ชื่อจริง <span class="text-danger">*</span></label>
                        <input type="text" class="form-control passenger-firstname"
                            data-seat="${sn}" required placeholder="ชื่อจริง"
                            value="${s.firstName || s.passengerName?.split(' ')[0] || ''}">
                    </div>
                    <div class="col-8 col-md-4">
                        <label class="form-label small">นามสกุล <span class="text-danger">*</span></label>
                        <input type="text" class="form-control passenger-lastname"
                            data-seat="${sn}" required placeholder="นามสกุล"
                            value="${s.lastName || s.passengerName?.split(' ').slice(1).join(' ') || ''}">
                    </div>
                    <div class="col-4 col-md-2">
                        <label class="form-label small">ชื่อเล่น <span class="text-danger">*</span></label>
                        <input type="text" class="form-control passenger-nickname"
                            data-seat="${sn}" required placeholder="ชื่อเล่น"
                            value="${s.nickname || ''}">
                    </div>
                    <!-- Row 2: nationalId + birthDate + bloodType -->
                    <div class="col-12 col-md-5">
                        <label class="form-label small">เลขบัตรประชาชน <span class="text-danger">*</span></label>
                        <input type="text" class="form-control passenger-nationalid"
                            data-seat="${sn}" required maxlength="13" pattern="[0-9]{13}"
                            placeholder="0000000000000" inputmode="numeric"
                            value="${s.nationalId || ''}">
                    </div>
                    <div class="col-12 col-md-7">
                        <label class="form-label small">วันเกิด (ว/ด/พ.ศ.) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control passenger-birthdate"
                            data-seat="${sn}" required readonly
                            style="display:none !important;"
                            value="${s.birthDate ? s.birthDate.substring(0, 10) : ''}">
                    </div>
                    <!-- Row 3: bloodType + phone -->
                    <div class="col-5 col-md-3">
                        <label class="form-label small">หมู่เลือด <span class="text-danger">*</span></label>
                        <select class="form-select passenger-bloodtype" data-seat="${sn}" required>
                            <option value="">-</option>
                            <option ${s.bloodType === 'A' ? 'selected' : ''}>A</option>
                            <option ${s.bloodType === 'B' ? 'selected' : ''}>B</option>
                            <option ${s.bloodType === 'AB' ? 'selected' : ''}>AB</option>
                            <option ${s.bloodType === 'O' ? 'selected' : ''}>O</option>
                        </select>
                    </div>
                    <div class="col-7 col-md-4">
                        <label class="form-label small">เบอร์โทรติดต่อ <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control passenger-phone"
                            data-seat="${sn}" required placeholder="08x-xxx-xxxx" inputmode="tel"
                            value="${s.phone || ''}">
                    </div>
                    <div class="col-12 col-md-5">
                        <label class="form-label small">แพ้อาหาร / ข้อจำกัด <span class="text-muted">(ไม่บังคับ)</span></label>
                        <input type="text" class="form-control passenger-allergy"
                            data-seat="${sn}" placeholder="เช่น แพ้กุ้ง, ทานมังสวิรัติ"
                            value="${s.foodAllergy || ''}">
                    </div>
                    <!-- Row 4: pickup point (mandatory) -->
                    <div class="col-12">
                        <label class="form-label small">จุดรับ <span class="text-danger">*</span></label>
                        <select class="form-select passenger-pickup" data-seat="${sn}" required>
                            <option value="">-</option>
                            ${renderPickupOptions(s.pickupPoint)}
                        </select>
                    </div>
                </div>
            </div>
        </div>`;
            }).join('');

            // Update booking summary
            updateSummary();
        }

        // ── Prefill from session ─────────────────────────────────────────────────────
        function prefillFromSession() {
            // Restore per-seat from session
            (sessionData.selectedSeats || []).forEach(s => {
                if (s.namePrefix) {
                    const el = document.querySelector(`.passenger-prefix[data-seat="${s.seatNumber}"]`);
                    if (el) el.value = s.namePrefix;
                }
            });
        }

        // ── Collect form data ────────────────────────────────────────────────────────
        function collectData() {
            const seats = (sessionData.selectedSeats || []).map(s => {
                const g = n => document.querySelector(`.${n}[data-seat="${s.seatNumber}"]`)?.value?.trim() || '';
                const firstName = g('passenger-firstname');
                const lastName = g('passenger-lastname');
                return {
                    seatNumber: s.seatNumber,
                    gender: s.gender,
                    namePrefix: g('passenger-prefix'),
                    nickname: g('passenger-nickname'),
                    firstName,
                    lastName,
                    passengerName: [firstName, lastName].filter(Boolean).join(' '),
                    phone: g('passenger-phone'),
                    nationalId: g('passenger-nationalid'),
                    birthDate: g('passenger-birthdate') ?
                        (typeof ThaiCalendar !== 'undefined' && ThaiCalendar.processBirthdate
                            ? ThaiCalendar.processBirthdate(g('passenger-birthdate'))
                            : null)
                        : null,
                    bloodType: g('passenger-bloodtype'),
                    foodAllergy: g('passenger-allergy'),
                    pickupPoint: g('passenger-pickup') || null,
                    pickupPrice: (() => {
                        const selected = g('passenger-pickup');
                        const points = getPickupPoints();
                        if (points.length > 0 && typeof points[0] === 'object') {
                            const pickup = points.find(p => p.name === selected);
                            return pickup ? pickup.price : 0;
                        }
                        return 0;
                    })(),
                };
            });

            return { seats };
        }

        // ── Update booking summary ───────────────────────────────────────────────────
        function updateSummary() {
            const seats = (sessionData.selectedSeats || []).map(s => {
                const g = n => document.querySelector(`.${n}[data-seat="${s.seatNumber}"]`)?.value?.trim() || '';
                const firstName = g('passenger-firstname');
                const lastName = g('passenger-lastname');
                return {
                    seatNumber: s.seatNumber,
                    gender: s.gender,
                    namePrefix: g('passenger-prefix'),
                    nickname: g('passenger-nickname'),
                    firstName,
                    lastName,
                    passengerName: [firstName, lastName].filter(Boolean).join(' '),
                    phone: g('passenger-phone'),
                    nationalId: g('passenger-nationalid'),
                    birthDate: g('passenger-birthdate') ?
                        (typeof ThaiCalendar !== 'undefined' && ThaiCalendar.processBirthdate
                            ? ThaiCalendar.processBirthdate(g('passenger-birthdate'))
                            : new Date(g('passenger-birthdate')).toISOString())
                        : null,
                    bloodType: g('passenger-bloodtype'),
                    foodAllergy: g('passenger-allergy'),
                    pickupPoint: g('passenger-pickup') || null,
                    pickupPrice: (() => {
                        const selected = g('passenger-pickup');
                        const points = getPickupPoints();
                        if (points.length > 0 && typeof points[0] === 'object') {
                            const pickup = points.find(p => p.name === selected);
                            return pickup ? pickup.price : 0;
                        }
                        return 0;
                    })(),
                };
            });

            // Booking summary
            const price = roundData?.trip?.price || 0;
            const seatTotal = seats.length * price;
            const pickupTotal = seats.reduce((sum, seat) => sum + (seat.pickupPrice || 0), 0);
            const total = seatTotal + pickupTotal;
            document.getElementById('bookingSummary').innerHTML = `
        <div class="row g-1 small">
            <div class="col-6 text-muted">จำนวนที่นั่ง</div>
            <div class="col-6 text-end fw-semibold">${seats.length} ที่นั่ง</div>
            <div class="col-6 text-muted">ราคา/คน</div>
            <div class="col-6 text-end">${Number(price).toLocaleString('th-TH')} บาท</div>
            <div class="col-6 text-muted">รวมค่าที่นั่ง</div>
            <div class="col-6 text-end fw-semibold">${Number(seatTotal).toLocaleString('th-TH')} บาท</div>
            ${pickupTotal > 0 ? `
                <div class="col-6 text-muted">ค่าจุดรับรถเพิ่ม</div>
                <div class="col-6 text-end fw-semibold">${Number(pickupTotal).toLocaleString('th-TH')} บาท</div>
            ` : ''}
            <div class="col-12"><hr class="my-1"></div>
            <div class="col-6 fw-bold">รวมทั้งหมด</div>
            <div class="col-6 text-end fw-bold text-primary">${Number(total).toLocaleString('th-TH')} บาท</div>
        </div>
        <p class="text-muted small mb-0 mt-2"><i class="bi bi-info-circle me-1"></i>ยังไม่รวมอุปกรณ์เช่าเสริม</p>
    `;
        }

        // ── Validate ─────────────────────────────────────────────────────────────────
        function validate({ seats }) {
            for (const s of seats) {
                if (!s.namePrefix)
                    return `กรุณาเลือกคำนำหน้า ที่นั่ง ${s.seatNumber}`;
                if (!s.nickname)
                    return `กรุณากรอกชื่อเล่น ที่นั่ง ${s.seatNumber}`;
                if (!s.firstName || !s.lastName)
                    return `กรุณากรอกชื่อ-นามสกุล ที่นั่ง ${s.seatNumber}`;
                if (!s.nationalId || s.nationalId.length !== 13)
                    return `กรุณากรอกเลขบัตรประชาชน 13 หลัก ที่นั่ง ${s.seatNumber}`;
                if (!s.birthDate)
                    return `กรุณากรอกวันเกิด ที่นั่ง ${s.seatNumber}`;
                if (!s.bloodType)
                    return `กรุณาเลือกหมู่เลือด ที่นั่ง ${s.seatNumber}`;
                if (!s.phone || s.phone.length < 9)
                    return `กรุณากรอกเบอร์โทรติดต่อ ที่นั่ง ${s.seatNumber}`;
                if (!s.pickupPoint)
                    return `กรุณาเลือกจุดรับ ที่นั่ง ${s.seatNumber}`;
            }
            return null;
        }

        //  Initialize Thai Calendar for birthdate inputs
        function initializeThaiCalendar() {
            try {
                document.querySelectorAll('.passenger-birthdate').forEach(input => {
                    if (typeof ThaiDropdown !== 'undefined' && ThaiDropdown.init) {
                        ThaiDropdown.init(input, {
                            maxDate: 'today',
                            onChange: (dateStr) => {
                                // Trigger audit log or update summary if needed
                                console.log('Date updated via ThaiDropdown:', dateStr);
                            }
                        });
                    }
                });
            } catch (error) {
                console.error('Error initializing Thai Dropdown:', error);
            }
        }

        //  Navigate 
        async function goNext() {
            const formData = collectData();
            const err = validate(formData);
            if (err) { showToast(err, 'warning'); return; }

            const btn = document.getElementById('btnNext');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>  1...';

            try {
                await postJSON('/booking-sessions', {
                    token: sessionToken,
                    step: 2,
                    selectedSeats: formData.seats,
                });

                window.location.href = `/booking/insurance?token=${sessionToken}`;
            } catch (e) {
                showToast(e.message || ' ', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-shield-check me-1"></i> : ';
            }
        }

        async function goBack() {
            if (!sessionData) return window.location.href = '/trips';
            
            // Save state before going back (skip validation for UX)
            try {
                const formData = collectData();
                await postJSON('/booking-sessions', {
                    token: sessionToken,
                    step: 1,
                    selectedSeats: formData.seats,
                });
            } catch (e) { console.warn('Failed to save state on back:', e); }

            window.location.href = `/booking/seats?roundId=${sessionData.busRoundId}&token=${sessionToken}`;
        }

        // ── API helpers ───────────────────────────────────────────────────────────────
        async function fetchJSON(path) {
            const r = await fetch(API_BASE_URL + path);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }
        async function postJSON(path, body) {
            const r = await fetch(API_BASE_URL + path, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.message || `HTTP ${r.status}`);
            return d;
        }

        function showError(msg) {
            document.getElementById('loadingState').innerHTML =
                `<div class="py-5 text-center">
            <i class="bi bi-exclamation-triangle text-danger fs-2"></i>
            <p class="text-danger mt-2">${msg}</p>
            <a href="/trips" class="btn btn-outline-primary mt-2">กลับหน้าทริป</a>
        </div>`;
        }
        function showToast(msg, type = 'warning') {
            let c = document.getElementById('toastC');
            if (!c) { c = document.createElement('div'); c.id = 'toastC'; c.className = 'position-fixed bottom-0 end-0 p-3'; c.style.zIndex = 9999; document.body.appendChild(c); }
            const id = 't' + Date.now();
            c.insertAdjacentHTML('beforeend', `
        <div id="${id}" class="toast align-items-center text-bg-${type} border-0 show">
            <div class="d-flex"><div class="toast-body">${msg}</div>
            <button class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('${id}').remove()"></button>
            </div></div>`);
            setTimeout(() => document.getElementById(id)?.remove(), 4000);
        }
    </script>
    <script type="module" src="/src/pages/booking/booking-entry.js"></script>
</body>

</html>
