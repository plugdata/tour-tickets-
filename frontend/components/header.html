<div class="d-flex justify-content-between align-items-center">
    <button id="btn-menu-toggle" class="btn btn-outline-secondary d-lg-none me-3" type="button">
        <i class="fas fa-bars"></i>
    </button>
    <div class="d-flex align-items-center flex-grow-1">
        <div class="position-relative w-50">
            <i class="fas fa-search position-absolute top-50 translate-middle-y ms-3 text-muted"></i>
            <input id="search-input" type="search" class="form-control ps-5" placeholder="Search here...">
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <button id="btn-notifications" class="btn btn-light position-relative" type="button">
            <i class="fas fa-bell text-muted"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">3</span>
        </button>
        <button id="btn-messages" class="btn btn-light position-relative" type="button">
            <i class="fas fa-envelope text-muted"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">5</span>
        </button>
        <div class="dropdown">
            <button id="btn-profile" class="btn btn-light d-flex align-items-center gap-2" type="button"
                data-bs-toggle="dropdown">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                    style="width: 36px; height: 36px;">
                    <span class="fw-bold">A</span>
                </div>
                <span class="d-none d-md-inline text-muted">Admin</span>
                <i class="fas fa-chevron-down text-muted small"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a id="dropdown-profile" class="dropdown-item" href="#">Profile</a></li>
                <li><a id="dropdown-settings" class="dropdown-item" href="#">Settings</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a id="dropdown-logout" class="dropdown-item" href="javascript:void(0)"
                        onclick="authManager.logout()">Logout</a></li>
            </ul>
        </div>
    </div>
</div>
