<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Thai Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Thai Calendar Feature</h1>
        
        <div class="test-section">
            <h3>Basic Thai Calendar Test</h3>
            <label class="form-label">Select Birthdate:</label>
            <input type="text" class="form-control" id="testDate" placeholder="Click to select date">
            <div class="mt-2">
                <small class="text-muted">Selected Date: <span id="selectedDate">-</span></small><br>
                <small class="text-muted">ISO Format: <span id="isoDate">-</span></small>
            </div>
        </div>

        <div class="test-section">
            <h3>Process Birthdate Function Test</h3>
            <label class="form-label">Enter Date (YYYY-MM-DD):</label>
            <input type="text" class="form-control" id="manualDate" placeholder="2000-12-25">
            <button class="btn btn-primary mt-2" onclick="testProcessBirthdate()">Test Process</button>
            <div class="mt-2">
                <small class="text-muted">Result: <span id="processResult">-</span></small>
            </div>
        </div>

        <div class="test-section">
            <h3>Console Logs</h3>
            <div id="consoleLog" style="background: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto;">
                Console logs will appear here...
            </div>
        </div>
    </div>

    <script src="../../assets/js/features/thai-calendar.js"></script>
    <script>
        // Override console.log to show in page
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const logDiv = document.getElementById('consoleLog');
            logDiv.innerHTML += args.join(' ') + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                console.log('Initializing Thai Calendar...');
                
                // Initialize basic calendar
                ThaiCalendar.init('#testDate', {
                    dateFormat: 'Y-m-d',
                    maxDate: 'today',
                    onChange: (dateStr) => {
                        console.log('Date changed:', dateStr);
                        document.getElementById('selectedDate').textContent = dateStr;
                        
                        const iso = ThaiCalendar.processBirthdate(dateStr);
                        document.getElementById('isoDate').textContent = iso || 'null';
                    }
                });
                
                console.log('Thai Calendar initialized successfully!');
            } catch (error) {
                console.error('Error initializing Thai Calendar:', error);
            }
        });

        function testProcessBirthdate() {
            const dateStr = document.getElementById('manualDate').value;
            console.log('Testing processBirthdate with:', dateStr);
            
            const result = ThaiCalendar.processBirthdate(dateStr);
            document.getElementById('processResult').textContent = result || 'null';
            
            console.log('Process result:', result);
        }
    </script>
</body>
</html>
