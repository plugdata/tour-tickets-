<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้ใช้งาน - Tour Backoffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <nav class="sidebar bg-white border-end" id="sidebar"></nav>
        <main class="main-content flex-fill">
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
            <div class="page-content">
                <div class="page-header d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="page-title">ผู้ใช้งาน</h1>
                        <p class="page-subtitle">จัดการ username, password, role</p>
                    </div>
                    <button class="btn btn-primary" onclick="openModal()"><i
                            class="bi bi-plus-lg me-1"></i>เพิ่มผู้ใช้</button>
                </div>
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('username')">
                                        Username <span id="sortIcon-username" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('name')">
                                        ชื่อ <span id="sortIcon-name" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('phone')">
                                        โทร <span id="sortIcon-phone" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('email')">
                                        อีเมล <span id="sortIcon-email" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('role')">
                                        Role <span id="sortIcon-role" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('createdAt')">
                                        สร้างเมื่อ <span id="sortIcon-createdAt" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th>จัดการ</th>
                                </tr>
                                <tr class="table-filter-row" style="background: #f8f9fa;">
                                    <th></th>
                                    <th><input type="text" class="form-control form-control-sm" id="colUsername" placeholder="ค้นหา..." oninput="applyColumnFilters()"></th>
                                    <th><input type="text" class="form-control form-control-sm" id="colName" placeholder="ค้นหา..." oninput="applyColumnFilters()"></th>
                                    <th><input type="text" class="form-control form-control-sm" id="colPhone" placeholder="ค้นหา..." oninput="applyColumnFilters()"></th>
                                    <th><input type="text" class="form-control form-control-sm" id="colEmail" placeholder="ค้นหา..." oninput="applyColumnFilters()"></th>
                                    <th>
                                        <select class="form-select form-select-sm" id="colRole" onchange="applyColumnFilters()">
                                            <option value="">ทั้งหมด</option>
                                            <option value="ADMIN">Admin</option>
                                            <option value="STUFF">Staff</option>
                                            <option value="CUSTOMER">Customer</option>
                                        </select>
                                    </th>
                                    <th></th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <tr>
                                    <td colspan="8" class="text-center py-4 text-muted">กำลังโหลด...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <div id="userPagination"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">เพิ่มผู้ใช้</h5><button class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3"><label class="form-label">Username <span
                                    class="text-danger">*</span></label><input type="text" class="form-control"
                                id="fUsername" required></div>
                        <div class="mb-3" id="pwField"><label class="form-label">Password <span
                                    class="text-danger">*</span></label><input type="password" class="form-control"
                                id="fPassword"></div>
                        <div class="mb-3"><label class="form-label">ชื่อ <span
                                    class="text-danger">*</span></label><input type="text" class="form-control"
                                id="fName" required></div>
                        <div class="mb-3"><label class="form-label">โทรศัพท์</label><input type="text"
                                class="form-control" id="fPhone"></div>
                        <div class="mb-3"><label class="form-label">อีเมล</label><input type="email"
                                class="form-control" id="fEmail"></div>
                        <div class="mb-3">
                            <label class="form-label">Role <span class="text-danger">*</span></label>
                            <select class="form-select" id="fRole">
                                <option value="ADMIN">ADMIN - ผู้ดูแลระบบ</option>
                                <option value="STUFF">STUFF - เจ้าหน้าที่</option>
                                <option value="CUSTOMER" selected>CUSTOMER - ลูกค้า</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button class="btn btn-primary" onclick="saveUser()">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/auth-guard.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../modules/PaginationManager.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
        let modal, pagination;
        let allUsers = [], filteredData = [];
        let currentPage = 1, perPage = 10;
        let sortColumn = '', sortDirection = 'asc';
        const roleBadge = { ADMIN: 'danger', STUFF: 'warning', CUSTOMER: 'primary' };
        const roleLabel = { ADMIN: 'Admin', STUFF: 'Staff', CUSTOMER: 'Customer' };

        document.addEventListener('DOMContentLoaded', async () => {
            await initPage();
            modal = new bootstrap.Modal(document.getElementById('userModal'));

            pagination = new PaginationManager({
                containerId: 'userPagination',
                onPageChange: (p) => { currentPage = p; renderUsers(false); },
                onPerPageChange: (pp) => { perPage = pp; currentPage = 1; renderUsers(false); }
            });

            loadUsers();
        });

        async function loadUsers() {
            try {
                allUsers = await API.users.list();
                applyColumnFilters();
            } catch (e) { showToast('โหลดล้มเหลว', 'danger'); }
        }

        function toggleSort(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            updateSortIcons();
            applyColumnFilters();
        }

        function updateSortIcons() {
            ['username', 'name', 'phone', 'email', 'role', 'createdAt'].forEach(col => {
                const icon = document.getElementById(`sortIcon-${col}`);
                if (sortColumn === col) {
                    icon.textContent = sortDirection === 'asc' ? '▲' : '▼';
                    icon.style.opacity = '1.0';
                } else {
                    icon.textContent = '';
                    icon.style.opacity = '0.3';
                }
            });
        }

        function getSortedData(data) {
            if (!sortColumn) return data;

            return [...data].sort((a, b) => {
                let aVal, bVal;

                if (sortColumn === 'username') {
                    aVal = (a.username || '').toLowerCase();
                    bVal = (b.username || '').toLowerCase();
                } else if (sortColumn === 'name') {
                    aVal = (a.name || '').toLowerCase();
                    bVal = (b.name || '').toLowerCase();
                } else if (sortColumn === 'phone') {
                    aVal = (a.phone || '').toLowerCase();
                    bVal = (b.phone || '').toLowerCase();
                } else if (sortColumn === 'email') {
                    aVal = (a.email || '').toLowerCase();
                    bVal = (b.email || '').toLowerCase();
                } else if (sortColumn === 'role') {
                    aVal = (a.role || '').toLowerCase();
                    bVal = (b.role || '').toLowerCase();
                } else if (sortColumn === 'createdAt') {
                    aVal = new Date(a.createdAt);
                    bVal = new Date(b.createdAt);
                } else {
                    return 0;
                }

                if (typeof aVal === 'string' && typeof bVal === 'string') {
                    const cmp = aVal.localeCompare(bVal, 'th');
                    return sortDirection === 'asc' ? cmp : -cmp;
                }

                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function renderUsers(resetPage = true) {
            if (resetPage) currentPage = 1;
            const tbody = document.getElementById('usersBody');

            if (!filteredData.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>';
                pagination.render({ totalRecords: 0, currentPage, perPage });
                updateSortIcons();
                return;
            }

            const sortedData = getSortedData(filteredData);
            const startIdx = (currentPage - 1) * perPage;
            const pagedData = sortedData.slice(startIdx, startIdx + perPage);

            tbody.innerHTML = pagedData.map((u, i) => `
            <tr>
                <td>${startIdx + i + 1}</td><td><strong>${u.username}</strong></td><td>${u.name}</td>
                <td>${u.phone || '-'}</td><td>${u.email || '-'}</td>
                <td><span class="badge bg-${roleBadge[u.role]}">${roleLabel[u.role]}</span></td>
                <td>${formatDateThai(u.createdAt)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editUser(${JSON.stringify(u).replace(/"/g, '&quot;')})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`).join('');

            updateSortIcons();
            pagination.render({ totalRecords: sortedData.length, currentPage, perPage });
        }

        function applyColumnFilters() {
            const colUsername = document.getElementById('colUsername')?.value.toLowerCase() || '';
            const colName = document.getElementById('colName')?.value.toLowerCase() || '';
            const colPhone = document.getElementById('colPhone')?.value.toLowerCase() || '';
            const colEmail = document.getElementById('colEmail')?.value.toLowerCase() || '';
            const colRole = document.getElementById('colRole')?.value || '';

            let data = allUsers;

            if (colUsername) data = data.filter(u => u.username.toLowerCase().includes(colUsername));
            if (colName) data = data.filter(u => u.name.toLowerCase().includes(colName));
            if (colPhone) data = data.filter(u => (u.phone || '').toLowerCase().includes(colPhone));
            if (colEmail) data = data.filter(u => (u.email || '').toLowerCase().includes(colEmail));
            if (colRole) data = data.filter(u => u.role === colRole);

            filteredData = data;
            currentPage = 1;
            renderUsers(false);
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'เพิ่มผู้ใช้';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('pwField').style.display = '';
            document.getElementById('fPassword').required = true;
            modal.show();
        }
        function editUser(u) {
            document.getElementById('modalTitle').textContent = 'แก้ไข Role';
            document.getElementById('userId').value = u.id;
            document.getElementById('fUsername').value = u.username;
            document.getElementById('fName').value = u.name;
            document.getElementById('fPhone').value = u.phone || '';
            document.getElementById('fEmail').value = u.email || '';
            document.getElementById('fRole').value = u.role;
            document.getElementById('pwField').style.display = 'none';
            document.getElementById('fPassword').required = false;
            modal.show();
        }
        async function saveUser() {
            const id = document.getElementById('userId').value;
            const data = { username: document.getElementById('fUsername').value, name: document.getElementById('fName').value, phone: document.getElementById('fPhone').value, email: document.getElementById('fEmail').value, role: document.getElementById('fRole').value };
            try {
                if (id) { await API.users.update(id, { role: data.role }); }
                else { data.password = document.getElementById('fPassword').value; await API.users.register(data); }
                modal.hide(); showToast('บันทึกสำเร็จ'); loadUsers();
            } catch (e) { showToast(e.message, 'danger'); }
        }
        async function deleteUser(id) {
            confirmAction('ต้องการลบผู้ใช้นี้?', async () => {
                try { await API.users.delete(id); showToast('ลบสำเร็จ'); loadUsers(); }
                catch (e) { showToast(e.message, 'danger'); }
            });
        }
    </script>
</body>

</html>
