<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทริปท่องเที่ยว - Tour Backoffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="d-flex">
    <nav class="sidebar bg-white border-end" id="sidebar"></nav>
    <main class="main-content flex-fill">
        <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
        <div class="page-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div><h1 class="page-title">ทริปท่องเที่ยว</h1><p class="page-subtitle">จัดการทริปและแพ็กเกจท่องเที่ยว</p></div>
                <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>เพิ่มทริป</button>
            </div>

            <!-- Filter Card -->
            <div class="card mb-3 shadow-sm border-0">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="searchTrip" 
                                    placeholder="ค้นหาชื่อทริป..." onkeyup="if(event.key==='Enter') loadTrips()">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-calendar3 text-muted"></i></span>
                                <input type="text" class="form-control border-end-0 text-dark bg-white" id="startDate"
                                    placeholder="เริ่มวันที่" readonly style="font-size: .85rem;">
                                <span class="input-group-text bg-white border-start-0 border-end-0 text-muted px-1">ถึง</span>
                                <input type="text" class="form-control border-start-0 text-dark bg-white" id="endDate"
                                    placeholder="ถึงวันที่" readonly style="font-size: .85rem;">
                                <button class="btn btn-outline-secondary border-start-0" onclick="clearDateRange()" title="ล้าง">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="tripsTable">
                        <thead class="table-light">
                            <tr>
                                <th>#</th><th>ชื่อทริป</th><th>ราคา (บาท)</th><th>สถานะ</th><th>สร้างเมื่อ</th><th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tripsBody">
                            <tr><td colspan="6" class="text-center py-4 text-muted">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <div id="tripPagination"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="modal fade" id="tripModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">เพิ่มทริป</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="tripForm">
                    <input type="hidden" id="tripId">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">ชื่อทริป <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fTitle" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">คำอธิบาย</label>
                            <textarea class="form-control" id="fDesc" rows="3"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ราคา (บาท) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="fPrice" min="0" step="0.01" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เงินมัดจำ (บาท)</label>
                            <input type="number" class="form-control" id="fDeposit" min="0" step="0.01" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">รูปภาพทริป</label>
                            <div id="imageUploadContainer"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ไฟล์/ลิงก์อธิบายทริป</label>
                            <div id="docUploadContainer"></div>
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="fActive" checked>
                                <label class="form-check-label" for="fActive">เปิดใช้งาน</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-primary" onclick="saveTrip()">บันทึก</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/i18n.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/apiClient.js"></script>
<script src="../../assets/js/features/thai-calendar.js"></script>
<script src="../../assets/js/features/file-upload.js"></script>
<script src="../../modules/PaginationManager.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let modal, pagination;
let currentPage = 1, perPage = 10, filteredData = [];

document.addEventListener('DOMContentLoaded', async () => {
    await initPage();
    modal = new bootstrap.Modal(document.getElementById('tripModal'));

    // Init Pagination
    pagination = new PaginationManager({
        containerId: 'tripPagination',
        onPageChange: (p) => { currentPage = p; renderTrips(); },
        onPerPageChange: (pp) => { perPage = pp; currentPage = 1; renderTrips(); }
    });

    // Init Thai Calendar
    await ThaiCalendar.init('#startDate', { onChange: loadTrips });
    await ThaiCalendar.init('#endDate', { onChange: loadTrips });

    // Init Upload Component for Images
    FileUpload.init('#imageUploadContainer', { 
        targetInputId: 'fImage', 
        multiple: true 
    });

    // Init Upload Component for Document (Single)
    FileUpload.init('#docUploadContainer', {
        targetInputId: 'fDocUrl',
        multiple: false,
        btnText: 'เลือกไฟล์อธิบาย',
        btnIcon: 'bi-file-earmark-text',
        allowedTypes: ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'text/html']
    });

    loadTrips();
});

function clearDateRange() {
    document.getElementById('startDate')._flatpickr.clear();
    document.getElementById('endDate')._flatpickr.clear();
    loadTrips();
}

async function loadTrips() {
    try {
        const query = document.getElementById('searchTrip').value.toLowerCase();
        const start = document.getElementById('startDate').value;
        const end   = document.getElementById('endDate').value;

        let trips = await API.trips.list();

        // Filter search text
        if (query) {
            trips = trips.filter(t => t.title.toLowerCase().includes(query) || (t.description || '').toLowerCase().includes(query));
        }

        // Filter date range
        if (start || end) {
            trips = ThaiCalendar.filterByDateRange(trips, 'createdAt', start, end);
        }

        filteredData = trips;
        currentPage = 1;
        renderTrips();
    } catch (e) { showToast('โหลดข้อมูลล้มเหลว', 'danger'); }
}

function renderTrips() {
    const tbody = document.getElementById('tripsBody');
    const startIdx = (currentPage - 1) * perPage;
    const pagedData = filteredData.slice(startIdx, startIdx + perPage);

    if (!filteredData.length) { 
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">ไม่พบข้อมูลทริป</td></tr>'; 
        pagination.render({ totalRecords: 0, currentPage, perPage });
        return; 
    }

    tbody.innerHTML = pagedData.map((t, i) => `
        <tr>
            <td>${startIdx + i + 1}</td>
            <td>
                <strong>${t.title}</strong>
                ${t.imageUrl ? `<br><small class="text-primary"><i class="bi bi-image me-1"></i>${t.imageUrl.split(',').filter(x=>x).length} รูป</small>` : ''}
                ${t.docUrl ? `<a href="${t.docUrl}" target="_blank" class="ms-2 small text-success"><i class="bi bi-file-earmark-text me-1"></i>เอกสาร</a>` : ''}
                ${t.description ? `<br><small class="text-muted">${t.description.substring(0,60)}...</small>` : ''}
            </td>
            <td>
                ${formatMoney(t.price)}
                ${t.deposit ? `<br><small class="text-warning">มัดจำ: ${formatMoney(t.deposit)}</small>` : ''}
            </td>
            <td><span class="badge ${t.isActive ? 'bg-success' : 'bg-secondary'}">${t.isActive ? 'เปิด' : 'ปิด'}</span></td>
            <td>${formatDateThai(t.createdAt)}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary me-1" onclick="editTrip(${JSON.stringify(t).replace(/"/g,'&quot;')})"><i class="bi bi-pencil"></i></button>
                <a href="/frontend/pages/bus-rounds/list.html?tripId=${t.id}" class="btn btn-sm btn-outline-success me-1" title="รอบรถ"><i class="bi bi-bus-front"></i></a>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteTrip(${t.id})"><i class="bi bi-trash"></i></button>
            </td>
        </tr>`).join('');

    pagination.render({ totalRecords: filteredData.length, currentPage, perPage });
}

function openModal(title='เพิ่มทริป') {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('tripForm').reset();
    document.getElementById('tripId').value = '';
    document.getElementById('fActive').checked = true;
    FileUpload.setExisting('', 'fImage');
    FileUpload.setExisting('', 'fDocUrl');
    modal.show();
}

function editTrip(t) {
    document.getElementById('modalTitle').textContent = 'แก้ไขทริป';
    document.getElementById('tripId').value = t.id;
    document.getElementById('fTitle').value = t.title;
    document.getElementById('fDesc').value = t.description || '';
    document.getElementById('fPrice').value = t.price;
    document.getElementById('fDeposit').value = t.deposit || 0;
    FileUpload.setExisting(t.imageUrl, 'fImage');
    FileUpload.setExisting(t.docUrl, 'fDocUrl');
    document.getElementById('fActive').checked = t.isActive;
    modal.show();
}

async function saveTrip() {
    const id = document.getElementById('tripId').value;
    const btnSave = document.querySelector('.modal-footer .btn-primary');
    const originalText = btnSave.innerHTML;

    try {
        btnSave.disabled = true;
        btnSave.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> กำลังบันทึก...';

        // 1. Upload pending for both containers
        const [newImages, newDocs] = await Promise.all([
            FileUpload.uploadAllPending('fImage'),
            FileUpload.uploadAllPending('fDocUrl')
        ]);
        
        // 2. Combine with existing
        const existingImages = document.getElementById('fImage').value.split(',').filter(x => x);
        const finalImages = [...existingImages, ...newImages].join(',');

        const existingDocs = document.getElementById('fDocUrl').value.split(',').filter(x => x);
        const finalDoc = [...existingDocs, ...newDocs][0] || ''; // Single doc expected

        const data = {
            title: document.getElementById('fTitle').value,
            description: document.getElementById('fDesc').value,
            price: parseFloat(document.getElementById('fPrice').value),
            deposit: parseFloat(document.getElementById('fDeposit').value || 0),
            imageUrl: finalImages,
            docUrl: finalDoc,
            isActive: document.getElementById('fActive').checked
        };

        if (id) await API.trips.update(id, data);
        else await API.trips.create(data);
        
        modal.hide();
        showToast('บันทึกสำเร็จ');
        loadTrips();
    } catch (e) { 
        showToast(e.message, 'danger'); 
    } finally {
        btnSave.disabled = false;
        btnSave.innerHTML = originalText;
    }
}

async function deleteTrip(id) {
    confirmAction('ต้องการลบทริปนี้?', async () => {
        try { await API.trips.delete(id); showToast('ลบสำเร็จ'); loadTrips(); }
        catch (e) { showToast(e.message, 'danger'); }
    });
}
</script>
</body>
</html>
