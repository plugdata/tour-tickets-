<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อุปกรณ์เช่า/บริการ - Tour Backoffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
    <style>
        .trip-badge { font-size:.72rem; padding:.25rem .55rem; border-radius:.4rem; }
        .price-tag { font-size:1rem; font-weight:700; color:#198754; }
        .addon-name { font-weight:600; font-size:.95rem; }
        .addon-desc { font-size:.8rem; color:#6c757d; }
    </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="d-flex">
    <nav class="sidebar bg-white border-end" id="sidebar"></nav>
    <main class="main-content flex-fill">
        <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
        <div class="page-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">อุปกรณ์เช่า / บริการเสริม</h1>
                    <p class="page-subtitle">จัดการสินค้าและบริการเสริมส่วนกลาง</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">
                    <i class="bi bi-plus-lg me-1"></i>เพิ่มรายการ
                </button>
            </div>

            <!-- Filter + Search -->
            <div class="card mb-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="searchInput"
                                    placeholder="ค้นหาชื่อ / คำอธิบาย..." oninput="renderAddons()">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterDuration" onchange="renderAddons()">
                                <option value="">-- ทุกระยะเวลา --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="filterStatus" onchange="renderAddons()">
                                <option value="">-- ทุกสถานะ --</option>
                                <option value="active">เปิดให้จอง</option>
                                <option value="inactive">ปิดชั่วคราว</option>
                            </select>
                        </div>
                        <div class="col-auto ms-auto">
                            <span class="badge bg-secondary fs-6 px-3" id="countBadge">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('id')" title="คลิกเพื่อจัดลำดับ"># <span id="sortIcon-id" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('name')" title="คลิกเพื่อจัดลำดับ">ชื่อรายการ <span id="sortIcon-name" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('description')" title="คลิกเพื่อจัดลำดับ">คำอธิบาย <span id="sortIcon-description" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th style="cursor: pointer; user-select: none;" onclick="toggleSort('duration')" title="คลิกเพื่อจัดลำดับ">ระยะเวลา <span id="sortIcon-duration" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th style="cursor: pointer; user-select: none; text-end;" onclick="toggleSort('price')" title="คลิกเพื่อจัดลำดับ">ราคา / หน่วย <span id="sortIcon-price" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th style="cursor: pointer; user-select: none; text-center;" onclick="toggleSort('isActive')" title="คลิกเพื่อจัดลำดับ">สถานะ <span id="sortIcon-isActive" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span></th>
                                    <th class="text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="addonsBody">
                                <tr><td colspan="7" class="text-center py-4 text-muted">กำลังโหลด...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <div id="addonPagination"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="addonModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">เพิ่มรายการ</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addonForm">
                    <input type="hidden" id="addonId">
                    <div class="mb-3">
                        <label class="form-label">ชื่อรายการ <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fName" placeholder="เช่น เสื้อชูชีพ, ชุดดำน้ำ" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">คำอธิบาย</label>
                        <textarea class="form-control" id="fDesc" rows="2" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ราคา (บาท/หน่วย) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="fPrice" min="0" step="1" required>
                            <span class="input-group-text">บาท</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ระยะเวลา (เลือกจากรอบรถ) <span class="text-danger">*</span></label>
                        <select class="form-select" id="fDuration" required>
                            <option value="">-- เลือกระยะเวลา --</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                <button class="btn btn-primary" onclick="saveAddon()">
                    <i class="bi bi-save me-1"></i>บันทึก
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/i18n.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/auth-guard.js"></script>

<script src="../../assets/js/apiClient.js"></script>
<script src="../../modules/PaginationManager.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let modal, allAddons = [];
let pagination;
let currentPage = 1, perPage = 10, filteredData = [];
let allDurations = [];
let sortColumn = '', sortDirection = 'asc';

document.addEventListener('DOMContentLoaded', async () => {
    await initPage();
    modal = new bootstrap.Modal(document.getElementById('addonModal'));

    // Init Pagination
    pagination = new PaginationManager({
        containerId: 'addonPagination',
        onPageChange: (p) => { currentPage = p; renderAddons(false); },
        onPerPageChange: (pp) => { perPage = pp; currentPage = 1; renderAddons(false); }
    });

    allAddons = await API.addons.list();

    // Load unique durations from BusRounds
    try {
        const busRounds = await API.busRounds.list();
        allDurations = [...new Set(busRounds
            .map(r => r.duration)
            .filter(d => d && d.trim() !== '')
        )].sort();

        // Populate form duration select
        const durationSelect = document.getElementById('fDuration');
        allDurations.forEach(duration => {
            const opt = document.createElement('option');
            opt.value = duration;
            opt.textContent = duration;
            durationSelect.appendChild(opt);
        });

        // Populate filter duration select
        const filterDurationSelect = document.getElementById('filterDuration');
        allDurations.forEach(duration => {
            const opt = document.createElement('option');
            opt.value = duration;
            opt.textContent = duration;
            filterDurationSelect.appendChild(opt);
        });
    } catch (e) {
        console.error('Failed to load bus round durations:', e);
    }

    renderAddons();
});

function toggleSort(column) {
    if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        sortColumn = column;
        sortDirection = 'asc';
    }
    currentPage = 1;
    renderAddons(false);
}

function updateSortIcons() {
    document.querySelectorAll('[id^="sortIcon-"]').forEach(el => {
        el.textContent = '';
        el.style.opacity = '0.3';
    });

    if (sortColumn) {
        const icon = document.getElementById(`sortIcon-${sortColumn}`);
        if (icon) {
            icon.textContent = sortDirection === 'asc' ? '▲' : '▼';
            icon.style.opacity = '1';
            icon.style.color = '#0d6efd';
        }
    }
}

function getSortedData(data) {
    if (!sortColumn) return data;

    return data.sort((a, b) => {
        let aVal = a[sortColumn];
        let bVal = b[sortColumn];

        if (aVal == null && bVal == null) return 0;
        if (aVal == null) return sortDirection === 'asc' ? 1 : -1;
        if (bVal == null) return sortDirection === 'asc' ? -1 : 1;

        if (typeof aVal === 'boolean' && typeof bVal === 'boolean') {
            aVal = aVal ? 1 : 0;
            bVal = bVal ? 1 : 0;
        }

        if (typeof aVal === 'string' && typeof bVal === 'string') {
            aVal = aVal.toLowerCase();
            bVal = bVal.toLowerCase();
            return sortDirection === 'asc' ? aVal.localeCompare(bVal, 'th') : bVal.localeCompare(aVal, 'th');
        }

        if (sortDirection === 'asc') {
            return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
        } else {
            return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
        }
    });
}

function renderAddons(resetPage = true) {
    if (resetPage) currentPage = 1;

    const q        = document.getElementById('searchInput').value.toLowerCase().trim();
    const duration = document.getElementById('filterDuration').value.trim();
    const status   = document.getElementById('filterStatus').value;

    let data = allAddons;
    if (q)       data = data.filter(a =>
        a.name.toLowerCase().includes(q) ||
        (a.description || '').toLowerCase().includes(q)
    );
    if (duration) data = data.filter(a => a.duration === duration);
    if (status === 'active')   data = data.filter(a => a.isActive);
    if (status === 'inactive') data = data.filter(a => !a.isActive);

    filteredData = data;
    updateSortIcons();
    document.getElementById('countBadge').textContent = `${data.length} รายการ`;
    const tbody = document.getElementById('addonsBody');

    const sortedData = getSortedData([...data]);

    if (!sortedData.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">ไม่พบรายการ</td></tr>';
        pagination.render({ totalRecords: 0, currentPage, perPage });
        return;
    }

    const startIdx = (currentPage - 1) * perPage;
    const pagedData = sortedData.slice(startIdx, startIdx + perPage);

    tbody.innerHTML = pagedData.map((a, i) => {
        return `<tr class="${!a.isActive ? 'opacity-60' : ''}">
            <td class="text-muted small">${startIdx + i + 1}</td>
            <td>
                <div class="addon-name">${a.name}</div>
            </td>
            <td class="addon-desc">${a.description || '<span class="text-muted">-</span>'}</td>
            <td><span class="badge bg-info">${a.duration || '<span class="text-muted">-</span>'}</span></td>
            <td class="text-end">
                <span class="price-tag">${formatMoney(a.price)}</span>
                <span class="text-muted small"> บาท</span>
            </td>
            <td class="text-center">
                <span class="badge ${a.isActive ? 'bg-success' : 'bg-secondary'}">
                    <i class="bi bi-${a.isActive ? 'check-circle' : 'pause-circle'} me-1"></i>${a.isActive ? 'เปิด' : 'ปิด'}
                </span>
            </td>
            <td class="text-center">
                <div class="d-flex gap-1 justify-content-center">
                    <button class="btn btn-sm btn-outline-${a.isActive ? 'secondary' : 'success'}"
                        onclick="toggleAddon(${JSON.stringify(a).replace(/"/g,'&quot;')})"
                        title="${a.isActive ? 'ปิดชั่วคราว' : 'เปิดใหม่'}">
                        <i class="bi bi-${a.isActive ? 'pause' : 'play'}"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-primary"
                        onclick="editAddon(${JSON.stringify(a).replace(/"/g,'&quot;')})" title="แก้ไข">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                        onclick="deleteAddon(${a.id})" title="ลบ">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');

    pagination.render({ totalRecords: sortedData.length, currentPage, perPage });
}

function openModal() {
    document.getElementById('modalTitle').textContent = 'เพิ่มรายการใหม่';
    document.getElementById('addonForm').reset();
    document.getElementById('addonId').value = '';
    modal.show();
}

function editAddon(a) {
    document.getElementById('modalTitle').textContent = 'แก้ไขรายการ';
    document.getElementById('addonId').value   = a.id;
    document.getElementById('fName').value     = a.name;
    document.getElementById('fDesc').value     = a.description || '';
    document.getElementById('fPrice').value    = a.price;
    document.getElementById('fDuration').value = a.duration || '';
    modal.show();
}

async function toggleAddon(a) {
    const action = a.isActive ? 'ปิดชั่วคราว' : 'เปิดใหม่';
    confirmAction(`ต้องการ${action}รายการ "${a.name}"?`, async () => {
        try {
            await API.addons.update(a.id, { ...a, isActive: !a.isActive });
            showToast(`${action}สำเร็จ`);
            allAddons = await API.addons.list();
            renderAddons();
        } catch (e) { showToast(e.message, 'danger'); }
    });
}

async function saveAddon() {
    const id   = document.getElementById('addonId').value;
    const data = {
        name:        document.getElementById('fName').value.trim(),
        description: document.getElementById('fDesc').value.trim(),
        price:       parseFloat(document.getElementById('fPrice').value),
        duration:    document.getElementById('fDuration').value.trim(),
        isActive:    true
    };
    if (!data.name || !data.price) return showToast('กรุณากรอกชื่อรายการและราคา', 'warning');
    if (!data.duration) return showToast('กรุณาเลือกระยะเวลา', 'warning');
    try {
        if (id) await API.addons.update(id, data);
        else    await API.addons.create(data);
        modal.hide();
        showToast(id ? 'แก้ไขสำเร็จ' : 'เพิ่มรายการสำเร็จ');
        allAddons = await API.addons.list();
        renderAddons();
    } catch (e) { showToast(e.message, 'danger'); }
}

async function deleteAddon(id) {
    confirmAction('ต้องการลบรายการนี้? ไม่สามารถกู้คืนได้', async () => {
        try {
            await API.addons.delete(id);
            showToast('ลบสำเร็จ');
            allAddons = await API.addons.list();
            renderAddons();
        } catch (e) { showToast(e.message, 'danger'); }
    });
}
</script>
</body>
</html>
