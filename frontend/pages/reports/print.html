<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบรายชื่อลูกค้า - Print</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4">
    <div class="no-print mb-3">
        <button class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer me-1"></i>พิมพ์</button>
        <button class="btn btn-secondary ms-2" onclick="history.back()">กลับ</button>
    </div>

    <div id="printArea">
        <div class="text-center mb-4">
            <h4>ใบรายชื่อลูกค้า</h4>
            <p class="text-muted" id="roundInfo">-</p>
        </div>
        <table class="table table-bordered table-sm">
            <thead class="table-dark">
                <tr>
                    <th>#</th><th>ชื่อลูกค้า</th><th>โทรศัพท์</th><th>จำนวนที่นั่ง</th>
                    <th>แพ้อาหาร</th><th>อุปกรณ์เช่า</th><th>ยอดรวม</th><th>ชำระ</th>
                </tr>
            </thead>
            <tbody id="printBody">
                <tr><td colspan="8" class="text-center">กำลังโหลด...</td></tr>
            </tbody>
        </table>
        <div class="mt-3 d-flex gap-4">
            <div>จำนวนผู้โดยสารทั้งหมด: <strong id="totalPeople">-</strong> คน</div>
            <div>ยอดรวม: <strong id="totalAmount">-</strong> บาท</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        authManager.requireAuth();
        const roundId = new URLSearchParams(location.search).get('roundId');
        if (!roundId) { document.getElementById('printBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger">ไม่พบรอบรถ</td></tr>'; return; }
        try {
            const list = await API.reports.print(roundId);
            document.getElementById('roundInfo').textContent = `รอบรถ #${roundId} | พิมพ์เมื่อ ${new Date().toLocaleString('th-TH')}`;
            if (!list.length) { document.getElementById('printBody').innerHTML = '<tr><td colspan="8" class="text-center">ไม่มีรายชื่อ</td></tr>'; return; }
            let totalPeople = 0, totalAmt = 0;
            document.getElementById('printBody').innerHTML = list.map((c, i) => {
                totalPeople += c.seats;
                totalAmt += c.totalAmount;
                return `<tr>
                    <td>${i+1}</td><td>${c.customerName}</td><td>${c.phone || '-'}</td>
                    <td class="text-center">${c.seats}</td><td>${c.foodAllergy || '-'}</td>
                    <td>${c.addons || '-'}</td><td>${formatMoney(c.totalAmount)}</td>
                    <td><span class="${c.paymentStatus==='CONFIRMED'?'text-success fw-bold':'text-warning'}">${c.paymentStatus}</span></td>
                </tr>`;
            }).join('');
            document.getElementById('totalPeople').textContent = totalPeople;
            document.getElementById('totalAmount').textContent = formatMoney(totalAmt);
        } catch (e) { document.getElementById('printBody').innerHTML = `<tr><td colspan="8" class="text-center text-danger">${e.message}</td></tr>`; }
    });
    </script>
</body>
</html>
