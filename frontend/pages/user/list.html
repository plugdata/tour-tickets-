<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้ใช้งาน - Backoffice</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts - Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar bg-white border-end" id="sidebar">
            <!-- Sidebar content loaded from ../../components/navMenu.html -->
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-fill">
            <!-- Header -->
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm">
                <!-- Header content loaded from ../../components/header.html -->
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title" id="pageTitle">ผู้ใช้งาน</h1>
                    <p class="page-subtitle">จัดการข้อมูลผู้ใช้งานในระบบ</p>
                </div>

                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="toolbar-left">
                        <a href="form.html" class="btn btn-primary">
                            <i class="bi bi-plus-lg me-1"></i>เพิ่มข้อมูล
                        </a>
                        <button class="btn btn-outline-danger" id="bulkDeleteBtn" disabled>
                            <i class="bi bi-trash me-1"></i>ลบที่เลือก (<span id="selectedCount">0</span>)
                        </button>
                    </div>
                    <div class="toolbar-right">
                        <div class="search-box">
                            <i class="bi bi-search search-icon"></i>
                            <input type="text" class="form-control" id="searchInput" placeholder="ค้นหา...">
                        </div>
                        <button class="btn btn-outline-secondary" onclick="location.reload()">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                </div>

                <!-- Data Card -->
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover" id="dataTable">
                                <!-- Table content will be generated by JavaScript -->
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                            <div id="recordCount" class="text-muted small"></div>
                            <div id="pagination"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">กำลังโหลด...</span>
            </div>
            <div class="mt-2">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../modules/TableManager.js"></script>
    <script src="../../modules/PaginationManager.js"></script>
    <script src="../../modules/CrudManager.js"></script>

    <script>
        // Resource name for this page
        const RESOURCE_NAME = 'User';

        // Check auth
        if (!authManager.requireAuth()) {
            // Will redirect to login
        }

        let crudManager;

        // Load components
        async function loadComponents() {
            try {
                // Load sidebar and header using helper from app.js
                await Promise.all([
                    loadComponent('../../components/navMenu.html', 'sidebar'),
                    loadComponent('../../components/header.html', 'main-header')
                ]);

                // Initialize after components loaded
                initPage();
            } catch (error) {
                console.error('Error loading components:', error);
            }
        }

        // Initialize page
        async function initPage() {
            const resourceConfig = RESOURCES[RESOURCE_NAME];

            // Set page title
            if (document.getElementById('pageTitle')) {
                document.getElementById('pageTitle').textContent = resourceConfig.labelPlural;
            }
            document.title = `${resourceConfig.labelPlural} - Backoffice`;

            // Set breadcrumb
            if (window.setBreadcrumb) {
                setBreadcrumb([
                    { label: 'หน้าหลัก', href: '/frontend/pages/dashboard.html' },
                    { label: resourceConfig.labelPlural }
                ]);
            }

            // Initialize CRUD manager
            crudManager = new CrudManager(RESOURCE_NAME);
            await crudManager.init();

            // Load initial data
            await crudManager.loadData();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadComponents);
    </script>
</body>

</html>
