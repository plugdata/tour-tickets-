<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มผู้ใช้งาน - Backoffice</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts - Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar bg-white border-end" id="sidebar">
            <!-- Sidebar content loaded from ../../components/navMenu.html -->
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-fill">
            <!-- Header -->
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm">
                <!-- Header content loaded from ../../components/header.html -->
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title" id="formTitle">เพิ่มผู้ใช้งาน</h1>
                    <p class="page-subtitle" id="formSubtitle">กรอกข้อมูลเพื่อสร้างผู้ใช้งานใหม่</p>
                </div>

                <!-- Form Card -->
                <div class="card">
                    <div class="card-body">
                        <form id="dataForm" novalidate>
                            <!-- Form fields will be generated by JavaScript -->
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">กำลังโหลด...</span>
            </div>
            <div class="mt-2">กำลังบันทึกข้อมูล...</div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../modules/FormManager.js"></script>
    <script src="../../modules/CrudManager.js"></script>

    <script>
        // Resource name for this page
        const RESOURCE_NAME = 'User';

        // Check auth
        if (!authManager.requireAuth()) {
            // Will redirect to login
        }

        let crudManager;

        // Load components
        async function loadComponents() {
            try {
                // Load sidebar and header using helper from app.js
                await Promise.all([
                    loadComponent('../../components/navMenu.html', 'sidebar'),
                    loadComponent('../../components/header.html', 'main-header')
                ]);

                // Initialize after components loaded
                initPage();
            } catch (error) {
                console.error('Error loading components:', error);
            }
        }

        // Initialize page
        async function initPage() {
            const resourceConfig = RESOURCES[RESOURCE_NAME];
            const urlParams = new URLSearchParams(window.location.search);
            const recordId = urlParams.get('id');
            const isEdit = !!recordId;

            // Set page title
            const action = isEdit ? 'แก้ไข' : 'เพิ่ม';
            if (document.getElementById('formTitle')) {
                document.getElementById('formTitle').textContent = `${action}${resourceConfig.label}`;
            }
            if (document.getElementById('formSubtitle')) {
                document.getElementById('formSubtitle').textContent = isEdit ?
                    'แก้ไขข้อมูลที่มีอยู่' : `กรอกข้อมูลเพื่อสร้าง${resourceConfig.label}ใหม่`;
            }
            document.title = `${action}${resourceConfig.label} - Backoffice`;

            // Set breadcrumb
            const resourcePath = getResourcePath(RESOURCE_NAME);
            if (window.setBreadcrumb) {
                setBreadcrumb([
                    { label: 'หน้าหลัก', href: '/frontend/pages/dashboard.html' },
                    { label: resourceConfig.labelPlural, href: `/frontend/pages/${resourcePath}/list.html` },
                    { label: `${action}${resourceConfig.label}` }
                ]);
            }

            // Initialize CRUD manager
            crudManager = new CrudManager(RESOURCE_NAME);
            await crudManager.init();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadComponents);
    </script>
</body>

</html>
