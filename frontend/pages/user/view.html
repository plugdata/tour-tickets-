<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดผู้ใช้งาน - Backoffice</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts - Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/css/style.css" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar bg-white border-end" id="sidebar">
            <!-- Sidebar content loaded from ../../components/navMenu.html -->
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-fill">
            <!-- Header -->
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm">
                <!-- Header content loaded from ../../components/header.html -->
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header d-flex justify-content-between align-items-start">
                    <div>
                        <h1 class="page-title" id="viewTitle">รายละเอียดผู้ใช้งาน</h1>
                        <p class="page-subtitle">ดูรายละเอียดข้อมูล</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-primary" id="editBtn">
                            <i class="bi bi-pencil me-1"></i>แก้ไข
                        </a>
                        <button class="btn btn-outline-danger" id="deleteBtn">
                            <i class="bi bi-trash me-1"></i>ลบ
                        </button>
                        <a href="list.html" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>กลับ
                        </a>
                    </div>
                </div>

                <!-- Detail Card -->
                <div class="card">
                    <div class="card-body" id="detailContent">
                        <!-- Content will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">กำลังโหลด...</span>
            </div>
            <div class="mt-2">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../modules/CrudManager.js"></script>

    <script>
        // Resource name for this page
        const RESOURCE_NAME = 'User';

        // Check auth
        if (!authManager.requireAuth()) {
            // Will redirect to login
        }

        let recordId;
        let crudManager;

        // Load components
        async function loadComponents() {
            try {
                // Load sidebar and header using helper from app.js
                await Promise.all([
                    loadComponent('../../components/navMenu.html', 'sidebar'),
                    loadComponent('../../components/header.html', 'main-header')
                ]);

                // Initialize after components loaded
                initPage();
            } catch (error) {
                console.error('Error loading components:', error);
            }
        }

        // Initialize page
        async function initPage() {
            const resourceConfig = RESOURCES[RESOURCE_NAME];
            const urlParams = new URLSearchParams(window.location.search);
            recordId = urlParams.get('id');

            if (!recordId) {
                alert('ไม่พบรหัสข้อมูล');
                window.location.href = 'list.html';
                return;
            }

            // Set page title
            if (document.getElementById('viewTitle')) {
                document.getElementById('viewTitle').textContent = `รายละเอียด${resourceConfig.label}`;
            }
            document.title = `รายละเอียด${resourceConfig.label} - Backoffice`;

            // Set breadcrumb
            const resourcePath = getResourcePath(RESOURCE_NAME);
            if (window.setBreadcrumb) {
                setBreadcrumb([
                    { label: 'หน้าหลัก', href: '/frontend/pages/dashboard.html' },
                    { label: resourceConfig.labelPlural, href: `/frontend/pages/${resourcePath}/list.html` },
                    { label: 'รายละเอียด' }
                ]);
            }

            // Set edit button href
            const editBtn = document.getElementById('editBtn');
            if (editBtn) editBtn.href = `form.html?id=${recordId}`;

            // Initialize CRUD manager
            crudManager = new CrudManager(RESOURCE_NAME);

            // Setup delete button
            const deleteBtn = document.getElementById('deleteBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', async () => {
                    if (confirm(t('crud.deleteConfirm'))) {
                        try {
                            await apiClient.delete(RESOURCE_NAME, recordId);
                            alert(t('crud.deleteSuccess'));
                            window.location.href = 'list.html';
                        } catch (error) {
                            alert(error.message || t('error.server'));
                        }
                    }
                });
            }

            // Load record data
            await loadRecord();
        }

        // Load record data
        async function loadRecord() {
            const resourceConfig = RESOURCES[RESOURCE_NAME];
            const loadingOverlay = document.getElementById('loadingOverlay');
            const detailContent = document.getElementById('detailContent');

            try {
                if (loadingOverlay) loadingOverlay.style.display = 'flex';

                const result = await apiClient.show(RESOURCE_NAME, recordId);
                const record = result.record?.params || result.record || result;

                // Render detail view
                let html = '<div class="row">';

                Object.entries(resourceConfig.fields).forEach(([fieldName, fieldConfig]) => {
                    if (fieldConfig.show === false) return;

                    const value = record[fieldName];
                    const displayValue = formatFieldValue(value, fieldConfig);

                    html += `
                        <div class="col-md-6">
                            <div class="detail-row">
                                <div class="detail-label">${fieldConfig.label}</div>
                                <div class="detail-value">${displayValue}</div>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                if (detailContent) detailContent.innerHTML = html;

            } catch (error) {
                console.error('Error loading record:', error);
                if (detailContent) {
                    detailContent.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            ไม่สามารถโหลดข้อมูลได้: ${error.message}
                        </div>
                    `;
                }
            } finally {
                if (loadingOverlay) loadingOverlay.style.display = 'none';
            }
        }

        // Format field value for display
        function formatFieldValue(value, fieldConfig) {
            if (value === null || value === undefined) {
                return '<span class="text-muted">-</span>';
            }

            if (typeof formatDateTimeThai !== 'function') {
                // Fallback if i18n helpers not loaded
                return String(value);
            }

            switch (fieldConfig.type) {
                case 'datetime':
                    return formatDateTimeThai(value);
                case 'date':
                    return formatDateThai(value);
                case 'number':
                    return formatNumber(value);
                case 'password':
                    return '••••••••';
                case 'email':
                    return `<a href="mailto:${value}">${value}</a>`;
                case 'select':
                    return `<span class="badge bg-secondary">${value}</span>`;
                case 'boolean':
                    return value ?
                        '<span class="badge bg-success">ใช่</span>' :
                        '<span class="badge bg-secondary">ไม่</span>';
                case 'file':
                case 'image':
                    if (value) {
                        if (fieldConfig.type === 'image') {
                            return `<img src="${value}" alt="รูปภาพ" class="img-thumbnail" style="max-width: 200px;">`;
                        }
                        return `<a href="${value}" target="_blank" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-download me-1"></i>ดาวน์โหลด
                        </a>`;
                    }
                    return '-';
                case 'json':
                    return `<pre class="bg-light p-2 rounded">${JSON.stringify(value, null, 2)}</pre>`;
                case 'textarea':
                    return `<div class="text-break">${value.replace(/\n/g, '<br>')}</div>`;
                default:
                    return String(value);
            }
        }

        // Helper for number formatting if not defined
        function formatNumber(num) {
            return num.toString().replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1,');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadComponents);
    </script>
</body>

</html>
