<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รอบรถ / ตั๋ว - Tour Backoffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="d-flex">
    <nav class="sidebar bg-white border-end" id="sidebar"></nav>
    <main class="main-content flex-fill">
        <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
        <div class="page-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div><h1 class="page-title">รอบรถ / ตั๋ว</h1><p class="page-subtitle">จัดการรอบรถและที่นั่ง</p></div>
                <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i>เปิดรอบรถ</button>
            </div>

            <!-- Filter + Search -->
            <div class="card mb-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-4 position-relative">
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-map text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="filterTrip"
                                    placeholder="ค้นหาชื่อทริป..."
                                    oninput="onFilterTripInput()"
                                    onfocus="showTripDropdown()"
                                    onkeydown="handleTripFilterKey(event)"
                                    autocomplete="off">
                                <button class="btn btn-outline-secondary btn-sm px-2" onclick="clearTripFilter()" title="ล้าง">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                            <div id="tripFilterDropdown"
                                class="position-absolute bg-white border rounded-3 shadow d-none"
                                style="z-index:1050;max-height:240px;overflow-y:auto;top:calc(100% + 2px);left:0;right:0;">
                            </div>
                        </div>

                        <!-- ค้นหาจุดขึ้น/ลง -->
                        <div class="col-md-3">
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-geo-alt text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="searchInput"
                                    placeholder="จุดรับ / ปลายทาง..." oninput="renderRounds()">
                            </div>
                        </div>

                        <!-- ค้นหาเป็นช่วงเวลา -->
                        <div class="col-md-5">
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white"><i class="bi bi-calendar3 text-muted"></i></span>
                                <input type="text" class="form-control border-end-0 text-dark" id="startDate"
                                    placeholder="เริ่มวันที่..." readonly style="background:white; font-size: .85rem;">
                                <span class="input-group-text bg-white border-start-0 border-end-0 text-muted px-1">ถึง</span>
                                <input type="text" class="form-control border-start-0 text-dark" id="endDate"
                                    placeholder="ถึงวันที่..." readonly style="background:white; font-size: .85rem;">
                                <button class="btn btn-outline-secondary border-start-0" onclick="clearDateRange()" title="ล้าง">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="row g-3" id="roundsGrid">
                <div class="col-12 text-center py-4 text-muted">กำลังโหลด...</div>
            </div>
        </div>
    </main>
</div>

<!-- Create Round Modal -->
<div class="modal fade" id="roundModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">เปิดรอบรถ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="roundForm">
                    <input type="hidden" id="roundId">
                    <div class="mb-3">
                        <label class="form-label">ทริป <span class="text-danger">*</span></label>
                        <select class="form-select" id="fTripId" required onchange="updateNextBusNumber()"></select>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">รถคันที่</label>
                            <input type="number" class="form-control" id="fBusNum" value="1" min="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จำนวนที่นั่ง <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="fSeats" min="1" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จุดสิ้นสุด <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fEnd" placeholder="เช่น ท่าเรือต้นไทร" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">วัน-เวลาออกเดินทาง <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fDepart" readonly placeholder="เลือกวันที่และเวลา..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ระยะเวลา</label>
                            <input type="text" class="form-control" id="fDuration" placeholder="เช่น 2 วัน 1 คืน, 6 ชั่วโมง">
                        </div>
                        <div class="col-12">
                            <hr class="my-1">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0 fw-bold"><i class="bi bi-geo-alt-fill text-danger me-1"></i>จุดรับ (Pickup Points) <span class="text-danger">*</span></label>
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="addPickupRow()">
                                    <i class="bi bi-plus-lg me-1"></i>เพิ่มจุดรับ
                                </button>
                            </div>
                            <div id="pickupList" class="p-2 border rounded bg-light" style="max-height: 200px; overflow-y: auto;">
                                <!-- Dynamic Rows -->
                            </div>
                            <small class="text-muted mt-1 d-block">จุดแรกจะถูกใช้เป็นจุดเริ่มต้นหลัก</small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                <button class="btn btn-primary" onclick="saveRound()">บันทึก</button>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/apiClient.js"></script>
<script src="../../assets/js/app.js"></script>
<script src="../../assets/js/features/thai-calendar.js"></script>
<script>
let roundModal, startPicker, endPicker, departPicker;
let trips = [], allRounds = [];


document.addEventListener('DOMContentLoaded', async () => {
    await initPage();
    roundModal = new bootstrap.Modal(document.getElementById('roundModal'));

    trips = await API.trips.list();
    const fSel = document.getElementById('fTripId');
    trips.forEach(t => {
        fSel.insertAdjacentHTML('beforeend', `<option value="${t.id}">${t.title}</option>`);
    });

    // ถ้ามี tripId ใน URL → ใส่ชื่อทริปในช่องค้นหาเลย
    const urlTripId = new URLSearchParams(location.search).get('tripId');
    if (urlTripId) {
        const matched = trips.find(t => String(t.id) === urlTripId);
        if (matched) document.getElementById('filterTrip').value = matched.title;
    }

    await loadRounds();

    // เริ่มต้นตัวเลือกช่วงวันที่ไทย
    startPicker = await ThaiCalendar.init('#startDate', {
        onChange: () => renderRounds()
    });
    endPicker = await ThaiCalendar.init('#endDate', {
        onChange: () => renderRounds()
    });
    departPicker = await ThaiCalendar.init('#fDepart', {
        enableTime: true
    });

    // ปิด dropdown เมื่อคลิกนอก
    document.addEventListener('click', e => {
        if (!document.getElementById('filterTrip').contains(e.target) &&
            !document.getElementById('tripFilterDropdown').contains(e.target)) {
            hideTripDropdown();
        }
    });
});

// ─── Trip Filter Autocomplete ───────────────────────────────
function showTripDropdown() {
    const q = document.getElementById('filterTrip').value.toLowerCase().trim();
    const dd = document.getElementById('tripFilterDropdown');
    const filtered = q ? trips.filter(t => t.title.toLowerCase().includes(q)) : trips;

    if (!filtered.length) { dd.classList.add('d-none'); return; }

    dd.innerHTML = filtered.map((t, i) => `
        <div class="trip-dd-item px-3 py-2" data-idx="${i}"
            style="cursor:pointer;font-size:.88rem;border-bottom:1px solid #f0f0f0;"
            onmousedown="selectTrip('${t.title.replace(/'/g, "\\'")}')"
            onmouseover="this.style.background='#f0fdf9'"
            onmouseout="this.style.background=''">
            <i class="bi bi-map me-2 text-muted" style="font-size:.8rem;"></i>${t.title}
        </div>`).join('');

    dd.classList.remove('d-none');
}

function onFilterTripInput() {
    showTripDropdown();
    renderRounds();
}

function selectTrip(title) {
    document.getElementById('filterTrip').value = title;
    hideTripDropdown();
    renderRounds();
}

function hideTripDropdown() {
    document.getElementById('tripFilterDropdown').classList.add('d-none');
}

function clearTripFilter() {
    document.getElementById('filterTrip').value = '';
    hideTripDropdown();
    renderRounds();
}

function clearDateRange() {
    if (startPicker) startPicker.clear();
    if (endPicker) endPicker.clear();
    renderRounds();
}

function handleTripFilterKey(e) {
    if (e.key === 'Escape') { hideTripDropdown(); }
    if (e.key === 'Enter')  { hideTripDropdown(); renderRounds(); }
}

async function loadRounds() {
    try {
        allRounds = await API.busRounds.list();
        renderRounds();
    } catch (e) { showToast('โหลดล้มเหลว', 'danger'); }
}

function renderRounds() {
    const tripQ = document.getElementById('filterTrip').value.toLowerCase().trim();
    const startQ = document.getElementById('startDate').value;
    const endQ = document.getElementById('endDate').value;
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    let data = allRounds;
    if (tripQ) data = data.filter(r => (r.trip?.title || '').toLowerCase().includes(tripQ));
    if (startQ || endQ) {
        data = ThaiCalendar.filterByDateRange(data, 'departDate', startQ, endQ);
    }
    if (q) data = data.filter(r =>
        (r.startPoint || '').toLowerCase().includes(q) ||
        (r.endPoint || '').toLowerCase().includes(q) ||
        (r.pickupPoints || []).some(p => p.name.toLowerCase().includes(q))
    );

    const grid = document.getElementById('roundsGrid');

    if (!data.length) {
        grid.innerHTML = '<div class="col-12 text-center py-4 text-muted">ไม่พบรอบรถ</div>';
        return;
    }

    grid.innerHTML = data.map(r => {
        const pct    = Math.round((r.bookedSeats / r.totalSeats) * 100);
        const isFull = r.bookedSeats >= r.totalSeats;
        return `<div class="col-md-6 col-xl-4">
            <div class="card h-100 ${!r.isOpen ? 'border-secondary opacity-75' : ''}">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-bus-front me-1"></i>รถ${r.busNumber} — ${r.trip?.title || ''}</span>
                    <span class="badge ${r.isOpen ? 'bg-success' : 'bg-secondary'}">${r.isOpen ? 'เปิดจอง' : 'ปิดจอง'}</span>
                </div>
                <div class="card-body">
                    <div class="mb-2 text-primary small fw-bold">
                        <i class="bi bi-geo-alt-fill me-1"></i>${r.startPoint} 
                        ${r.pickupPoints?.length > 1 ? `<span class="badge bg-primary-subtle text-primary border border-primary-subtle py-0 px-1 ms-1">+${r.pickupPoints.length - 1} จุด</span>` : ''}
                    </div>
                    <div class="mb-2 text-muted small"><i class="bi bi-arrow-right-short me-1"></i>ถึง: ${r.endPoint}</div>
                    <div class="mb-2 text-muted small"><i class="bi bi-calendar me-1"></i>${formatDateTime(r.departDate)}</div>
                    ${r.extraPrice > 0 ? `<div class="mb-2 text-success small fw-semibold"><i class="bi bi-plus-circle me-1"></i>ราคาเริ่มต้นเพิ่ม: +${formatMoney(r.extraPrice)}</div>` : ''}
                    ${r.duration ? `<div class="mb-2 text-muted small"><i class="bi bi-clock me-1"></i>${r.duration}</div>` : ''}
                    <div class="mb-1 d-flex justify-content-between small">
                        <span>ที่นั่ง</span>
                        <span class="fw-semibold ${isFull ? 'text-danger' : ''}">${r.bookedSeats}/${r.totalSeats}</span>
                    </div>
                    <div class="progress mb-3" style="height:6px">
                        <div class="progress-bar ${isFull ? 'bg-danger' : 'bg-success'}" style="width:${pct}%"></div>
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <a href="/frontend/pages/monitor/list.html?roundId=${r.id}"
                           class="btn btn-sm btn-outline-primary flex-fill">
                            <i class="bi bi-ticket-perforated me-1"></i>ดูตั๋ว
                            ${r.bookedSeats > 0 ? `<span class="badge bg-primary ms-1">${r.bookedSeats}</span>` : ''}
                        </a>
                        <a href="/frontend/pages/booking/seats.html?roundId=${r.id}"
                           class="btn btn-sm btn-outline-warning" title="หน้าจองที่นั่ง (ลูกค้า)" target="_blank">
                            <i class="bi bi-grid-3x3-gap"></i>
                        </a>
                        <button class="btn btn-sm ${r.isOpen ? 'btn-outline-danger' : 'btn-outline-success'}"
                            onclick="toggleRound(${r.id})" title="${r.isOpen ? 'ปิดจอง' : 'เปิดจอง'}">
                            <i class="bi bi-${r.isOpen ? 'lock' : 'unlock'}"></i>
                        </button>
                        <a href="/frontend/pages/reports/print.html?roundId=${r.id}"
                           class="btn btn-sm btn-outline-secondary" title="พิมพ์">
                            <i class="bi bi-printer"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-primary" 
                            onclick="editRound(${JSON.stringify(r).replace(/"/g,'&quot;')})" title="แก้ไข">
                            <i class="bi bi-pencil"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ===== Pickup Points Manager =====
function createPickupRow(name = '', price = 0) {
    return `
        <div class="pickup-row d-flex gap-2 mb-2">
            <input type="text" class="form-control form-control-sm p-name" placeholder="ชื่อจุดรับ" value="${name}" required>
            <div class="input-group input-group-sm" style="width: 140px;">
                <span class="input-group-text badge-success">+</span>
                <input type="number" class="form-control p-price" placeholder="บวกเพิ่ม" value="${price}" min="0" step="1">
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger px-2" onclick="this.closest('.pickup-row').remove()">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `;
}

function addPickupRow(name = '', price = 0) {
    document.getElementById('pickupList').insertAdjacentHTML('beforeend', createPickupRow(name, price));
}

function openModal() {
    document.getElementById('roundForm').reset();
    document.getElementById('roundId').value = '';
    
    // Auto Select Trip if filter is active
    const tripQ = document.getElementById('filterTrip').value.toLowerCase().trim();
    if (tripQ) {
        const found = trips.find(t => t.title.toLowerCase().includes(tripQ));
        if (found) document.getElementById('fTripId').value = found.id;
    }

    document.getElementById('fDuration').value = '';
    if (departPicker) departPicker.clear();
    
    document.getElementById('pickupList').innerHTML = '';
    addPickupRow('ท่าเรือ', 0); // Default row
    
    updateNextBusNumber();
    roundModal.show();
}

function updateNextBusNumber() {
    const tripId = parseInt(document.getElementById('fTripId').value);
    if (!tripId) return;

    // Find max bus number for this trip in allRounds
    const sameTripRounds = allRounds.filter(r => r.tripId === tripId);
    if (sameTripRounds.length === 0) {
        document.getElementById('fBusNum').value = 1;
    } else {
        const numbers = sameTripRounds.map(r => r.busNumber || 0);
        const maxNum = Math.max(...numbers);
        document.getElementById('fBusNum').value = maxNum + 1;
    }
}

function editRound(r) {
    document.getElementById('roundId').value = r.id;
    document.getElementById('fTripId').value = r.tripId;
    document.getElementById('fBusNum').value = r.busNumber;
    document.getElementById('fSeats').value = r.totalSeats;
    document.getElementById('fEnd').value = r.endPoint;
    document.getElementById('fDuration').value = r.duration || '';
    
    if (departPicker) {
        departPicker.setDate(new Date(r.departDate));
    }

    // Load Pickups
    document.getElementById('pickupList').innerHTML = '';
    const points = r.pickupPoints || [{ name: r.startPoint, price: r.extraPrice }];
    points.forEach(p => addPickupRow(p.name, p.price));

    roundModal.show();
}

async function saveRound() {
    const id = document.getElementById('roundId').value;
    // Collect Pickup Points
    const rows = document.querySelectorAll('.pickup-row');
    const pickups = [];
    rows.forEach(r => {
        pickups.push({
            name: r.querySelector('.p-name').value.trim(),
            price: parseFloat(r.querySelector('.p-price').value || 0)
        });
    });

    if (pickups.length === 0) return showToast('กรุณาเพิ่มจุดรับอย่างน้อย 1 จุด', 'warning');

    let departDateVal = document.getElementById('fDepart').value;
    if (departDateVal) {
        // Handle BE to AD conversion if year is > 2500
        const parts = departDateVal.match(/^(\d{4})-(.*)$/);
        if (parts && parseInt(parts[1]) > 2500) {
            departDateVal = (parseInt(parts[1]) - 543) + '-' + parts[2];
        }
        try {
            departDateVal = new Date(departDateVal).toISOString();
        } catch(e) { console.error('Date conversion failed', e); }
    }

    const data = {
        tripId:     parseInt(document.getElementById('fTripId').value),
        busNumber:  parseInt(document.getElementById('fBusNum').value),
        totalSeats: parseInt(document.getElementById('fSeats').value),
        startPoint: pickups[0].name,
        extraPrice: pickups[0].price,
        endPoint:   document.getElementById('fEnd').value,
        pickupPoints: pickups,
        departDate: departDateVal,
        duration:   document.getElementById('fDuration').value || null
    };

    if (!data.departDate) return showToast('กรุณาเลือกวัน-เวลาเดินทาง', 'warning');

    try {
        if (id) await API.busRounds.update(id, data);
        else await API.busRounds.create(data);
        
        roundModal.hide();
        showToast(id ? 'แก้ไขรอบรถสำเร็จ' : 'เปิดรอบรถสำเร็จ');
        await loadRounds();
    } catch (e) { showToast(e.message, 'danger'); }
}

async function toggleRound(id) {
    try { await API.busRounds.toggle(id); showToast('อัปเดตสำเร็จ'); await loadRounds(); }
    catch (e) { showToast(e.message, 'danger'); }
}
</script>
</body>
</html>
