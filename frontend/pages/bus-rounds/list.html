<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รอบรถ / ตั๋ว - Tour Backoffice</title>
    <!-- Core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Theme CSS -->
    <link href="../../assets/css/admin.css" rel="stylesheet">
    
    <!-- Page CSS -->
    <link href="bus-rounds.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <!-- Sidebar Component -->
        <nav class="sidebar bg-white border-end" id="sidebar"></nav>
        
        <main class="main-content flex-fill">
            <!-- Header Component -->
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
            
            <div class="page-content">
                <!-- Page Title -->
                <div class="page-header d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="page-title">รอบรถ / ตั๋ว</h1>
                        <p class="page-subtitle">จัดการรอบรถและที่นั่ง</p>
                    </div>
                    <button class="btn btn-primary" onclick="openModal()">
                        <i class="bi bi-plus-lg me-1"></i>เปิดรอบรถ
                    </button>
                </div>

                <!-- Filters Section -->
                <div class="card mb-3 shadow-sm border-0">
                    <div class="card-body py-2">
                        <div class="row g-2 align-items-center">
                            <!-- Trip Filter -->
                            <div class="col-md-4 position-relative">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-map text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="filterTrip"
                                        placeholder="ค้นหาชื่อทริป..." oninput="onFilterTripInput()"
                                        onfocus="showTripDropdown()" onkeydown="handleTripFilterKey(event)"
                                        autocomplete="off">
                                    <button class="btn btn-outline-secondary btn-sm px-2" onclick="clearTripFilter()" title="ล้าง">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                                <div id="tripFilterDropdown" class="position-absolute bg-white border rounded-3 shadow d-none"></div>
                            </div>
                            
                            <!-- Location Search -->
                            <div class="col-md-3">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-geo-alt text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="searchInput"
                                        placeholder="จุดรับ / ปลายทาง..." oninput="renderRounds()">
                                </div>
                            </div>
                            
                            <!-- Date Filter -->
                            <div class="col-md-5">
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white"><i class="bi bi-calendar3 text-muted"></i></span>
                                    <input type="text" class="form-control border-end-0 text-dark bg-white" id="startDate"
                                        placeholder="เริ่มวันที่..." readonly>
                                    <span class="input-group-text bg-white border-start-0 border-end-0 text-muted px-1">ถึง</span>
                                    <input type="text" class="form-control border-start-0 text-dark bg-white" id="endDate"
                                        placeholder="ถึงวันที่..." readonly>
                                    <button class="btn btn-outline-secondary border-start-0" onclick="clearDateRange()" title="ล้าง">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- View Toggle Tabs & Export Buttons -->
                <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm view-toggle-btn active" id="gridViewBtn" onclick="switchView('grid')">
                            <i class="bi bi-grid-3x3-gap me-1"></i>มุมมองกริด
                        </button>
                        <button class="btn btn-sm view-toggle-btn" id="tableViewBtn" onclick="switchView('table')">
                            <i class="bi bi-table me-1"></i>มุมมองตาราง
                        </button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-success" onclick="exportToCSV()">
                            <i class="bi bi-file-earmark-csv me-1"></i>CSV
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="exportToPDF()">
                            <i class="bi bi-file-earmark-pdf me-1"></i>PDF
                        </button>
                    </div>
                </div>

                <!-- Grid View Container -->
                <div id="gridContainer">
                    <div class="row g-3" id="roundsGrid">
                        <div class="col-12 text-center py-4 text-muted">กำลังโหลด...</div>
                    </div>
                </div>

                <!-- Table View Container -->
                <div id="tableContainer" class="d-none">
                    <div class="table-responsive">
                        <table class="table table-hover" id="roundsTable">
                            <thead>
                                <tr>
                                    <th style="width: 15%"><i class="bi bi-calendar3 me-2"></i>วันที่เดินทาง</th>
                                    <th style="width: 10%"><i class="bi bi-bus-front me-2"></i>รถ/ตู่</th>
                                    <th style="width: 20%"><i class="bi bi-map me-2"></i>ชื่อทริป</th>
                                    <th style="width: 25%"><i class="bi bi-geo-alt me-2"></i>เส้นทาง</th>
                                    <th style="width: 10%"><i class="bi bi-grid-1x2 me-2"></i>ที่นั่ง</th>
                                    <th style="width: 10%"><i class="bi bi-flag-fill me-2"></i>สถานะ</th>
                                    <th style="width: 10%"><i class="bi bi-gear me-2"></i>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="roundsTableBody">
                                <tr><td colspan="7" class="text-center py-4 text-muted">กำลังโหลด...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="tableNoData" class="text-center py-4 text-muted d-none">ไม่พบรอบรถที่ต้องการ</div>
                </div>

                <!-- Pagination -->
                <div class="mt-4 pb-4">
                    <div id="roundPagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Container (For separated form) -->
    <div id="modal-container"></div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/auth-guard.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../modules/PaginationManager.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/features/thai-calendar.js"></script>
    
    <!-- Page Script -->
    <script src="bus-rounds.js"></script>
</body>

</html>
