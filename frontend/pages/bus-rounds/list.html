<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รอบรถ / ตั๋ว - Tour Backoffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="../../assets/css/admin.css" rel="stylesheet">
</head>

<body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="d-flex">
        <nav class="sidebar bg-white border-end" id="sidebar"></nav>
        <main class="main-content flex-fill">
            <header id="main-header" class="bg-white border-bottom p-3 sticky-top shadow-sm"></header>
            <div class="page-content">
                <div class="page-header d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="page-title">รอบรถ / ตั๋ว</h1>
                        <p class="page-subtitle">จัดการรอบรถและที่นั่ง</p>
                    </div>
                    <button class="btn btn-primary" onclick="openModal()"><i
                            class="bi bi-plus-lg me-1"></i>เปิดรอบรถ</button>
                </div>

                <!-- Filter + Search -->
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row g-2 align-items-center">
                            <!-- ค้นหาชื่อทริป -->
                            <div class="col-md-4 position-relative">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-map text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="filterTrip"
                                        placeholder="ค้นหาชื่อทริป..." oninput="onFilterTripInput()"
                                        onfocus="showTripDropdown()" onkeydown="handleTripFilterKey(event)"
                                        autocomplete="off">
                                    <button class="btn btn-outline-secondary btn-sm px-2" onclick="clearTripFilter()"
                                        title="ล้าง">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                                <div id="tripFilterDropdown"
                                    class="position-absolute bg-white border rounded-3 shadow d-none"
                                    style="z-index:1050;max-height:240px;overflow-y:auto;top:calc(100% + 2px);left:0;right:0;">
                                </div>
                            </div>

                            <!-- ค้นหารอบเที่ยว/รอบป่า -->
                            <div class="col-md-4 position-relative">
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i
                                            class="bi bi-layers text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" id="filterRoudestack"
                                        placeholder="รอบเที่ยว/รอบป่า..." oninput="onFilterRoudestackInput()"
                                        onfocus="showRoudestackDropdown()" onkeydown="handleRoudestackFilterKey(event)"
                                        autocomplete="off">
                                    <button class="btn btn-outline-secondary btn-sm px-2"
                                        onclick="clearRoudestackFilter()" title="ล้าง">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                                <div id="roudestackFilterDropdown"
                                    class="position-absolute bg-white border rounded-3 shadow d-none"
                                    style="z-index:1050;max-height:240px;overflow-y:auto;top:calc(100% + 2px);left:0;right:0;">
                                </div>
                            </div>

                            <!-- ค้นหาเป็นช่วงเวลา -->
                            <div class="col-md-4">
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white"><i
                                            class="bi bi-calendar3 text-muted"></i></span>
                                    <input type="text" class="form-control border-end-0 text-dark" id="startDate"
                                        placeholder="เริ่มวันที่..." readonly
                                        style="background:white; font-size: .85rem;">
                                    <span
                                        class="input-group-text bg-white border-start-0 border-end-0 text-muted px-1">ถึง</span>
                                    <input type="text" class="form-control border-start-0 text-dark" id="endDate"
                                        placeholder="ถึงวันที่..." readonly
                                        style="background:white; font-size: .85rem;">
                                    <button class="btn btn-outline-secondary border-start-0" onclick="clearDateRange()"
                                        title="ล้าง">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- Tab Navigation -->
                <ul class="nav nav-tabs mb-3 border-bottom-0" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="activeTab" onclick="switchTab('active')" type="button" role="tab">
                            <i class="bi bi-play-circle me-2"></i>รอบเปิดจอง
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="storyTab" onclick="switchTab('story')" type="button" role="tab">
                            <i class="bi bi-archive me-2"></i>ประวัติรถ
                        </button>
                    </li>
                </ul>

                <!-- View Toggle Tabs & Export Buttons -->
                <div id="activeControls" class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm border-0 rounded-0 fw-semibold text-primary position-relative"
                            id="gridViewBtn" onclick="switchView('grid')" style="border-bottom: 3px solid #0d6efd;">
                            <i class="bi bi-grid-3x3-gap me-1"></i>มุมมองกริด
                        </button>
                        <button class="btn btn-sm border-0 rounded-0 fw-semibold text-muted position-relative"
                            id="tableViewBtn" onclick="switchView('table')">
                            <i class="bi bi-table me-1"></i>มุมมองตาราง
                        </button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-success" onclick="exportToCSV()" title="ส่งออก CSV">
                            <i class="bi bi-file-earmark-csv me-1"></i>CSV
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="exportToPDF()" title="ส่งออก PDF">
                            <i class="bi bi-file-earmark-pdf me-1"></i>PDF
                        </button>
                    </div>
                </div>

                <!-- ACTIVE TAB CONTENT -->
                <div id="activeContent">
                    <!-- Grid View -->
                    <div id="gridContainer">
                        <div class="row g-3" id="roundsGrid">
                            <div class="col-12 text-center py-4 text-muted">กำลังโหลด...</div>
                        </div>
                    </div>

                    <!-- Table View -->
                    <div id="tableContainer" class="d-none">
                    <div class="table-responsive">
                        <table class="table table-hover" id="roundsTable"
                            style="font-size: 1rem; border-collapse: collapse;">
                            <thead
                                style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); font-weight: 600; border-bottom: 2px solid #dee2e6;">
                                <tr style="height: 45px;">
                                    <th
                                        style="width: 13%; padding: 10px; border-right: 1px solid #e9ecef; text-align: center; vertical-align: middle; cursor: pointer; user-select: none;" onclick="toggleSort('departDate')">
                                        <i class="bi bi-calendar3 me-2"></i>วันที่ออกเดินทาง <span id="sortIcon-departDate" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th
                                        style="width: 12%; padding: 10px; border-right: 1px solid #e9ecef; text-align: center; vertical-align: middle; cursor: pointer; user-select: none;" onclick="toggleSort('busNumber')">
                                        <i class="bi bi-bus-front me-2"></i>ตู่ <span id="sortIcon-busNumber" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th
                                        style="width: 16%; padding: 10px; border-right: 1px solid #e9ecef; text-align: left; vertical-align: middle; cursor: pointer; user-select: none;" onclick="toggleSort('tripTitle')">
                                        <i class="bi bi-map me-2"></i>ทริป <span id="sortIcon-tripTitle" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th
                                        style="width: 18%; padding: 10px; border-right: 1px solid #e9ecef; text-align: left; vertical-align: middle;">
                                        <i class="bi bi-geo-alt me-2"></i>เส้นทาง
                                    </th>
                                    <th
                                        style="width: 13%; padding: 10px; border-right: 1px solid #e9ecef; text-align: center; vertical-align: middle; cursor: pointer; user-select: none;" onclick="toggleSort('bookedSeats')">
                                        <i class="bi bi-grid-1x2 me-2"></i>ที่นั่ง <span id="sortIcon-bookedSeats" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th
                                        style="width: 12%; padding: 10px; border-right: 1px solid #e9ecef; text-align: center; vertical-align: middle; cursor: pointer; user-select: none;" onclick="toggleSort('isOpen')">
                                        <i class="bi bi-flag-fill me-2"></i>สถานะ <span id="sortIcon-isOpen" style="display: inline-block; width: 16px; text-align: center; font-weight: bold; color: #0d6efd;"></span>
                                    </th>
                                    <th style="width: 16%; padding: 10px; text-align: center; vertical-align: middle;">
                                        <i class="bi bi-gear me-2"></i>การจัดการ
                                    </th>
                                </tr>
                                <tr class="table-filter-row" style="background: #f8f9fa; height: auto;">
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;"></th>
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;">
                                        <input type="number" class="form-control form-control-sm" id="colBusNum" placeholder="ค้นหา..." oninput="applyColumnFilters()" min="1">
                                    </th>
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;"></th>
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;">
                                        <input type="text" class="form-control form-control-sm" id="colRoute" placeholder="ค้นหา..." oninput="applyColumnFilters()">
                                    </th>
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;">
                                        <select class="form-select form-select-sm" id="colSeats" onchange="applyColumnFilters()" style="padding: 2px 4px;">
                                            <option value="">ทั้งหมด</option>
                                            <option value="full">เต็ม</option>
                                            <option value="avail">ว่าง</option>
                                        </select>
                                    </th>
                                    <th style="padding: 4px; border-right: 1px solid #e9ecef;">
                                        <select class="form-select form-select-sm" id="colStatus" onchange="applyColumnFilters()" style="padding: 2px 4px;">
                                            <option value="">ทั้งหมด</option>
                                            <option value="open">เปิด</option>
                                            <option value="closed">ปิด</option>
                                        </select>
                                    </th>
                                    <th style="padding: 4px;"></th>
                                </tr>
                            </thead>
                            <tbody id="roundsTableBody">
                                <tr>
                                    <td colspan="7" class="text-center py-4 text-muted">กำลังโหลด...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="tableNoData" class="text-center py-4 text-muted d-none">ไม่พบรอบรถ</div>
                </div>
                </div>

                <!-- STORY TAB CONTENT -->
                <div id="storyContent" class="d-none">
                    <!-- Search -->
                    <div class="card mb-3">
                        <div class="card-body py-2">
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="historySearch"
                                    placeholder="ค้นหาชื่อเที่ยว, ตู่, หรือผู้ลบ..." oninput="searchHistory()">
                                <button class="btn btn-outline-secondary btn-sm px-2" onclick="clearHistorySearch()" title="ล้าง">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Story Container -->
                    <div id="storyContainer" class="py-4">
                        <div class="text-center py-5 text-muted">กำลังโหลด...</div>
                    </div>
                </div>

                <div class="mt-4 pb-4">
                    <div id="roundPagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Round Modal -->
    <div class="modal fade" id="roundModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">เปิดรอบรถ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="roundForm">
                        <input type="hidden" id="roundId">
                        <div class="mb-3">
                            <label class="form-label">ทริป <span class="text-danger">*</span></label>
                            <select class="form-select" id="fTripId" required onchange="onTripChange()"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">รอบเที่ยว/รอบป่า <span class="text-danger">*</span></label>
                            <select class="form-select" id="fRoudestackId" required onchange="onRoudestackChange()">
                                <option value="">-- เลือกรอบเที่ยว/รอบป่า --</option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">รถคันที่</label>
                                <input type="number" class="form-control" id="fBusNum" value="1" min="1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">จำนวนที่นั่ง <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="fSeats" min="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">วันเริ่มต้น <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fStartDate" readonly
                                    placeholder="ดึงจากรอบเที่ยว/รอบป่า" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">วันสิ้นสุด <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fEndDate" readonly
                                    placeholder="เลือกวันที่สิ้นสุด..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">เวลาออกเดินทาง (HH:mm)</label>
                                <select class="form-select" id="fDepartTime">
                                    <option value="">-- เลือกเวลา --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">ระยะเวลา</label>
                                <input type="text" class="form-control" id="fDuration" readonly
                                    placeholder="คำนวณจากวันเริ่มต้นและสิ้นสุด">
                            </div>
                            <div class="col-12">
                                <hr class="my-1">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label mb-0 fw-bold"><i
                                            class="bi bi-geo-alt-fill text-danger me-1"></i>จุดรับ (Pickup Points) <span
                                            class="text-danger">*</span></label>
                                    <button type="button" class="btn btn-sm btn-outline-success"
                                        onclick="addPickupRow()">
                                        <i class="bi bi-plus-lg me-1"></i>เพิ่มจุดรับ
                                    </button>
                                </div>
                                <div id="pickupList" class="p-2 border rounded bg-light"
                                    style="max-height: 200px; overflow-y: auto;">
                                    <!-- Dynamic Rows -->
                                </div>
                                <small class="text-muted mt-1 d-block">จุดแรกจะถูกใช้เป็นจุดเริ่มต้นหลัก</small>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button class="btn btn-primary" onclick="saveRound()">บันทึก</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/i18n.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/auth-guard.js"></script>
    <script src="../../assets/js/apiClient.js"></script>
    <script src="../../modules/PaginationManager.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/features/thai-calendar.js"></script>
    <script>
        let roundModal, startPicker, endPicker, departPicker;
        let trips = [], allRounds = [], allRoudestacks = [];
        let pagination;
        let currentPage = 1, perPage = 9, filteredData = [];
        let currentViewMode = 'grid';
        let currentTab = 'active';
        let sortColumn = '', sortDirection = 'asc';


        document.addEventListener('DOMContentLoaded', async () => {
            await initPage();
            roundModal = new bootstrap.Modal(document.getElementById('roundModal'));

            // Pagination - Initialize early to avoid undefined errors if API fails
            pagination = new PaginationManager({
                containerId: 'roundPagination',
                onPageChange: (p) => { currentPage = p; renderRounds(false); },
                onPerPageChange: (pp) => { perPage = pp; currentPage = 1; renderRounds(false); }
            });

            try {
                trips = await API.trips.list();
                allRoudestacks = await API.roudeStack.list();
                const fSel = document.getElementById('fTripId');
                fSel.innerHTML = '<option value="">-- เลือกทริป --</option>';
                trips.forEach(t => {
                    fSel.insertAdjacentHTML('beforeend', `<option value="${t.id}">${t.title}</option>`);
                });

                // ถ้ามี tripId ใน URL → ใส่ชื่อทริปในช่องค้นหาเลย
                const urlTripId = new URLSearchParams(location.search).get('tripId');
                if (urlTripId) {
                    const matched = trips.find(t => String(t.id) === urlTripId);
                    if (matched) document.getElementById('filterTrip').value = matched.title;
                }

                // Disable RoudeStack filter initially
                document.getElementById('filterRoudestack').disabled = true;

                await loadRounds();
            } catch (e) {
                console.error('Initialization Error:', e);
                showToast('การโหลดข้อมูลพื้นฐานล้มเหลว', 'danger');
            }

            // เริ่มต้นตัวเลือกช่วงวันที่ไทย
            startPicker = await ThaiCalendar.init('#startDate', {
                onChange: () => renderRounds()
            });
            endPicker = await ThaiCalendar.init('#endDate', {
                onChange: () => renderRounds()
            });
            // Init end date picker with calculate duration
            const endDatePicker = await ThaiCalendar.init('#fEndDate', {
                onChange: calculateDuration
            });

            // Generate time options (HH:mm format, every 30 minutes)
            const timeSelect = document.getElementById('fDepartTime');
            for (let h = 0; h < 24; h++) {
                for (let m of [0, 30]) {
                    const time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                    const opt = document.createElement('option');
                    opt.value = time;
                    opt.textContent = time;
                    timeSelect.appendChild(opt);
                }
            }

            // ปิด dropdown เมื่อคลิกนอก
            document.addEventListener('click', e => {
                if (!document.getElementById('filterTrip').contains(e.target) &&
                    !document.getElementById('tripFilterDropdown').contains(e.target)) {
                    hideTripDropdown();
                }
                if (!document.getElementById('filterRoudestack').contains(e.target) &&
                    !document.getElementById('roudestackFilterDropdown').contains(e.target)) {
                    hideRoudestackDropdown();
                }
            });
        });

        // ─── Trip Filter Autocomplete ───────────────────────────────
        function showTripDropdown() {
            const q = document.getElementById('filterTrip').value.toLowerCase().trim();
            const dd = document.getElementById('tripFilterDropdown');
            const filtered = q ? trips.filter(t => t.title.toLowerCase().includes(q)) : trips;

            if (!filtered.length) { dd.classList.add('d-none'); return; }

            dd.innerHTML = filtered.map((t, i) => `
        <div class="trip-dd-item px-3 py-2" data-idx="${i}"
            style="cursor:pointer;font-size:.88rem;border-bottom:1px solid #f0f0f0;"
            onmousedown="selectTrip('${t.title.replace(/'/g, "\\'")}')"
            onmouseover="this.style.background='#f0fdf9'"
            onmouseout="this.style.background=''">
            <i class="bi bi-map me-2 text-muted" style="font-size:.8rem;"></i>${t.title}
        </div>`).join('');

            dd.classList.remove('d-none');
        }

        function onFilterTripInput() {
            showTripDropdown();
            showRoudestackDropdown(); // Update roude stack options
            renderRounds();
        }

        function selectTrip(title) {
            document.getElementById('filterTrip').value = title;
            document.getElementById('filterRoudestack').value = ''; // Clear RoudeStack selection
            hideTripDropdown();
            showRoudestackDropdown(); // Update roude stack dropdown
            renderRounds();
        }

        function hideTripDropdown() {
            document.getElementById('tripFilterDropdown').classList.add('d-none');
        }

        function clearTripFilter() {
            document.getElementById('filterTrip').value = '';
            hideTripDropdown();
            renderRounds();
        }

        // ─── RoudeStack Filter ───────────────────────────────
        function showRoudestackDropdown() {
            const tripQ = document.getElementById('filterTrip').value.toLowerCase().trim();
            const roudestackSel = document.getElementById('filterRoudestack');
            const dd = document.getElementById('roudestackFilterDropdown');

            // Check if trip is selected
            if (!tripQ) {
                roudestackSel.disabled = true;
                roudestackSel.value = '';
                dd.classList.add('d-none');
                return;
            }

            roudestackSel.disabled = false;

            // Filter RoudeStack by selected trip
            const selectedTrip = trips.find(t => t.title.toLowerCase().includes(tripQ));
            if (!selectedTrip) {
                dd.classList.add('d-none');
                return;
            }

            const tripRoudestacks = allRoudestacks.filter(rs => rs.tripId === selectedTrip.id);
            const q = roudestackSel.value.toLowerCase().trim();
            const filtered = q ? tripRoudestacks.filter(rs => rs.roundname.toLowerCase().includes(q)) : tripRoudestacks;

            if (!filtered || filtered.length === 0) {
                dd.classList.add('d-none');
                return;
            }

            dd.innerHTML = filtered.map((rs, i) => `
        <div class="roude-dd-item px-3 py-2" data-idx="${i}"
            style="cursor:pointer;font-size:.88rem;border-bottom:1px solid #f0f0f0;"
            onmousedown="selectRoudestack('${rs.roundname.replace(/'/g, "\\'")}')"
            onmouseover="this.style.background='#f0fdf9'"
            onmouseout="this.style.background=''">
            <i class="bi bi-layers me-2 text-muted" style="font-size:.8rem;"></i>${rs.roundname}

        function hideRoudestackDropdown() {

            document.getElementById('filterRoudestack').value = '';

        function handleRoudestackFilterKey(e) {
            if (e.key === 'Escape') { hideRoudestackDropdown(); }

        function toggleSort(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            updateSortIcons();
            renderRounds(false);
        }

        function updateSortIcons() {
            ['departDate', 'busNumber', 'tripTitle', 'bookedSeats', 'isOpen'].forEach(col => {
                const icon = document.getElementById(`sortIcon-${col}`);
                if (sortColumn === col) {
                    icon.textContent = sortDirection === 'asc' ? '▲' : '▼';
                    icon.style.opacity = '1.0';
                } else {
                    icon.textContent = '';
                    icon.style.opacity = '0.3';
                }
            });
        }

        function getSortedData(data) {
            if (!sortColumn) return data;

            return [...data].sort((a, b) => {
                let aVal, bVal;

                if (sortColumn === 'departDate') {
                    aVal = new Date(a.departDate);
                    bVal = new Date(b.departDate);
                } else if (sortColumn === 'busNumber') {
                    aVal = a.busNumber || 0;
                    bVal = b.busNumber || 0;
                } else if (sortColumn === 'tripTitle') {
                    aVal = (a.trip?.title || '').toLowerCase();
                    bVal = (b.trip?.title || '').toLowerCase();
                } else if (sortColumn === 'bookedSeats') {
                    aVal = a.bookedSeats || 0;
                    bVal = b.bookedSeats || 0;
                } else if (sortColumn === 'isOpen') {
                    aVal = a.isOpen ? 1 : 0;
                    bVal = b.isOpen ? 1 : 0;
                } else {
                    return 0;
                }

                if (typeof aVal === 'string' && typeof bVal === 'string') {
                    const cmp = aVal.localeCompare(bVal, 'th');
                    return sortDirection === 'asc' ? cmp : -cmp;
                }

                if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function applyColumnFilters() {
            renderRounds(false);
        }

        function handleTripFilterKey(e) {
            if (e.key === 'Escape') { hideTripDropdown(); }
            if (e.key === 'Enter') { hideTripDropdown(); renderRounds(); }
        }

        async function loadRounds() {
            try {
                allRounds = await API.busRounds.list();

        function renderRounds(resetPage = true) {
            if (resetPage) currentPage = 1;
            if (!pagination) return; // Prevent errors if pagination not initialized

            const tripQ = document.getElementById('filterTrip').value.toLowerCase().trim();
            const roudestackQ = document.getElementById('filterRoudestack').value.toLowerCase().trim();
            const startQ = document.getElementById('startDate').value;
            const endQ = document.getElementById('endDate').value;

            // Show empty state if no Trip is selected AND no date range selected
            if (!tripQ && !startQ && !endQ) {
                const emptyMsg = `<div class="col-12 text-center py-5">
                    <i class="bi bi-inbox" style="font-size: 3rem; color: #ccc;"></i>
                    <p class="text-muted mt-3 fs-5">โปรดเลือกชื่อทริปหรือช่วงวันที่เพื่อดูรอบรถ</p>
                </div>`;
                document.getElementById('roundsGrid').innerHTML = emptyMsg;
                document.getElementById('tableNoData').classList.remove('d-none');
                document.getElementById('roundsTableBody').innerHTML = '';
                updateSortIcons();
                if (pagination) pagination.render({ totalRecords: 0, currentPage, perPage });
                return;
            }

            let data = allRounds;
            if (tripQ) data = data.filter(r => (r.trip?.title || '').toLowerCase().includes(tripQ));
            if (roudestackQ) {
                data = data.filter(r => {
                    const roudestack = allRoudestacks.find(rs => rs.id === r.roudeStackId);
                    return roudestack && roudestack.roundname.toLowerCase().includes(roudestackQ);
                });
            }
            if (startQ || endQ) {
                data = ThaiCalendar.filterByDateRange(data, 'departDate', startQ, endQ);
            }

            // Apply column filters (table view only)
            if (currentViewMode === 'table') {
                const colBusNum = document.getElementById('colBusNum')?.value || '';
                const colRoute = document.getElementById('colRoute')?.value.toLowerCase() || '';
                const colSeats = document.getElementById('colSeats')?.value || '';
                const colStatus = document.getElementById('colStatus')?.value || '';

                if (colBusNum) data = data.filter(r => String(r.busNumber) === colBusNum);
                if (colRoute) {
                    data = data.filter(r => {
                        const pickupPoints = typeof r.pickupPoints === 'string' ? JSON.parse(r.pickupPoints || '[]') : (r.pickupPoints || []);
                        const allPoints = pickupPoints.map(p => p.name).join(' ').toLowerCase();
                        return allPoints.includes(colRoute);
                    });
                }
                if (colSeats === 'full') data = data.filter(r => r.bookedSeats >= r.totalSeats);
                if (colSeats === 'avail') data = data.filter(r => r.bookedSeats < r.totalSeats);
                if (colStatus === 'open') data = data.filter(r => r.isOpen);
                if (colStatus === 'closed') data = data.filter(r => !r.isOpen);
            }

            filteredData = data;

            if (!data.length) {
                document.getElementById('roundsGrid').innerHTML = '<div class="col-12 text-center py-4 text-muted">ไม่พบรอบรถ</div>';
                document.getElementById('tableNoData').classList.remove('d-none');
                document.getElementById('roundsTableBody').innerHTML = '';
                if (pagination) pagination.render({ totalRecords: 0, currentPage, perPage });
                updateSortIcons();
                return;
            }

            document.getElementById('tableNoData').classList.add('d-none');

            // Apply sort to all data
            const sortedData = getSortedData(data);

            const startIdx = (currentPage - 1) * perPage;
            let endIdx = startIdx + perPage;
            const pagedData = sortedData.slice(startIdx, endIdx);

            // Render based on current view mode
            if (currentViewMode === 'grid') {
                renderGridView(pagedData);
            } else {
                renderTableView(pagedData);
                updateSortIcons();
            }

            if (pagination) pagination.render({ totalRecords: sortedData.length, currentPage, perPage });
        }

        // ===== Export Functions =====
        function exportToCSV() {
            if (!filteredData || filteredData.length === 0) {
                showToast('ไม่มีข้อมูลที่จะส่งออก', 'warning');
                return;
            }

            // Prepare CSV headers
            const headers = ['วันที่ออกเดินทาง', 'ตู่', 'ทริป', 'เส้นทาง', 'ที่นั่ง (จอง/ทั้งหมด)', 'สถานะ'];

            // Prepare CSV rows
            const rows = filteredData.map(r => {
                const pickupPoints = typeof r.pickupPoints === 'string' ? JSON.parse(r.pickupPoints || '[]') : (r.pickupPoints || []);
                const allPoints = pickupPoints.map(p => p.name).join(' → ') || r.startPoint;

                return [
                    formatDateTime(r.departDate),
                    r.busNumber,
                    r.trip?.title || '-',
                    allPoints,
                    `${r.bookedSeats}/${r.totalSeats}`,
                    r.isOpen ? 'เปิด' : 'ปิด'
                ];
            });

            // Combine headers and rows
            const csvContent = [
                headers.map(h => `"${h}"`).join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');

            // Create blob and download
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `bus-rounds-${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('ส่งออก CSV สำเร็จ', 'success');
        }

            const roudestackId = parseInt(document.getElementById('fRoudestackId').value);
            if (!roudestackId) {
                document.getElementById('fStartDate').value = '';
                return;
            }

            const rs = allRoudestacks.find(r => r.id === roudestackId);
            if (rs) {
                document.getElementById('fStartDate').value = formatDateThai(rs.deteroudestr);
                document.getElementById('fStartDate').dataset.date = new Date(rs.deteroudestr).toISOString();
                document.getElementById('fEndDate').value = '';
                document.getElementById('fDuration').value = '';
                
                // ✅ เพิ่ม Auto Bus Number ตามรอบที่เลือก
                updateNextBusNumber(roudestackId);
            }
        }

        function calculateDuration() {
            const startStr = document.getElementById('fStartDate').dataset.date;
            const endVal = document.getElementById('fEndDate').value;

            if (!startStr || !endVal) return;

            const endDate = new Date(endVal + 'T00:00:00');
            const startDate = new Date(startStr);
            startDate.setHours(0, 0, 0, 0);
            
            // ✅ Check if End Date is before Start Date
            if (endDate < startDate) {
                Swal.fire({
                    icon: 'error',
                    title: 'วันที่ไม่ถูกต้อง',
                    text: 'วันสิ้นสุดต้องไม่น้อยกว่าวันเริ่มต้น',
                    confirmButtonText: 'ตกลง'
                }).then(() => {
                    document.getElementById('fEndDate').value = '';
                    document.getElementById('fDuration').value = '-';
                });
                return;
            }

            // ✅ คำนวณแบบ n+1 (เช่น 5-7 นับเป็น 3 วัน)
            const diffTime = endDate.getTime() - startDate.getTime();
            const days = Math.round(diffTime / (1000 * 60 * 60 * 24)) + 1; // n+1

            let durationText = '';
            if (days === 1) durationText = '1 วัน';
            else if (days === 2) durationText = '2 วัน 1 คืน';
            else if (days > 2) {
                const nights = days - 1;
                durationText = `${days} วัน ${nights} คืน`;
            }

            document.getElementById('fDuration').value = durationText;
        }

        function updateNextBusNumber(roudestackId) {
            if (!roudestackId) {
                roudestackId = parseInt(document.getElementById('fRoudestackId').value);
            }
            if (!roudestackId) return;

            // ✅ นับลำดับใหม่ตาม รอบ (RoudeStack) นั้นๆ
            const sameStackRounds = allRounds.filter(r => r.roudeStackId === roudestackId);
            if (sameStackRounds.length === 0) {
                document.getElementById('fBusNum').value = 1;
            } else {
                const numbers = sameStackRounds.map(r => r.busNumber || 0);
                const maxNum = Math.max(...numbers);
                document.getElementById('fBusNum').value = maxNum + 1;
            }
        }

        function editRound(r) {
            document.getElementById('roundId').value = r.id;
            document.getElementById('fTripId').value = r.tripId;
            onTripChange();

            setTimeout(() => {
                document.getElementById('fRoudestackId').value = r.roudeStackId;
                onRoudestackChange();
            }, 100);

            document.getElementById('fBusNum').value = r.busNumber;
            document.getElementById('fSeats').value = r.totalSeats;
            document.getElementById('fDuration').value = r.duration || '';

            // Load Pickups
            document.getElementById('pickupList').innerHTML = '';
            const points = typeof r.pickupPoints === 'string' ? JSON.parse(r.pickupPoints || '[]') : (r.pickupPoints || [{ name: r.startPoint, price: r.extraPrice }]);
            points.forEach(p => addPickupRow(p.name, p.price));

            roundModal.show();
        }

        async function saveRound() {
            const id = document.getElementById('roundId').value;
            // Collect Pickup Points
            const rows = document.querySelectorAll('.pickup-row');
            const pickups = [];
            rows.forEach(r => {
                pickups.push({
                    name: r.querySelector('.p-name').value.trim(),
                    price: parseFloat(r.querySelector('.p-price').value || 0)
                });
            });

            if (pickups.length === 0) return showToast('กรุณาเพิ่มจุดรับอย่างน้อย 1 จุด', 'warning');

            const roudestackId = parseInt(document.getElementById('fRoudestackId').value);
            const startDateStr = document.getElementById('fStartDate').dataset.date;
            const endDateVal = document.getElementById('fEndDate').value;
            const timeVal = document.getElementById('fDepartTime').value;
            const duration = document.getElementById('fDuration').value; // ✅ รับค่าระยะเวลา

            if (!roudestackId) return showToast('กรุณาเลือกรอบเที่ยว/รอบป่า', 'warning');
            if (!endDateVal) return showToast('กรุณาเลือกวันสิ้นสุด', 'warning');
            
            // ✅ ตรวจสอบระยะเวลาว่าถูกต้องหรือไม่
            if (!duration || duration === '-' || duration === '') {
                return Swal.fire({
                    icon: 'warning',
                    title: 'ข้อมูลไม่ครบถ้วน',
                    text: 'กรุณาตรวจสอบวันสิ้นสุดเพื่อให้ระบบคำนวณระยะเวลาที่ถูกต้อง',
                    confirmButtonText: 'ตกลง'
                });
            }

            const startDate = new Date(startDateStr);
            startDate.setHours(0, 0, 0, 0);
            const endDate = new Date(endDateVal + 'T00:00:00');
            if (endDate < startDate) return showToast('วันสิ้นสุดต้องมากกว่าหรือเท่ากับวันเริ่มต้น', 'warning');

            let departDateVal = new Date(startDateStr);
            if (timeVal && timeVal.match(/^\d{2}:\d{2}$/)) {
                const [h, m] = timeVal.split(':');
                departDateVal.setHours(parseInt(h), parseInt(m), 0, 0);
            }
            departDateVal = departDateVal.toISOString();

            const data = {
                tripId: parseInt(document.getElementById('fTripId').value),
                roudeStackId: roudestackId,
                busNumber: parseInt(document.getElementById('fBusNum').value),
                totalSeats: parseInt(document.getElementById('fSeats').value),
                startPoint: pickups[0].name,
                extraPrice: pickups[0].price,
                pickupPoints: pickups,
                departDate: departDateVal,
                duration: document.getElementById('fDuration').value || null
            };

            try {
                if (id) await API.busRounds.update(id, data);
                else await API.busRounds.create(data);

                roundModal.hide();
                showToast(id ? 'แก้ไขรอบรถสำเร็จ' : 'เปิดรอบรถสำเร็จ');
                await loadRounds();
            } catch (e) { showToast(e.message, 'danger'); }
        }

        async function deleteRound(id) {

            const activeContent = document.getElementById('activeContent');
            const storyContent = document.getElementById('storyContent');
            const activeControls = document.getElementById('activeControls');

            if (tab === 'active') {
                activeTab.classList.add('active');
                storyTab.classList.remove('active');
                activeContent.classList.remove('d-none');
                storyContent.classList.add('d-none');
                activeControls.classList.remove('d-none');
                renderRounds(true);
            } else {
                activeTab.classList.remove('active');
                storyTab.classList.add('active');
                activeContent.classList.add('d-none');
                storyContent.classList.remove('d-none');
                activeControls.classList.add('d-none');

            }
